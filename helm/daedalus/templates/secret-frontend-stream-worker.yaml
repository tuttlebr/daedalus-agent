{{- if and .Values.frontend.enabled .Values.frontend.streamWorker.enabled (not .Values.frontend.streamWorker.env.fromSecret) .Values.frontend.streamWorker.env.createSecret }}
{{- $secretName := printf "%s-stream-worker-env" (include "daedalus.fullname" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $k, $v := .Values.frontend.streamWorker.env.data }}
{{- if not (regexMatch "^(DEPLOYMENT_MODE|BACKEND_(HOST|NAMESPACE|PORT|API_PATH)|DOCUMENT_INGEST_TIMEOUT_MS|NAT_(SUBMIT_MAX_RETRIES|RETRY_DELAY_MS|CONNECTIVITY_TIMEOUT_MS)|STREAM_(ABORT_POLL_INTERVAL_MS|READ_IDLE_TIMEOUT_MS)|DAEDALUS_DEBUG_REPLAY|NEXT_PUBLIC_VAPID_PUBLIC_KEY|VAPID_PRIVATE_KEY|REDIS_(MAX_RETRIES_PER_REQUEST|COMMAND_TIMEOUT_MS)|STREAM_WORKER_[A-Z0-9_]+|LOG_LEVEL)$" $k) }}
{{- fail (printf "frontend.streamWorker.env.data key %s is not in the stream-worker workload allowlist" $k) }}
{{- end }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
