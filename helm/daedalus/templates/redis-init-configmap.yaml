{{- if .Values.redis.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "daedalus.fullname" . }}-redis-init
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
data:
  init-redis.sh: |
    #!/bin/bash
    set -e

    # Forward SIGTERM to the Redis process so Kubernetes graceful
    # shutdown triggers a clean Redis SAVE before exit.
    cleanup() {
      echo "Received shutdown signal, forwarding to Redis (PID $REDIS_PID)..."
      kill -TERM "$REDIS_PID" 2>/dev/null
      wait "$REDIS_PID"
      echo "Redis stopped."
      exit 0
    }
    trap cleanup SIGTERM SIGINT

    echo "Starting Redis with modules..."

    AUTH_ARGS=()
    REDIS_CLI_AUTH_ARGS=()
    if [[ -n "${REDIS_PASSWORD:-}" ]]; then
      if [[ ! "${REDIS_USERNAME:-}" =~ ^[A-Za-z0-9._-]+$ ]]; then
        echo "ERROR: REDIS_USERNAME contains unsupported characters" >&2
        exit 1
      fi
      umask 077
      CURRENT_HASH=$(printf '%s' "$REDIS_PASSWORD" | sha256sum | awk '{print $1}')
      # Redis replays AOF transactions as the default ACL user. An entirely
      # disabled default user makes EXEC reject replayed Stream PEL updates,
      # even though ordinary keys load successfully. Keep that internal user
      # permission-complete but network-inaccessible behind a fresh password
      # hash whose random preimage is never stored or exposed.
      AOF_REPLAY_HASH=$(dd if=/dev/urandom bs=32 count=1 2>/dev/null | sha256sum | awk '{print $1}')
      {
        printf 'user default on #%s ~* &* +@all\n' "$AOF_REPLAY_HASH"
        printf 'user %s on #%s' "$REDIS_USERNAME" "$CURRENT_HASH"
        if [[ -n "${REDIS_PREVIOUS_PASSWORD:-}" && "$REDIS_PREVIOUS_PASSWORD" != "$REDIS_PASSWORD" ]]; then
          PREVIOUS_HASH=$(printf '%s' "$REDIS_PREVIOUS_PASSWORD" | sha256sum | awk '{print $1}')
          printf ' #%s' "$PREVIOUS_HASH"
        fi
        # Application clients need all data-structure and scripting commands,
        # but not server shutdown, module loading, config, flush, or debug.
        printf ' ~* &* +@all -@dangerous +info\n'
      } >/tmp/users.acl
      AUTH_ARGS=(--aclfile /tmp/users.acl)
      # redis-cli reads these without exposing credentials in process args.
      export REDISCLI_AUTH="$REDIS_PASSWORD"
      REDIS_CLI_AUTH_ARGS=(--user "$REDIS_USERNAME")
    fi

    TLS_ARGS=()
    REDIS_CLI_TLS_ARGS=()
    if [[ "${REDIS_TLS_ENABLED:-false}" == "true" ]]; then
      TLS_ARGS=(
        --port 0
        --tls-port 6379
        --tls-cert-file "$REDIS_TLS_CERT_FILE"
        --tls-key-file "$REDIS_TLS_KEY_FILE"
        --tls-ca-cert-file "$REDIS_TLS_CA_FILE"
        --tls-auth-clients no
      )
      REDIS_CLI_TLS_ARGS=(--tls --cacert "$REDIS_TLS_CA_FILE")
    fi

    redis_cli() {
      redis-cli "${REDIS_CLI_TLS_ARGS[@]}" "${REDIS_CLI_AUTH_ARGS[@]}" "$@"
    }

    # Start Redis in the background with all required modules.
    # --dir /data ensures RDB and AOF are written to the PVC mount.
    redis-server \
      --dir /data \
      --save 60 1 \
      --appendonly yes \
      --protected-mode yes \
      "${AUTH_ARGS[@]}" \
      "${TLS_ARGS[@]}" \
      --loadmodule /opt/redis-stack/lib/rejson.so \
      --loadmodule /opt/redis-stack/lib/redisearch.so \
      --loadmodule /opt/redis-stack/lib/redistimeseries.so \
      --loadmodule /opt/redis-stack/lib/redisbloom.so &

    REDIS_PID=$!

    # Wait for Redis to be ready
    echo "Waiting for Redis to be ready..."
    for i in {1..30}; do
      if redis_cli ping >/dev/null 2>&1; then
        echo "Redis is ready!"
        break
      fi
      echo -n "."
      sleep 1
    done

    # Ensure memory_idx index exists (idempotent — never deletes stored data)
    echo "Checking for existing memory_idx index..."

    INDEX_READY=false
    if redis_cli FT.INFO memory_idx >/dev/null 2>&1; then
      echo "memory_idx index already exists, verifying schema..."
      INDEX_INFO=$(redis_cli FT.INFO memory_idx 2>&1)
      if echo "$INDEX_INFO" | grep -q "HNSW" && echo "$INDEX_INFO" | grep -q "2048"; then
        echo "Index schema is correct, skipping recreation."
        INDEX_READY=true
      else
        echo "Index schema is outdated, dropping index (preserving data)..."
        redis_cli FT.DROPINDEX memory_idx 2>/dev/null || true
        sleep 1
      fi
    else
      echo "No existing index found."
    fi

    if [ "$INDEX_READY" = false ]; then
      echo "Creating memory_idx index..."
      MAX_RETRIES=3
      RETRY_COUNT=0

      while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
        echo "Attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES..."

        if redis_cli FT.CREATE memory_idx \
          ON JSON \
          PREFIX 1 "nat:" \
          SCHEMA \
            "$.user_id" AS user_id TEXT \
            "$.tags[*]" AS tags TAG \
            "$.memory" AS memory TEXT \
            "$.embedding" AS embedding VECTOR HNSW 12 TYPE FLOAT32 DIM 2048 DISTANCE_METRIC L2 INITIAL_CAP 100 M 16 EF_CONSTRUCTION 200 2>&1; then

          echo "Successfully created memory_idx index"

          echo "Verifying index creation..."
          if redis_cli FT.INFO memory_idx >/dev/null 2>&1; then
            echo "Index verified successfully"
            redis_cli FT.INFO memory_idx | head -10
            break
          else
            echo "Index created but verification failed, retrying..."
          fi
        else
          echo "Failed to create index, will retry..."
        fi

        RETRY_COUNT=$((RETRY_COUNT + 1))
        if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
          sleep 2
        fi
      done

      if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
        echo "ERROR: Failed to create memory_idx index after $MAX_RETRIES attempts!"
        echo "Attempting one more time with verbose output..."
        redis_cli --verbose FT.CREATE memory_idx \
          ON JSON \
          PREFIX 1 "nat:" \
          SCHEMA \
            "$.user_id" AS user_id TEXT \
            "$.tags[*]" AS tags TAG \
            "$.memory" AS memory TEXT \
            "$.embedding" AS embedding VECTOR HNSW 12 TYPE FLOAT32 DIM 2048 DISTANCE_METRIC L2 INITIAL_CAP 100 M 16 EF_CONSTRUCTION 200 2>&1
      fi
    fi

    # List all indexes to confirm
    echo "Listing all RediSearch indexes:"
    redis_cli FT._LIST

    # Final verification with delay
    echo "Final verification of memory_idx..."
    sleep 2
    if redis_cli FT.INFO memory_idx >/dev/null 2>&1; then
      echo "✅ FINAL CHECK: memory_idx index is available and ready"
    else
      echo "❌ FINAL CHECK: memory_idx index is NOT available!"
      echo "NAT may encounter issues. Check Redis logs for details."
    fi

    # Additional delay to ensure index is fully propagated
    echo "Waiting for index to stabilize..."
    sleep 3

    # Bring Redis to foreground
    echo "Redis initialization complete, bringing to foreground..."
    wait $REDIS_PID
{{- end }}
