{{- if and .Values.backend.default.enabled .Values.backend.default.env.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "daedalus.fullname" . }}-backend-env
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $k, $v := .Values.backend.default.env.data }}
{{- if not (regexMatch "^(DAEDALUS_PHOENIX_ENDPOINT|PHOENIX_(PROJECT_NAME|API_KEY|CLIENT_HEADERS)|OTEL_EXPORTER_OTLP_HEADERS|ARIZE_[A-Z0-9_]+|KUBERNETES_MCP_(SERVER|TOKEN)|UNIFI_MCP_(SERVER|TOKEN)|DAEDALUS_REQUIRED_MCP_GROUPS|GOOGLE_MCP_(CLIENT_ID|CLIENT_SECRET|REDIRECT_URI)|LLM_SANDBOX_(BASE_URL|API_KEY)|MILVUS_[A-Z0-9_]+|MINIO_[A-Z0-9_]+|NV_INGEST_(HOST|PORT)|TOKENIZER|EMBEDDING_DENSE_DIM|DOCUMENT_INGEST_[A-Z0-9_]+|DOCUMENT_MARKDOWN_MAX_CHARS|RATE_LIMIT_(DOC_MARKDOWN|IMAGE_JOB)_[A-Z0-9_]+|NVIDIA_API_KEY|OPENAI_API_KEY|FIREWORKS_[A-Z0-9_]+|PERPLEXITY_SEARCH_API_KEY|GITHUB_PAT|IMAGE_(AUGMENTATION|COMPREHENSION|GENERATION)_[A-Z0-9_]+|EMBEDDING_[A-Z0-9_]+|RERANKER_[A-Z0-9_]+|(DEFAULT|REASONING|REACT|TOOL_CALLING|DISTILL)_LLM_MODEL_[A-Z0-9_]+|DAEDALUS_LLM_[A-Z0-9_]+|NAT_(CONFIG_FILE|HOST|PORT|LOG_LEVEL)|LOG_LEVEL|APPROVAL_REDIS_URL|AUTONOMY_IDEMPOTENCY_TTL_SECONDS)$" $k) }}
{{- fail (printf "backend.default.env.data key %s is not in the backend workload allowlist" $k) }}
{{- end }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
