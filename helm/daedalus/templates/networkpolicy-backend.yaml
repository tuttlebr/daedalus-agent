{{- if .Values.backend.networkPolicy.enabled }}
---
# Network Policy for Default Backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "daedalus.fullname" . }}-backend-default
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "daedalus.name" . }}
      app.kubernetes.io/component: backend-default
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from frontend pods
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "daedalus.name" . }}
              app.kubernetes.io/component: frontend
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.default.port }}
    # Allow traffic from nginx pods
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "daedalus.name" . }}
              app.kubernetes.io/component: nginx
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.default.port }}
    # Allow traffic from JupyterLab pods
    {{- if .Values.jupyterlab.enabled }}
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "daedalus.name" . }}
              app.kubernetes.io/component: jupyterlab
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.default.port }}
    {{- end }}
    # Allow traffic from the same namespace for health checks
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.default.port }}
---
# Network Policy for Deep Thinker Backend
