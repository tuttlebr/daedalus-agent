{{- if .Values.backend.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "daedalus.fullname" . }}-backend
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "daedalus.name" . }}
      app.kubernetes.io/component: backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from frontend pods
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "daedalus.name" . }}
              app.kubernetes.io/component: frontend
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.port }}
    # Allow traffic from nginx pods (if you still need some nginx access)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "daedalus.name" . }}
              app.kubernetes.io/component: nginx
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.port }}
    # Allow traffic from the same namespace for health checks
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.port }}
{{- end }}
