{{- if .Values.frontend.enabled }}
{{- $secretName := printf "%s-frontend-session" (include "daedalus.fullname" .) }}
{{- /*
  Chart-managed Secret holding only SESSION_SECRET (used to sign identity
  cookies). Kept separate from the bulk frontend env Secret so users who
  manage env via an external Secret (frontend.env.fromSecret) don't have to
  remember to put SESSION_SECRET in it. Preserved across upgrades via `lookup`
  — rotating it logs every user out, so we never regenerate silently.

  Resolution priority:
    1. Explicit value in .Values.frontend.env.sessionSecret
    2. Existing in-cluster Secret value
    3. Auto-generated 64-char value (first install only)
*/ -}}
{{- $providedSecret := default "" .Values.frontend.env.sessionSecret }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $existingSecret := "" }}
{{- if $existing }}
{{- $existingSecret = default "" (get ($existing.data | default dict) "SESSION_SECRET") }}
{{- if $existingSecret }}{{ $existingSecret = $existingSecret | b64dec }}{{ end }}
{{- end }}
{{- $sessionSecret := $providedSecret }}
{{- if not $sessionSecret }}{{ $sessionSecret = $existingSecret }}{{ end }}
{{- if not $sessionSecret }}{{ $sessionSecret = randAlphaNum 64 }}{{ end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
type: Opaque
stringData:
  SESSION_SECRET: {{ $sessionSecret | quote }}
{{- end }}
