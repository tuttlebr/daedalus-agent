{{- if or .Values.frontend.enabled .Values.backend.default.enabled }}
{{- $secretName := printf "%s-internal-api" (include "daedalus.fullname" .) }}
{{- /*
  Chart-managed shared token for trusted frontend-to-backend calls.
  Preserved across upgrades via lookup so rolling upgrades do not break
  in-flight requests.
*/ -}}
{{- $providedToken := default "" .Values.global.internalApiToken }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $existingToken := "" }}
{{- if $existing }}
{{- $existingToken = default "" (get ($existing.data | default dict) "DAEDALUS_INTERNAL_API_TOKEN") }}
{{- if $existingToken }}{{ $existingToken = $existingToken | b64dec }}{{ end }}
{{- end }}
{{- $internalToken := $providedToken }}
{{- if not $internalToken }}{{ $internalToken = $existingToken }}{{ end }}
{{- if not $internalToken }}{{ $internalToken = randAlphaNum 64 }}{{ end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
type: Opaque
stringData:
  DAEDALUS_INTERNAL_API_TOKEN: {{ $internalToken | quote }}
{{- end }}
