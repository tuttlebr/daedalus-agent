{{- if and .Values.backend.enabled .Values.backend.config.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "daedalus.fullname" . }}-backend-config
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
data:
  config.yaml: |-
{{- if .Values.backend.config.data }}
{{ .Values.backend.config.data | indent 4 }}
{{- else }}
    {}
{{- end }}
{{- end }}
