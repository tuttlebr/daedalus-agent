{{- if .Values.nginx.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "daedalus.fullname" . }}-nginx
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "daedalus.name" . }}
      app.kubernetes.io/component: nginx
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "daedalus.name" . }}
        app.kubernetes.io/component: nginx
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        deploy-timestamp: {{ .Values.forceRedeploy | default "" | quote }}
    spec:
      {{- include "daedalus.nodePlacement" . | nindent 6 }}
      automountServiceAccountToken: false
      {{- with .Values.nginx.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: nginx
          image: {{ include "daedalus.image" .Values.images.nginx | quote }}
          imagePullPolicy: {{ .Values.images.nginx.pullPolicy }}
          {{- with .Values.nginx.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.nginx.containerPort | default 8080 }}
              name: http
            {{- if .Values.nginx.https.enabled }}
            - containerPort: {{ .Values.nginx.https.containerPort | default 8443 }}
              name: https
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health?ready=1
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.nginx.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: frontend.conf
              readOnly: true
            {{- if .Values.nginx.imageVolume.enabled }}
            - name: generated-images
              mountPath: /tmp/generated_images
              readOnly: true
            {{- end }}
            {{- if and .Values.nginx.https.enabled .Values.nginx.https.tlsSecretName }}
            - name: tls-secret
              mountPath: /etc/nginx/ssl
              readOnly: true
            {{- end }}
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "daedalus.fullname" . }}-nginx-conf
        {{- if .Values.nginx.imageVolume.enabled }}
        - name: generated-images
          {{- if and .Values.nginx.imageVolume.create (not .Values.nginx.imageVolume.existingClaimName) }}
          persistentVolumeClaim:
            claimName: {{ include "daedalus.fullname" . }}-images
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ .Values.nginx.imageVolume.existingClaimName }}
          {{- end }}
        {{- end }}
        {{- if and .Values.nginx.https.enabled .Values.nginx.https.tlsSecretName }}
        - name: tls-secret
          secret:
            secretName: {{ .Values.nginx.https.tlsSecretName }}
        {{- end }}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "daedalus.fullname" . }}-nginx
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
spec:
  type: {{ .Values.nginx.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "daedalus.name" . }}
    app.kubernetes.io/component: nginx
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.nginx.httpPort }}
      targetPort: http
      name: http
    {{- if .Values.nginx.https.enabled }}
    - port: 443
      targetPort: https
      name: https
      # Optional nodePort can be set via values if service.type=NodePort
      {{- if and (eq .Values.nginx.service.type "NodePort") .Values.nginx.service.nodePorts }}
      {{- with .Values.nginx.service.nodePorts.https }}
      nodePort: {{ . }}
      {{- end }}
      {{- end }}
    {{- end }}
{{- end }}
