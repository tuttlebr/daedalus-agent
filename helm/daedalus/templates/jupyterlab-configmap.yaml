{{- if .Values.jupyterlab.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "daedalus.fullname" . }}-jupyterlab-starter
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
    app.kubernetes.io/component: jupyterlab
data:
  getting_started.py: |
    """
    Daedalus Development Environment - Getting Started

    This script demonstrates how to connect to the services in the Daedalus namespace:
    - LLM endpoints (via OpenAI-compatible API)
    - Milvus vector database
    - Redis for caching and memory

    Run this in JupyterLab to verify your connections.
    """
    import os
    import json
    from rich.console import Console
    from rich.table import Table

    console = Console()

    # Display environment configuration
    console.print("\n[bold blue]🔧 Environment Configuration[/bold blue]\n")

    env_table = Table(title="Service Endpoints")
    env_table.add_column("Variable", style="cyan")
    env_table.add_column("Value", style="green")

    env_vars = [
        "REDIS_HOST",
        "REDIS_PORT",
        "REDIS_URL",
        "MILVUS_URI",
        "MILVUS_HOST",
        "MILVUS_PORT",
        "BACKEND_DEFAULT_URL",
        "BACKEND_DEEP_THINKER_URL",
        "NVIDIA_API_KEY",
        "OPENROUTER_API_KEY",
    ]

    for var in env_vars:
        value = os.environ.get(var, "[not set]")
        if "KEY" in var and value != "[not set]":
            value = value[:8] + "..." if len(value) > 8 else "***"
        env_table.add_row(var, value)

    console.print(env_table)


    # Test Redis connection
    def test_redis():
        """Test Redis connection."""
        import redis

        console.print("\n[bold blue]📦 Testing Redis Connection[/bold blue]\n")

        try:
            r = redis.Redis(
                host=os.environ.get("REDIS_HOST", "localhost"),
                port=int(os.environ.get("REDIS_PORT", 6379)),
                decode_responses=True
            )
            r.ping()
            console.print("[green]✓ Redis connection successful![/green]")

            # Show some stats
            info = r.info("memory")
            console.print(f"  Memory used: {info.get('used_memory_human', 'N/A')}")

            return True
        except Exception as e:
            console.print(f"[red]✗ Redis connection failed: {e}[/red]")
            return False


    # Test Milvus connection
    def test_milvus():
        """Test Milvus connection."""
        from pymilvus import connections, utility

        console.print("\n[bold blue]🗄️ Testing Milvus Connection[/bold blue]\n")

        milvus_uri = os.environ.get("MILVUS_URI")
        milvus_host = os.environ.get("MILVUS_HOST")
        milvus_port = os.environ.get("MILVUS_PORT", "19530")

        if not milvus_uri and not milvus_host:
            console.print("[yellow]⚠ MILVUS_URI or MILVUS_HOST not configured[/yellow]")
            return False

        try:
            if milvus_uri:
                connections.connect(uri=milvus_uri)
            else:
                connections.connect(host=milvus_host, port=milvus_port)

            console.print("[green]✓ Milvus connection successful![/green]")

            # List collections
            collections = utility.list_collections()
            if collections:
                console.print(f"  Available collections: {', '.join(collections[:5])}")
                if len(collections) > 5:
                    console.print(f"  ... and {len(collections) - 5} more")

            connections.disconnect("default")
            return True
        except Exception as e:
            console.print(f"[red]✗ Milvus connection failed: {e}[/red]")
            return False


    # Test LLM endpoint
    def test_llm():
        """Test LLM endpoint via OpenAI-compatible API."""
        from openai import OpenAI

        console.print("\n[bold blue]🤖 Testing LLM Endpoint[/bold blue]\n")

        # Try NVIDIA NIM first, then OpenRouter
        nvidia_key = os.environ.get("NVIDIA_API_KEY")
        openrouter_key = os.environ.get("OPENROUTER_API_KEY")

        if nvidia_key:
            console.print("  Using NVIDIA NIM endpoint...")
            client = OpenAI(
                api_key=nvidia_key,
                base_url="https://integrate.api.nvidia.com/v1"
            )
            model = "nvidia/llama-3.1-nemotron-70b-instruct"
        elif openrouter_key:
            console.print("  Using OpenRouter endpoint...")
            client = OpenAI(
                api_key=openrouter_key,
                base_url="https://openrouter.ai/api/v1"
            )
            model = "anthropic/claude-3.5-sonnet"
        else:
            console.print("[yellow]⚠ No API key configured (NVIDIA_API_KEY or OPENROUTER_API_KEY)[/yellow]")
            return False

        try:
            response = client.chat.completions.create(
                model=model,
                messages=[{"role": "user", "content": "Say 'Hello from Daedalus!' in exactly 5 words."}],
                max_tokens=20
            )
            console.print(f"[green]✓ LLM connection successful![/green]")
            console.print(f"  Response: {response.choices[0].message.content}")
            return True
        except Exception as e:
            console.print(f"[red]✗ LLM connection failed: {e}[/red]")
            return False


    # Test backend endpoints
    def test_backend():
        """Test Daedalus backend endpoints."""
        import httpx

        console.print("\n[bold blue]🔌 Testing Backend Endpoints[/bold blue]\n")

        backends = {
            "Default (Tool-Calling)": os.environ.get("BACKEND_DEFAULT_URL"),
            "Deep Thinker (ReAct)": os.environ.get("BACKEND_DEEP_THINKER_URL"),
        }

        results = {}
        for name, url in backends.items():
            if not url:
                console.print(f"  {name}: [yellow]not configured[/yellow]")
                continue

            try:
                response = httpx.get(f"{url}/health", timeout=5.0)
                if response.status_code == 200:
                    console.print(f"  {name}: [green]✓ healthy[/green]")
                    results[name] = True
                else:
                    console.print(f"  {name}: [yellow]⚠ status {response.status_code}[/yellow]")
                    results[name] = False
            except Exception as e:
                console.print(f"  {name}: [red]✗ {e}[/red]")
                results[name] = False

        return any(results.values()) if results else False


    if __name__ == "__main__":
        console.print("\n[bold magenta]═══════════════════════════════════════════[/bold magenta]")
        console.print("[bold magenta]   Daedalus Development Environment Check   [/bold magenta]")
        console.print("[bold magenta]═══════════════════════════════════════════[/bold magenta]")

        results = {
            "Redis": test_redis(),
            "Milvus": test_milvus(),
            "LLM": test_llm(),
            "Backend": test_backend(),
        }

        console.print("\n[bold blue]📊 Summary[/bold blue]\n")

        summary = Table()
        summary.add_column("Service", style="cyan")
        summary.add_column("Status", style="bold")

        for service, status in results.items():
            status_str = "[green]✓ Connected[/green]" if status else "[red]✗ Failed[/red]"
            summary.add_row(service, status_str)

        console.print(summary)
        console.print()
{{- end }}
