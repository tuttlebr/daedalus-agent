{{- if .Values.backend.pdb.enabled }}
{{- if .Values.backend.default.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "daedalus.fullname" . }}-backend-default
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend-default
spec:
  minAvailable: {{ .Values.backend.pdb.minAvailable | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "daedalus.name" . }}
      app.kubernetes.io/component: backend-default
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
{{- end }}
