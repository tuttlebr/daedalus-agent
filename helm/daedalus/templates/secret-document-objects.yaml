{{- if and .Values.documentObjectStorage.enabled (not .Values.documentObjectStorage.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "daedalus.documentObjectSecretName" . }}
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.documentObjectStorage.auth.accessKeyKey | default "DOCUMENT_OBJECT_ACCESS_KEY" }}: {{ required "documentObjectStorage.auth.accessKey or an existingSecret is required when document object storage is enabled" .Values.documentObjectStorage.auth.accessKey | quote }}
  {{ .Values.documentObjectStorage.auth.secretKeyKey | default "DOCUMENT_OBJECT_SECRET_KEY" }}: {{ required "documentObjectStorage.auth.secretKey or an existingSecret is required when document object storage is enabled" .Values.documentObjectStorage.auth.secretKey | quote }}
  {{- with .Values.documentObjectStorage.auth.sessionToken }}
  {{ $.Values.documentObjectStorage.auth.sessionTokenKey | default "DOCUMENT_OBJECT_SESSION_TOKEN" }}: {{ . | quote }}
  {{- end }}
{{- end }}
