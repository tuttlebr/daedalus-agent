{{- if and .Values.redis.enabled .Values.redis.auth.enabled (not .Values.redis.auth.existingSecret) }}
{{- $secretName := printf "%s-redis-auth" (include "daedalus.fullname" .) }}
{{- $secretKey := .Values.redis.auth.secretKey | default "REDIS_PASSWORD" }}
{{- $previousSecretKey := .Values.redis.auth.previousSecretKey | default "REDIS_PREVIOUS_PASSWORD" }}
{{- $providedPassword := .Values.redis.auth.password | default "" }}
{{- $providedPreviousPassword := .Values.redis.auth.previousPassword | default "" }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $existingPassword := "" }}
{{- if $existing }}
{{- $existingPassword = default "" (get ($existing.data | default dict) $secretKey) }}
{{- if $existingPassword }}{{ $existingPassword = $existingPassword | b64dec }}{{ end }}
{{- end }}
{{- $password := $providedPassword }}
{{- if not $password }}{{ $password = $existingPassword }}{{ end }}
{{- if not $password }}{{ $password = randAlphaNum 64 }}{{ end }}
{{- $previousPassword := $providedPreviousPassword }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $secretKey }}: {{ $password | quote }}
  {{ $previousSecretKey }}: {{ $previousPassword | quote }}
{{- end }}
