{{- if .Values.backend.default.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "daedalus.fullname" . }}-backend-default
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend-default
spec:
  replicas: {{ .Values.backend.default.replicas | default 2 }}
  revisionHistoryLimit: 3
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "daedalus.name" . }}
      app.kubernetes.io/component: backend-default
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "daedalus.name" . }}
        app.kubernetes.io/component: backend-default
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        deploy-timestamp: {{ .Values.forceRedeploy | default "" | quote }}
        checksum/redis-auth-config: {{ include "daedalus.redisAuthConfigChecksum" . }}
        {{- if .Values.backend.default.config.enabled }}
        checksum/backend-config: {{ include (print $.Template.BasePath "/config-backend-default.yaml") . | sha256sum }}
        {{- end }}
    spec:
      {{- include "daedalus.nodePlacement" . | nindent 6 }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      dnsPolicy: ClusterFirst
      dnsConfig:
        options:
          # Resolve multi-label external MCP hosts before expanding Kubernetes
          # search suffixes. This avoids several unnecessary DNS requests per
          # connection and limits exposure to a slow/stale DNS backend.
          - name: ndots
            value: "1"
          - name: single-request-reopen
          - name: timeout
            value: "2"
          - name: attempts
            value: "3"
      {{- with .Values.backend.default.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: {{ include "daedalus.image" .Values.images.backend | quote }}
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          {{- with .Values.backend.default.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.backend.default.port }}
              name: http
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - touch /tmp/daedalus-draining; sleep 15
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          {{- with .Values.backend.default.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.backend.default.env.fromSecret | default (printf "%s-backend-env" (include "daedalus.fullname" .)) }}
          env:
            - name: DAEDALUS_INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-internal-api" (include "daedalus.fullname" .) }}
                  key: DAEDALUS_INTERNAL_API_TOKEN
            - name: REDIS_HOST
              value: {{ (get (.Values.backend.default.env.overrides | default dict) "REDIS_HOST") | default (printf "%s-redis.%s.svc.cluster.local" (include "daedalus.fullname" .) .Release.Namespace) | quote }}
            - name: REDIS_PORT
              value: {{ (get (.Values.backend.default.env.overrides | default dict) "REDIS_PORT") | default (.Values.redis.service.port | default 6379) | quote }}
            {{- if .Values.redis.auth.enabled }}
            - name: REDIS_USERNAME
              value: {{ .Values.redis.auth.username | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "daedalus.redisSecretName" . }}
                  key: {{ .Values.redis.auth.secretKey | default "REDIS_PASSWORD" }}
            {{- end }}
            - name: REDIS_TLS_ENABLED
              value: {{ .Values.redis.tls.enabled | quote }}
            - name: REDIS_TLS_CA_FILE
              value: {{ ternary (printf "%s/%s" (.Values.redis.tls.mountPath | default "/etc/redis-tls") (.Values.redis.tls.caKey | default "ca.crt")) "" .Values.redis.tls.enabled | quote }}
            - name: REDIS_URL
              value: {{ (get (.Values.backend.default.env.overrides | default dict) "REDIS_URL") | default (ternary (printf "%s://$(REDIS_USERNAME):$(REDIS_PASSWORD)@%s-redis.%s.svc.cluster.local:%v%s" (ternary "rediss" "redis" .Values.redis.tls.enabled) (include "daedalus.fullname" .) .Release.Namespace (.Values.redis.service.port | default 6379) (ternary (printf "?ssl_ca_certs=%s/%s" (.Values.redis.tls.mountPath | default "/etc/redis-tls") (.Values.redis.tls.caKey | default "ca.crt")) "" .Values.redis.tls.enabled)) (printf "%s://%s-redis.%s.svc.cluster.local:%v%s" (ternary "rediss" "redis" .Values.redis.tls.enabled) (include "daedalus.fullname" .) .Release.Namespace (.Values.redis.service.port | default 6379) (ternary (printf "?ssl_ca_certs=%s/%s" (.Values.redis.tls.mountPath | default "/etc/redis-tls") (.Values.redis.tls.caKey | default "ca.crt")) "" .Values.redis.tls.enabled)) .Values.redis.auth.enabled) | quote }}
            {{- if .Values.documentObjectStorage.enabled }}
            - name: DOCUMENT_OBJECT_ENDPOINT
              value: {{ required "documentObjectStorage.endpoint is required when enabled" .Values.documentObjectStorage.endpoint | quote }}
            - name: DOCUMENT_OBJECT_BUCKET
              value: {{ .Values.documentObjectStorage.bucket | quote }}
            - name: DOCUMENT_OBJECT_REGION
              value: {{ .Values.documentObjectStorage.region | quote }}
            - name: DOCUMENT_OBJECT_PREFIX
              value: {{ .Values.documentObjectStorage.prefix | quote }}
            - name: DOCUMENT_OBJECT_EXPIRY_SECONDS
              value: {{ .Values.documentObjectStorage.expirySeconds | quote }}
            - name: DOCUMENT_OBJECT_REQUEST_TIMEOUT_MS
              value: {{ include "daedalus.documentObjectRequestTimeoutMs" . | quote }}
            - name: DOCUMENT_OBJECT_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "daedalus.documentObjectSecretName" . }}
                  key: {{ .Values.documentObjectStorage.auth.accessKeyKey | default "DOCUMENT_OBJECT_ACCESS_KEY" }}
            - name: DOCUMENT_OBJECT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "daedalus.documentObjectSecretName" . }}
                  key: {{ .Values.documentObjectStorage.auth.secretKeyKey | default "DOCUMENT_OBJECT_SECRET_KEY" }}
            - name: DOCUMENT_OBJECT_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "daedalus.documentObjectSecretName" . }}
                  key: {{ .Values.documentObjectStorage.auth.sessionTokenKey | default "DOCUMENT_OBJECT_SESSION_TOKEN" }}
                  optional: true
            {{- end }}
            {{- if .Values.backend.default.config.enabled }}
            - name: NAT_CONFIG_FILE
              value: /workspace/config/config.yaml
            {{- end }}
            {{- with .Values.backend.default.env.overrides }}
            {{- range $k, $v := . }}
            {{- if and (ne $k "DAEDALUS_INTERNAL_API_TOKEN") (ne $k "REDIS_HOST") (ne $k "REDIS_PORT") (ne $k "REDIS_USERNAME") (ne $k "REDIS_PASSWORD") (ne $k "REDIS_TLS_ENABLED") (ne $k "REDIS_TLS_CA_FILE") (ne $k "REDIS_URL") (or (not $.Values.backend.default.config.enabled) (ne $k "NAT_CONFIG_FILE")) }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          volumeMounts:
            {{- if .Values.backend.default.config.enabled }}
            - name: backend-config
              mountPath: /workspace/config
              readOnly: true
            {{- end }}
            {{- if .Values.backend.persistence.enabled }}
            - name: backend-data
              mountPath: /data
            {{- end }}
            {{- if .Values.backend.skills.enabled }}
            - name: skills
              mountPath: {{ .Values.backend.skills.mountPath | default "/skills" }}
              readOnly: true
            {{- end }}
            {{- if .Values.redis.tls.enabled }}
            - name: redis-tls
              mountPath: {{ .Values.redis.tls.mountPath | default "/etc/redis-tls" }}
              readOnly: true
            {{- end }}
      {{- if or .Values.backend.persistence.enabled .Values.backend.skills.enabled .Values.backend.default.config.enabled .Values.redis.tls.enabled }}
      volumes:
        {{- if .Values.backend.persistence.enabled }}
        - name: backend-data
          persistentVolumeClaim:
            {{- $claims := .Values.backend.persistence.existingClaimNames | default dict }}
            {{- $defaultClaim := get $claims "default" | default .Values.backend.persistence.existingClaimName }}
            claimName: {{ $defaultClaim | default (printf "%s-backend-default" (include "daedalus.fullname" .)) }}
        {{- end }}
        {{- if .Values.backend.default.config.enabled }}
        - name: backend-config
          configMap:
            name: {{ include "daedalus.fullname" . }}-backend-default-config
        {{- end }}
        {{- if .Values.backend.skills.enabled }}
        - name: skills
          {{- if .Values.backend.skills.pvcName }}
          persistentVolumeClaim:
            claimName: {{ .Values.backend.skills.pvcName }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- if .Values.redis.tls.enabled }}
        - name: redis-tls
          secret:
            secretName: {{ include "daedalus.redisTlsSecretName" . }}
        {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "daedalus.fullname" . }}-backend-default
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.default.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "daedalus.name" . }}
    app.kubernetes.io/component: backend-default
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.backend.default.service.port }}
      targetPort: http
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "daedalus.fullname" . }}-backend-default-pods
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: false
  selector:
    app.kubernetes.io/name: {{ include "daedalus.name" . }}
    app.kubernetes.io/component: backend-default
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.backend.default.service.port }}
      targetPort: http
      name: http
{{- end }}
