{{- if .Values.backend.deepThinker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "daedalus.fullname" . }}-backend-deep-thinker
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend-deep-thinker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "daedalus.name" . }}
      app.kubernetes.io/component: backend-deep-thinker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "daedalus.name" . }}
        app.kubernetes.io/component: backend-deep-thinker
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        deploy-timestamp: {{ .Values.forceRedeploy | default "" | quote }}
    spec:
      {{- include "daedalus.nodePlacement" . | nindent 6 }}
      {{- with .Values.backend.deepThinker.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}"
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.deepThinker.port }}
              name: http
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- with .Values.backend.deepThinker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.backend.deepThinker.env.fromSecret | default (printf "%s-backend-env" (include "daedalus.fullname" .)) }}
          {{- with .Values.backend.deepThinker.env.overrides }}
          env:
            {{- range $k, $v := . }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- end }}
          volumeMounts:
            {{- if .Values.backend.deepThinker.config.enabled }}
            - name: backend-config
              mountPath: /workspace/config.yaml
              subPath: config.yaml
            {{- end }}
            {{- if .Values.backend.persistence.enabled }}
            - name: backend-data
              mountPath: /data
            {{- end }}
            {{- if .Values.backend.skills.enabled }}
            - name: skills
              mountPath: {{ .Values.backend.skills.mountPath | default "/skills" }}
              readOnly: true
            {{- end }}
      {{- if or .Values.backend.persistence.enabled .Values.backend.skills.enabled .Values.backend.deepThinker.config.enabled }}
      volumes:
        {{- if .Values.backend.persistence.enabled }}
        - name: backend-data
          persistentVolumeClaim:
            claimName: {{ include "daedalus.fullname" . }}-backend
        {{- end }}
        {{- if .Values.backend.deepThinker.config.enabled }}
        - name: backend-config
          configMap:
            name: {{ include "daedalus.fullname" . }}-backend-deep-thinker-config
        {{- end }}
        {{- if .Values.backend.skills.enabled }}
        - name: skills
          {{- if .Values.backend.skills.pvcName }}
          persistentVolumeClaim:
            claimName: {{ .Values.backend.skills.pvcName }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "daedalus.fullname" . }}-backend-deep-thinker
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.deepThinker.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "daedalus.name" . }}
    app.kubernetes.io/component: backend-deep-thinker
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.backend.deepThinker.service.port }}
      targetPort: http
      name: http
{{- end }}
