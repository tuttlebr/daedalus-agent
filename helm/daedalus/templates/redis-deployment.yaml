{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "daedalus.fullname" . }}-redis
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "daedalus.name" . }}
      app.kubernetes.io/component: redis
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "daedalus.name" . }}
        app.kubernetes.io/component: redis
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        deploy-timestamp: {{ .Values.forceRedeploy | default "" | quote }}
        checksum/redis-auth-config: {{ include "daedalus.redisAuthConfigChecksum" . }}
        checksum/redis-init: {{ include (print $.Template.BasePath "/redis-init-configmap.yaml") . | sha256sum }}
    spec:
      {{- include "daedalus.nodePlacement" . | nindent 6 }}
      automountServiceAccountToken: false
      {{- with .Values.redis.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: {{ include "daedalus.image" .Values.images.redis | quote }}
          imagePullPolicy: {{ .Values.images.redis.pullPolicy }}
          {{- with .Values.redis.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["/bin/bash", "/scripts/init-redis.sh"]
          env:
          {{- if .Values.redis.auth.enabled }}
            - name: REDIS_USERNAME
              value: {{ .Values.redis.auth.username | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "daedalus.redisSecretName" . }}
                  key: {{ .Values.redis.auth.secretKey | default "REDIS_PASSWORD" }}
            - name: REDIS_PREVIOUS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "daedalus.redisSecretName" . }}
                  key: {{ .Values.redis.auth.previousSecretKey | default "REDIS_PREVIOUS_PASSWORD" }}
                  optional: true
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ include "daedalus.redisSecretName" . }}
                  key: {{ .Values.redis.auth.secretKey | default "REDIS_PASSWORD" }}
          {{- end }}
            - name: REDIS_TLS_ENABLED
              value: {{ .Values.redis.tls.enabled | quote }}
            {{- if .Values.redis.tls.enabled }}
            - name: REDIS_TLS_CERT_FILE
              value: {{ printf "%s/%s" (.Values.redis.tls.mountPath | default "/etc/redis-tls") (.Values.redis.tls.certKey | default "tls.crt") | quote }}
            - name: REDIS_TLS_KEY_FILE
              value: {{ printf "%s/%s" (.Values.redis.tls.mountPath | default "/etc/redis-tls") (.Values.redis.tls.privateKeyKey | default "tls.key") | quote }}
            - name: REDIS_TLS_CA_FILE
              value: {{ printf "%s/%s" (.Values.redis.tls.mountPath | default "/etc/redis-tls") (.Values.redis.tls.caKey | default "ca.crt") | quote }}
            {{- end }}
          ports:
            - containerPort: 6379
              name: redis
          livenessProbe:
            exec:
              command:
                - redis-cli
                {{- if .Values.redis.tls.enabled }}
                - --tls
                - --cacert
                - {{ printf "%s/%s" (.Values.redis.tls.mountPath | default "/etc/redis-tls") (.Values.redis.tls.caKey | default "ca.crt") | quote }}
                {{- end }}
                {{- if .Values.redis.auth.enabled }}
                - --user
                - {{ .Values.redis.auth.username | quote }}
                {{- end }}
                - ping
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            exec:
              command:
                - redis-cli
                {{- if .Values.redis.tls.enabled }}
                - --tls
                - --cacert
                - {{ printf "%s/%s" (.Values.redis.tls.mountPath | default "/etc/redis-tls") (.Values.redis.tls.caKey | default "ca.crt") | quote }}
                {{- end }}
                {{- if .Values.redis.auth.enabled }}
                - --user
                - {{ .Values.redis.auth.username | quote }}
                {{- end }}
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.redis.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: init-script
              mountPath: /scripts
            {{- if .Values.redis.persistence.enabled }}
            - name: redis-data
              mountPath: /data
            {{- end }}
            {{- if .Values.redis.tls.enabled }}
            - name: redis-tls
              mountPath: {{ .Values.redis.tls.mountPath | default "/etc/redis-tls" }}
              readOnly: true
            {{- end }}
      volumes:
        - name: init-script
          configMap:
            name: {{ include "daedalus.fullname" . }}-redis-init
            defaultMode: 0755
        {{- if .Values.redis.persistence.enabled }}
        - name: redis-data
          {{- if and .Values.redis.persistence.create (not .Values.redis.persistence.existingClaimName) }}
          persistentVolumeClaim:
            claimName: {{ include "daedalus.fullname" . }}-redis
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ .Values.redis.persistence.existingClaimName }}
          {{- end }}
        {{- end }}
        {{- if .Values.redis.tls.enabled }}
        - name: redis-tls
          secret:
            secretName: {{ include "daedalus.redisTlsSecretName" . }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "daedalus.fullname" . }}-redis
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
spec:
  type: {{ .Values.redis.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "daedalus.name" . }}
    app.kubernetes.io/component: redis
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: redis
      name: redis
{{- end }}
