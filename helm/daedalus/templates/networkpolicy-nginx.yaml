{{- if and .Values.backend.networkPolicy.enabled (not .Values.backend.networkPolicy.cilium.enabled) .Values.nginx.enabled }}
# Standard Kubernetes egress policy for nginx. It proxies to the frontend and
# WebSocket port, plus direct backend API paths when unrestricted mode is used.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "daedalus.fullname" . }}-nginx
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "daedalus.name" . }}
      app.kubernetes.io/component: nginx
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.frontend.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "daedalus.name" . }}
              app.kubernetes.io/component: frontend
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: {{ .Values.frontend.port }}
        - protocol: TCP
          port: 3001
    {{- end }}
    {{- if .Values.backend.default.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "daedalus.name" . }}
              app.kubernetes.io/component: backend-default
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.default.port }}
    {{- end }}
{{- end }}
