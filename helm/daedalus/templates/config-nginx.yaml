{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "daedalus.fullname" . }}-nginx-conf
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
data:
  frontend.conf: |-
{{- if .Values.nginx.config.useTemplate }}
{{- $frontendHost := printf "%s-frontend.%s.svc.cluster.local" (include "daedalus.fullname" .) .Release.Namespace -}}
{{- $frontendSvc := (lookup "v1" "Service" .Release.Namespace (printf "%s-frontend" (include "daedalus.fullname" .))) -}}
{{- $frontendUpstreamHost := dig "spec" "clusterIP" $frontendHost ($frontendSvc | default dict) -}}
{{- $_ := set . "_frontendHTTPUpstream" (printf "http://%s:3000" $frontendUpstreamHost) -}}
{{- $_ := set . "_frontendWSUpstream" (printf "http://%s:3001" $frontendUpstreamHost) -}}
{{- $backendDefaultHost := printf "%s-backend-default.%s.svc.cluster.local" (include "daedalus.fullname" .) .Release.Namespace -}}
{{- $backendDefaultSvc := (lookup "v1" "Service" .Release.Namespace (printf "%s-backend-default" (include "daedalus.fullname" .))) -}}
{{- $backendDefaultUpstreamHost := dig "spec" "clusterIP" $backendDefaultHost ($backendDefaultSvc | default dict) -}}
{{- $_ := set . "_backendDefaultUpstream" (printf "http://%s:%v" $backendDefaultUpstreamHost .Values.backend.default.port) -}}
{{ tpl (printf "%s" (include "nginx.frontend.conf.template" .)) . | nindent 4 }}
{{- else }}
{{ .Values.nginx.config.rawConf | nindent 4 }}
{{- end }}
{{- end }}

{{/* Single nginx template; restrictedMode only changes direct-backend routes. */}}
{{- define "nginx.frontend.conf.template" -}}
{{`# Nginx configuration for the Next.js frontend and API routing

# Map directive for conditional WebSocket upgrade header
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Main server block
server {
    listen 80;
    {{- if .Values.nginx.https.enabled }}
    listen 443 ssl http2;
    {{- end }}
    server_name localhost;

    # Upstreams are rendered by Helm. Prefer Service ClusterIPs when available
    # so frontend availability does not depend on per-request nginx DNS lookups.

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # TLS (enabled when https.enabled)
    {{- if .Values.nginx.https.enabled }}
    ssl_certificate /etc/nginx/ssl/tls.crt;
    ssl_certificate_key /etc/nginx/ssl/tls.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    {{- end }}

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # This confirms that nginx itself is alive without making its lifecycle
    # depend on the frontend application. Readiness still probes the frontend
    # health route, so traffic is only sent here when the application is ready.
    location = /healthz {
        access_log off;
        return 204;
    }

    # Client settings
    client_max_body_size {{ .Values.nginx.config.clientMaxBodySize | default "268M" }};  # Encoded upload ceiling; application routes enforce raw limits
    client_body_timeout 900s;
    client_header_timeout 900s;

    # Proxy settings
    proxy_connect_timeout 900s;
    proxy_send_timeout 900s;
    proxy_read_timeout 900s;
    proxy_buffering off;
    proxy_request_buffering off;

    {{- if .Values.nginx.config.restrictedMode }}
    # OAuth callback required by NAT's interactive MCP OAuth flow.
    # Keep this exact route open while blocking all other direct backend paths.
    location = /auth/redirect {
        proxy_pass {{ ._backendDefaultUpstream }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Browser and API traffic must go through the frontend in restricted mode.
    location ~ ^/(v1|generate|chat|evaluate|upload|tools|health|auth)(/|$) {
        return 403 "Direct API access is forbidden. Please use the application interface.";
    }
    {{- end }}

    # Reject oversized base64 document JSON before it reaches Next.js. This
    # matches the route's static parser ceiling.
    location = /api/session/documentStorage {
        client_max_body_size {{ .Values.nginx.config.documentUploadMaxBodySize | default "268M" }};
        proxy_pass {{ ._frontendHTTPUpstream }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    # Frontend API routes - Long-running AI requests
    location /api/chat {
        proxy_pass {{ ._frontendHTTPUpstream }};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;

        # Increase timeouts for long AI requests (10 minutes)
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # Enable chunked responses
        chunked_transfer_encoding on;
    }

    # Image generation and editing can take up to the backend's 300s request
    # limit. Keep the browser-to-frontend hop alive past that limit and retain
    # streaming semantics for the legacy image endpoints.
    location /api/images/ {
        proxy_pass {{ ._frontendHTTPUpstream }};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        proxy_max_temp_file_size 0;

        proxy_connect_timeout 360s;
        proxy_send_timeout 360s;
        proxy_read_timeout 360s;
        chunked_transfer_encoding on;
    }

    # Other frontend API routes
    location /api/ {
        proxy_pass {{ ._frontendHTTPUpstream }};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Standard timeout for other API routes
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
    }

    # WebSocket sidecar - real-time communication
    location /ws {
        proxy_pass {{ ._frontendWSUpstream }};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # Main application - Next.js frontend
    location / {
        proxy_pass {{ ._frontendHTTPUpstream }};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Handle Next.js specific paths
        proxy_set_header Accept-Encoding "";
    }

    {{- if not .Values.nginx.config.restrictedMode }}
    # API routes - OpenAI compatible endpoint
    location /v1/ {
        proxy_pass {{ ._backendDefaultUpstream }};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Enable streaming for chat completions
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # SSE specific headers
        proxy_set_header Cache-Control no-cache;
        proxy_set_header X-Accel-Buffering no;

        # Increase timeouts for long-running requests and MCP OAuth consent.
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # Enable chunked responses
        chunked_transfer_encoding on;
    }

    # NAT generate endpoints (including streaming)
    location /generate/ {
        proxy_pass {{ ._backendDefaultUpstream }};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Enable streaming
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # SSE specific headers
        proxy_set_header Cache-Control no-cache;
        proxy_set_header X-Accel-Buffering no;

        # Increase timeouts for long-running requests
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Enable chunked responses
        chunked_transfer_encoding on;
    }

    # Chat endpoints
    location /chat/ {
        proxy_pass {{ ._backendDefaultUpstream }};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Enable streaming
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # SSE specific headers
        proxy_set_header Cache-Control no-cache;
        proxy_set_header X-Accel-Buffering no;

        # Increase timeouts for long-running requests
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Enable chunked responses
        chunked_transfer_encoding on;
    }

    # Session endpoints (mock responses since NAT backend is stateless)
    location = /session/create {
        add_header Content-Type application/json;
        return 200 '{"session_id": "session-$request_id", "created": true}';
    }

    location ~ ^/session/([a-zA-Z0-9\-_]+)$ {
        add_header Content-Type application/json;
        if ($request_method = GET) {
            return 200 '{"session_id": "$1", "status": "active", "created_at": "2024-01-01T00:00:00Z"}';
        }
        if ($request_method = DELETE) {
            return 200 '{"session_id": "$1", "deleted": true}';
        }
        return 404 '{"error": "Session method not supported"}';
    }

    # Upload endpoints
    location ~ ^/(upload|tools|health)/ {
        proxy_pass {{ ._backendDefaultUpstream }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large file uploads
        client_max_body_size {{ .Values.nginx.config.clientMaxBodySize | default "268M" }};
        proxy_request_buffering off;
    }

    # Evaluate endpoints
    location /evaluate {
        proxy_pass {{ ._backendDefaultUpstream }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for evaluation jobs
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Auth redirect endpoint
    location /auth/redirect {
        proxy_pass {{ ._backendDefaultUpstream }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    {{- end }}

    # Image serving endpoint - serve directly from volume
    {{- if or (not .Values.nginx.config.restrictedMode) .Values.nginx.imageVolume.enabled }}
    location /images/ {
        alias /tmp/generated_images/;
        try_files $uri =404;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;

        # Cache images for better performance
        expires 1h;
        add_header Cache-Control "public, max-age=3600";

        # Only allow image files
        location ~* \.(jpg|jpeg|png|gif)$ {
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }
    }
    {{- end }}

    {{- if not .Values.nginx.config.restrictedMode }}
    # Backend health check endpoint
    location = /health {
        proxy_pass {{ ._backendDefaultUpstream }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    {{- end }}

    # Static files caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass {{ ._frontendHTTPUpstream }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Next.js specific routes
    location /_next/ {
        proxy_pass {{ ._frontendHTTPUpstream }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache Next.js assets
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Handle favicon
    location /favicon.ico {
        proxy_pass {{ ._frontendHTTPUpstream }}/favicon.ico;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
`}}
{{- end }}
