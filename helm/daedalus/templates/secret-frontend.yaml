{{- if and .Values.frontend.enabled (not .Values.frontend.env.fromSecret) .Values.frontend.env.createSecret }}
{{- $secretName := printf "%s-frontend-env" (include "daedalus.fullname" .) }}
{{- /*
  SESSION_SECRET resolution priority:
    1. Explicit value in .Values.frontend.env.data.SESSION_SECRET
    2. Existing in-cluster Secret (preserves value across `helm upgrade`,
       so identity cookies aren't invalidated on each release)
    3. Auto-generated 64-char value (first install only)
  Rotating it logs every user out, so we never want to regenerate silently.
*/ -}}
{{- $providedSecret := default "" (get (.Values.frontend.env.data | default dict) "SESSION_SECRET") }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $existingSecret := "" }}
{{- if $existing }}
{{- $existingSecret = default "" (get ($existing.data | default dict) "SESSION_SECRET") }}
{{- if $existingSecret }}{{ $existingSecret = $existingSecret | b64dec }}{{ end }}
{{- end }}
{{- $sessionSecret := $providedSecret }}
{{- if not $sessionSecret }}{{ $sessionSecret = $existingSecret }}{{ end }}
{{- if not $sessionSecret }}{{ $sessionSecret = randAlphaNum 64 }}{{ end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
type: Opaque
stringData:
  SESSION_SECRET: {{ $sessionSecret | quote }}
{{- range $k, $v := .Values.frontend.env.data }}
{{- if ne $k "SESSION_SECRET" }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
{{- end }}
