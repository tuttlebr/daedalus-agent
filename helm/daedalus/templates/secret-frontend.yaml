{{- if and .Values.frontend.enabled .Values.frontend.env.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "daedalus.fullname" . }}-frontend-env
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
type: Opaque
data:
{{- range $k, $v := .Values.frontend.env.data }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
