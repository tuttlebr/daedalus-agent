{{- if and .Values.frontend.enabled (not .Values.frontend.env.fromSecret) .Values.frontend.env.createSecret }}
{{- $secretName := printf "%s-frontend-env" (include "daedalus.fullname" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $k, $v := .Values.frontend.env.data }}
{{- if not (regexMatch "^(DEPLOYMENT_MODE|BACKEND_(HOST|NAMESPACE|PORT|API_PATH)|DOCUMENT_INGEST_TIMEOUT_MS|NAT_(SUBMIT_MAX_RETRIES|RETRY_DELAY_MS|CONNECTIVITY_TIMEOUT_MS)|STREAM_(ABORT_POLL_INTERVAL_MS|READ_IDLE_TIMEOUT_MS)|DAEDALUS_(DEBUG_REPLAY|DEFAULT_USER)|DOCUMENT_UPLOAD_(MAX_MB|MAX_CONCURRENT_PER_USER)|NEXT_PUBLIC_[A-Z0-9_]+|DEFAULT_MODEL|FORCE_SECURE_COOKIES|WS_[A-Z0-9_]+|FRONTEND_READY_TIMEOUT_MS|REDIS_(MAX_RETRIES_PER_REQUEST|COMMAND_TIMEOUT_MS)|VAPID_PRIVATE_KEY|GENERATED_IMAGE_LEGACY_PUBLIC|ADMIN_USERNAME|USAGE_TRACKING_INTERNAL_TOKEN|AUTH_(USERNAME|PASSWORD|NAME|LOGIN_WINDOW_SECONDS|LOGIN_LOCKOUT_SECONDS|LOGIN_MAX_ATTEMPTS|TRUSTED_PROXY_HOPS)|AUTH_USER_[0-9]+_(USERNAME|PASSWORD|NAME)|LOG_LEVEL)$" $k) }}
{{- fail (printf "frontend.env.data key %s is not in the frontend workload allowlist" $k) }}
{{- end }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
