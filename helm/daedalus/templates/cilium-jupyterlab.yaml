{{- if and .Values.jupyterlab.enabled .Values.backend.networkPolicy.cilium.enabled }}
# Cilium egress policy for JupyterLab — FQDN-restricted external access.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "daedalus.fullname" . }}-jupyterlab-cilium
  labels:
    {{- include "daedalus.labels" . | nindent 4 }}
    app.kubernetes.io/component: jupyterlab
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "daedalus.name" . }}
      app.kubernetes.io/component: jupyterlab
      app.kubernetes.io/instance: {{ .Release.Name }}
  egress:
    # DNS — pod-networked CoreDNS
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    # DNS — host-networked CoreDNS (bare-metal / kubeadm clusters)
    - toEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"

    # Redis
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: {{ include "daedalus.name" . }}
            app.kubernetes.io/component: redis
            app.kubernetes.io/instance: {{ .Release.Name }}
      toPorts:
        - ports:
            - port: {{ .Values.redis.service.port | quote }}
              protocol: TCP

    # Backend default
    {{- if .Values.backend.default.enabled }}
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: {{ include "daedalus.name" . }}
            app.kubernetes.io/component: backend-default
            app.kubernetes.io/instance: {{ .Release.Name }}
      toPorts:
        - ports:
            - port: {{ .Values.backend.default.port | quote }}
              protocol: TCP
    {{- end }}

    # Backend deep thinker
    {{- if .Values.backend.deepThinker.enabled }}
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: {{ include "daedalus.name" . }}
            app.kubernetes.io/component: backend-deep-thinker
            app.kubernetes.io/instance: {{ .Release.Name }}
      toPorts:
        - ports:
            - port: {{ .Values.backend.deepThinker.port | quote }}
              protocol: TCP
    {{- end }}

    # Milvus vector database
    {{- if .Values.jupyterlab.env.milvusNamespace }}
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: {{ .Values.jupyterlab.env.milvusNamespace }}
      toPorts:
        - ports:
            - port: {{ .Values.jupyterlab.env.milvusPort | default "19530" | quote }}
              protocol: TCP
    {{- end }}

    # External FQDN allowlist — LLM APIs and package repos
    - toFQDNs:
        # NVIDIA APIs (same as backend)
        - matchPattern: "*.api.nvidia.com"
        - matchPattern: "*.api.nvcf.nvidia.com"
        - matchName: "inference-api.nvidia.com"
        # NVCF control plane
        - matchName: "connect.pnats.nvcf.nvidia.com"
        - matchName: "grpc.api.nvcf.nvidia.com"
        - matchName: "spot.gdn.nvidia.com"
        - matchName: "ess.ngc.nvidia.com"
        - matchName: "api.ngc.nvidia.com"
        - matchPattern: "sqs.*.amazonaws.com"
        # Package management (pip, conda for notebook workflows)
        - matchName: "pypi.org"
        - matchName: "files.pythonhosted.org"
        - matchName: "conda.anaconda.org"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

    {{- with .Values.backend.networkPolicy.cilium.extraFQDNs }}
    # Additional user-defined FQDNs
    - toFQDNs:
        {{- range . }}
        - matchName: {{ . | quote }}
        {{- end }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    {{- end }}
{{- end }}
