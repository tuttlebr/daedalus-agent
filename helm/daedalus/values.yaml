global:
  nameOverride: ''
  fullnameOverride: ''
  networkName: daedalus-network
  # Shared frontend-to-backend token. Leave empty to let Helm generate and
  # preserve one in <release>-daedalus-internal-api.
  internalApiToken: ''
  # Restrict pod scheduling to these nodes; leave empty to allow any node
  nodePlacement:
    allowedNodes: [] # e.g. ["daedalus-02", "daedalus-03"]

# Change this value to restart workloads after externally managed Secret
# content changes. deploy.sh supplies a fresh timestamp automatically.
forceRedeploy: ''

images:
  # Tags are development fallbacks. Release automation resolves and deploys
  # immutable digests so later tag changes can't alter an existing release.
  backend:
    repository: YOUR_REGISTRY/daedalus
    tag: backend-0.1.0
    digest: ''
    pullPolicy: Always
  frontend:
    repository: YOUR_REGISTRY/daedalus
    tag: frontend-0.1.0
    digest: ''
    pullPolicy: Always
  nginx:
    repository: nginxinc/nginx-unprivileged
    tag: alpine
    digest: 'sha256:a718212f9cf21e241f14067333000a3f0930292f5354fe0db269e9a2a2596b9e'
    pullPolicy: Always
  redis:
    # This repository-owned image preserves Redis Stack 7.4.0-v8 data and
    # module compatibility while applying current Ubuntu security updates.
    repository: YOUR_REGISTRY/daedalus
    tag: redis-0.1.0
    digest: ''
    pullPolicy: Always

# Shared object-store contract for streamed document uploads. Keep credentials
# in this dedicated Secret rather than any workload's general envFrom Secret.
# Production credentials should come from an externally managed Secret.
documentObjectStorage:
  enabled: false
  endpoint: ''
  bucket: nv-ingest
  region: us-east-1
  prefix: daedalus-documents
  expirySeconds: 604800
  # Shared deadline for frontend S3-compatible uploads and backend object reads.
  # The applications and chart enforce 100..900000 milliseconds.
  requestTimeoutMs: 300000
  networkPolicy:
    # inCluster selects one namespace and port. external requires explicit
    # CIDRs for standard NetworkPolicy or exact FQDNs/CIDRs for Cilium. These
    # rules strictly scope frontend egress. Backend rules are additive when its
    # general public webscrape egress is enabled; see the chart README.
    mode: inCluster
    namespace: milvus
    port: 9000
    external:
      port: 443
      cidrs: []
      fqdnNames: []
  auth:
    existingSecret: ''
    accessKey: ''
    secretKey: ''
    sessionToken: ''
    accessKeyKey: DOCUMENT_OBJECT_ACCESS_KEY
    secretKeyKey: DOCUMENT_OBJECT_SECRET_KEY
    sessionTokenKey: DOCUMENT_OBJECT_SESSION_TOKEN

backend:
  # Default backend configuration
  default:
    enabled: true
    replicas: 1
    port: 8000
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
    env:
      # Name of an existing Secret to load via envFrom (external secret)
      fromSecret: ''
      # If you prefer Helm to create the Secret, set createSecret=true and provide key/value pairs under data
      createSecret: false
      data: {}
      # Explicit env overrides applied in the pod, useful to fix bad values from secrets
      overrides:
        SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
        # Trust nginx proxy headers so OAuth callbacks reconstruct the public
        # https://... redirect URI during token exchange.
        FORWARDED_ALLOW_IPS: '*'
    config:
      enabled: true
      # Contents of backend/tool-calling-config.yaml; set with --set-file.
      # If empty, the ConfigMap renders an empty config.yaml.
      data: ''
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 10Gi
    service:
      type: ClusterIP
      port: 8000

  # Shared backend configuration
  pdb:
    enabled: true
    minAvailable: 1
  networkPolicy:
    enabled: true # Set to true to restrict backend access to only frontend and nginx pods
    # Additional namespaces allowed to call backend pods. Ports default to the
    # backend HTTP port when omitted.
    extraIngressNamespaces: []
    # - name: monitoring
    #   ports:
    #     - port: 8000
    #       protocol: TCP
    # Additional namespaces backend pods may call. Keep ports explicit unless
    # the target namespace is fully trusted.
    extraEgressNamespaces: []
    # - name: llm-gateway
    #   ports:
    #     - port: 8000
    #       protocol: TCP
    cilium:
      enabled: false # Set to true to deploy CiliumNetworkPolicy resources (requires Cilium CNI)
      webscrape:
        enabled: true # Allow backend pods broad HTTP/HTTPS egress for the webscrape tool
        l7Filtering: false # When true, restrict webscrape egress to GET/HEAD only (blocks POST exfiltration)
      extraFQDNs: [] # Additional domains to allow, e.g. ["custom-api.example.com"]
  persistence:
    enabled: true
    size: 8Gi
    storageClassName: ''
    create: true
    # Legacy single-claim override (applies to both backends). Prefer
    # existingClaimNames.<component> for reliability.
    existingClaimName: ''
    # Per-backend claim overrides. Leave empty to use chart-managed PVC names:
    # <release>-daedalus-backend-default
    existingClaimNames:
      default: ''
  # Agent Skills directory — skills are baked into the Docker image at /skills by default.
  # Set enabled: true to override with a PVC (useful for hot-swapping skills without rebuilding).
  # When enabled without a pvcName, an emptyDir is used (skills from the image are shadowed).
  skills:
    enabled: false
    mountPath: /skills
    pvcName: ''

frontend:
  enabled: true
  port: 3000
  # Frontend image already runs as non-root (nextjs:1001), so securityContext is safe here
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 12Gi
  env:
    fromSecret: ''
    createSecret: true
    # When createSecret is true, provide plaintext key/value pairs here.
    data: {}
    # SESSION_SECRET (used to sign identity cookies) lives in its own
    # chart-managed Secret regardless of fromSecret/createSecret. Auto-generated
    # on first install and preserved across upgrades via `lookup`. Pin to a
    # known value only if you need to share it across replicas or environments.
    sessionSecret: ''
    overrides:
      # Backend API path - controls which NAT API endpoint to use
      # Supported values: /chat, /chat/stream, /generate, /generate/stream, /v1/chat/completions
      BACKEND_API_PATH: '/v1/chat/completions'
      # Keep the heap below the pod limit. Upload routes enforce much smaller
      # request limits and stream document bytes outside Redis.
      NODE_OPTIONS: '--max-old-space-size=4096'
  service:
    type: ClusterIP
    port: 3000
  streamWorker:
    # Owns durable backend SSE execution outside the request-serving process.
    enabled: true
    replicas: 1
    # Keep worker-only runtime secrets separate from the request-serving
    # frontend Secret. Backend model, Milvus, Phoenix, and MinIO credentials
    # must never be placed here.
    env:
      fromSecret: ''
      createSecret: true
      data: {}
      overrides: {}
    concurrency: 4
    leaseTtlSeconds: 30
    heartbeatSeconds: 10
    cancelPollSeconds: 1
    reclaimIdleSeconds: 45
    reclaimScanSeconds: 10
    readBlockMs: 1000
    drainTimeoutSeconds: 45
    healthMaxAgeSeconds: 30
    terminationGracePeriodSeconds: 60
    pdb:
      enabled: true
      minAvailable: 1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 4Gi

nginx:
  enabled: true
  securityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 8Gi
  httpPort: 80
  containerPort: 8080
  https:
    enabled: false
    tlsSecretName: ''
    containerPort: 8443
  config:
    useTemplate: true
    restrictedMode: true # Set to true to block direct API access through nginx
    clientMaxBodySize: '32M' # Default hard ceiling for normal JSON requests
    documentUploadMaxBodySize: '201M' # 200 MiB raw file plus bounded multipart framing
    videoUploadMaxBodySize: '150M' # Legacy base64 route parser ceiling
    imageUploadMaxBodySize: '14M' # Legacy base64 route parser ceiling
    transcriptUploadMaxBodySize: '15M' # Transcript route parser ceiling
    # If useTemplate is false, rawConf is used
    rawConf: |
      # Provide nginx conf if not using template
  imageVolume:
    enabled: true
    size: 8Gi
    storageClassName: ''
    create: true
    existingClaimName: ''
  service:
    type: ClusterIP

redis:
  enabled: true
  auth:
    # Redis 6+ ACL user used by every application client. Helm creates and
    # preserves a strong password unless an existing Secret is supplied.
    enabled: true
    username: daedalus
    password: ''
    # During rotation, set this to the former password for one rollout. Redis
    # accepts both while old pods drain. Clear it in the next rollout.
    previousPassword: ''
    existingSecret: ''
    secretKey: REDIS_PASSWORD
    previousSecretKey: REDIS_PREVIOUS_PASSWORD
  tls:
    # TLS requires an existing Secret with a server certificate, private key,
    # and issuing CA. The certificate must cover the Redis Service DNS names.
    enabled: false
    existingSecret: ''
    certKey: tls.crt
    privateKeyKey: tls.key
    caKey: ca.crt
    mountPath: /etc/redis-tls
  # Redis Stack runs fine as a numeric non-root user, and this avoids
  # root-squash/AOF write failures on common Kubernetes PVC backends.
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 8Gi
  persistence:
    enabled: true
    size: 64Gi
    storageClassName: ''
    create: true
    existingClaimName: ''
  service:
    type: ClusterIP
    port: 6379

autonomousAgent:
  # Dedicated autonomous worker that curates memories, monitors news feeds,
  # follows UI-managed goals, and publishes state to the Autonomy dashboard.
  enabled: true
  # Set suspend: true to pause the worker Deployment without removing it.
  suspend: false
  replicas: 1
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]
  # HTTP/poll timeout for a single autonomous backend run
  requestTimeout: 3600
  # Use the already-loaded workflow over SSE.
  backendApiPath: '/v1/chat/completions'
  # User whose memory and conversation history the agent operates on
  userId: 'default-user'
  worker:
    # Poll interval for queue and schedule checks
    pollIntervalSeconds: 10
    # Lease TTL prevents multiple replicas from running the same user concurrently
    leaseTtlSeconds: 60
    # Default autonomous run interval; can be changed later from the UI dashboard
    intervalSeconds: 14400
  env:
    # Normally empty. The internal backend token and Redis credential are
    # injected directly. Never reuse the backend Secret here.
    fromSecret: ''
    overrides: {}
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 8Gi

ingress:
  enabled: true
  className: ''
  annotations:
    # Nginx Ingress Controller - Increase timeouts for long-running AI requests (comprehensive_research_agent can take up to 15 minutes)
    nginx.ingress.kubernetes.io/proxy-connect-timeout: '900'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '900'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '900'
    # Ingress annotations apply to every path in this Ingress. Application and
    # inner-nginx routes still enforce smaller endpoint-specific ceilings.
    nginx.ingress.kubernetes.io/proxy-body-size: '201m'
    # Disable buffering for streaming responses
    nginx.ingress.kubernetes.io/proxy-buffering: 'off'
    nginx.ingress.kubernetes.io/proxy-request-buffering: 'off'
    # Traefik Ingress Controller (alternative)
    # traefik.ingress.kubernetes.io/timeout: "900s"
    # HAProxy Ingress Controller (alternative)
    # haproxy.org/timeout-client: "900s"
    # haproxy.org/timeout-server: "900s"
  hosts:
    - host: your-domain.example.com
      # Additional hosts can be added here
  tls:
    - secretName: daedalus-tls
      hosts:
        - your-domain.example.com
