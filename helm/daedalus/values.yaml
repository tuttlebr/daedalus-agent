global:
  nameOverride: ''
  fullnameOverride: ''
  networkName: daedalus-network
  # Shared frontend-to-backend token. Leave empty to let Helm generate and
  # preserve one in <release>-daedalus-internal-api.
  internalApiToken: ''
  # Restrict pod scheduling to these nodes; leave empty to allow any node
  nodePlacement:
    allowedNodes: [] # e.g. ["daedalus-02", "daedalus-03"]

images:
  builder:
    repository: YOUR_REGISTRY/daedalus
    tag: builder-0.1.0
    pullPolicy: Always
  backend:
    repository: YOUR_REGISTRY/daedalus
    tag: backend-0.1.0
    pullPolicy: Always
  frontend:
    repository: YOUR_REGISTRY/daedalus
    tag: frontend-0.1.0
    pullPolicy: Always
  nginx:
    repository: nginx
    tag: alpine
    pullPolicy: Always
  redis:
    repository: redis/redis-stack-server
    tag: '7.2.0-v19'
    pullPolicy: Always
  redisinsight:
    repository: redis/redisinsight
    tag: '2.70'
    pullPolicy: Always

backend:
  # Default backend configuration
  default:
    enabled: true
    replicas: 1
    port: 8000
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    env:
      # Name of an existing Secret to load via envFrom (external secret)
      fromSecret: ''
      # If you prefer Helm to create the Secret, set createSecret=true and provide key/value pairs under data
      createSecret: false
      data: {}
      # Explicit env overrides applied in the pod, useful to fix bad values from secrets
      overrides:
        SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
        # Trust nginx proxy headers so OAuth callbacks reconstruct the public
        # https://... redirect URI during token exchange.
        FORWARDED_ALLOW_IPS: '*'
    config:
      enabled: true
      # Contents of backend/tool-calling-config.yaml; set with --set-file.
      # If empty, the ConfigMap renders an empty config.yaml.
      data: ''
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 10Gi
    service:
      type: ClusterIP
      port: 8000

  # Shared backend configuration
  pdb:
    enabled: true
    minAvailable: 1
  networkPolicy:
    enabled: true # Set to true to restrict backend access to only frontend and nginx pods
    # Additional namespaces allowed to call backend pods. Ports default to the
    # backend HTTP port when omitted.
    extraIngressNamespaces: []
    # - name: monitoring
    #   ports:
    #     - port: 8000
    #       protocol: TCP
    # Additional namespaces backend pods may call. Keep ports explicit unless
    # the target namespace is fully trusted.
    extraEgressNamespaces: []
    # - name: llm-gateway
    #   ports:
    #     - port: 8000
    #       protocol: TCP
    cilium:
      enabled: false # Set to true to deploy CiliumNetworkPolicy resources (requires Cilium CNI)
      webscrape:
        enabled: true # Allow backend pods broad HTTP/HTTPS egress for the webscrape tool
        l7Filtering: false # When true, restrict webscrape egress to GET/HEAD only (blocks POST exfiltration)
      extraFQDNs: [] # Additional domains to allow, e.g. ["custom-api.example.com"]
  persistence:
    enabled: true
    size: 8Gi
    storageClassName: ''
    create: true
    # Legacy single-claim override (applies to both backends). Prefer
    # existingClaimNames.<component> for reliability.
    existingClaimName: ''
    # Per-backend claim overrides. Leave empty to use chart-managed PVC names:
    # <release>-daedalus-backend-default
    existingClaimNames:
      default: ''
  # Agent Skills directory — skills are baked into the Docker image at /skills by default.
  # Set enabled: true to override with a PVC (useful for hot-swapping skills without rebuilding).
  # When enabled without a pvcName, an emptyDir is used (skills from the image are shadowed).
  skills:
    enabled: false
    mountPath: /skills
    pvcName: ''

frontend:
  enabled: true
  port: 3000
  # Frontend image already runs as non-root (nextjs:1001), so securityContext is safe here
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 12Gi
  env:
    fromSecret: ''
    createSecret: true
    # When createSecret is true, provide plaintext key/value pairs here.
    data: {}
    # SESSION_SECRET (used to sign identity cookies) lives in its own
    # chart-managed Secret regardless of fromSecret/createSecret. Auto-generated
    # on first install and preserved across upgrades via `lookup`. Pin to a
    # known value only if you need to share it across replicas or environments.
    sessionSecret: ''
    overrides:
      # Backend API path - controls which NAT API endpoint to use
      # Supported values: /chat, /chat/stream, /generate, /generate/stream, /v1/chat/completions
      BACKEND_API_PATH: '/v1/chat/completions'
      # Uploaded document ingestion uses the direct streaming endpoint by default.
      # Set to "0" only to force the legacy NAT async fallback.
      DAEDALUS_DIRECT_DOCUMENT_INGEST_STREAM: '1'
      # V8 heap ceiling — sized under the pod memory limit to leave headroom for off-heap Buffers
      # during large-document base64 decode (200MB doc ≈ 267MB base64 + multiple copies in flight)
      NODE_OPTIONS: '--max-old-space-size=8192'
  service:
    type: ClusterIP
    port: 3000

nginx:
  enabled: true
  securityContext: {}
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 8Gi
  httpPort: 80
  https:
    enabled: false
    tlsSecretName: ''
  config:
    useTemplate: true
    restrictedMode: true # Set to true to block direct API access through nginx
    # If useTemplate is false, rawConf is used
    rawConf: |
      # Provide nginx conf if not using template
    # Leave empty to default to the in-cluster FQDN of the backend Service
    backendHost: ''
    backendPort: 8000
  imageVolume:
    enabled: true
    size: 8Gi
    storageClassName: ''
    create: true
    existingClaimName: ''
  service:
    type: ClusterIP

redis:
  enabled: true
  # Redis Stack runs fine as a numeric non-root user, and this avoids
  # root-squash/AOF write failures on common Kubernetes PVC backends.
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    fsGroupChangePolicy: OnRootMismatch
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 8Gi
  persistence:
    enabled: true
    size: 64Gi
    storageClassName: ''
    create: true
    existingClaimName: ''
  service:
    type: ClusterIP
    port: 6379

redisinsight:
  enabled: true
  securityContext: {}
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 8Gi
  persistence:
    enabled: true
    size: 8Gi
    storageClassName: ''
    create: true
    existingClaimName: ''
  service:
    type: ClusterIP
    port: 5540
  env:
    overrides: {}

autonomousAgent:
  # Dedicated autonomous worker that curates memories, monitors news feeds,
  # follows UI-managed goals, and publishes state to the Autonomy dashboard.
  enabled: true
  # Set suspend: true to pause the worker Deployment without removing it.
  suspend: false
  replicas: 1
  securityContext: {}
  # HTTP/poll timeout for a single autonomous backend run
  requestTimeout: 3600
  # Which backend API path to use
  # "/chat/stream" — SSE streaming (single long-lived connection, subject to REQUEST_TIMEOUT)
  # "/v1/workflow/async" — submit + poll (tolerates long-running agent cycles)
  backendApiPath: '/v1/workflow/async'
  # User whose memory and conversation history the agent operates on
  userId: 'default-user'
  worker:
    # Poll interval for queue and schedule checks
    pollIntervalSeconds: 10
    # Lease TTL prevents multiple replicas from running the same user concurrently
    leaseTtlSeconds: 60
    # Default autonomous run interval; can be changed later from the UI dashboard
    intervalSeconds: 14400
  env:
    # Load API keys from the same secret as the backend (needed if backend
    # requires auth headers; usually not needed since the agent calls the
    # in-cluster backend service directly)
    fromSecret: ''
    overrides: {}
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 8Gi

ingress:
  enabled: true
  className: ''
  annotations:
    # Nginx Ingress Controller - Increase timeouts for long-running AI requests (comprehensive_research_agent can take up to 15 minutes)
    nginx.ingress.kubernetes.io/proxy-connect-timeout: '900'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '900'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '900'
    nginx.ingress.kubernetes.io/proxy-body-size: '300m' # Support document uploads up to 200MB (base64 adds ~33% overhead)
    # Disable buffering for streaming responses
    nginx.ingress.kubernetes.io/proxy-buffering: 'off'
    nginx.ingress.kubernetes.io/proxy-request-buffering: 'off'
    # Traefik Ingress Controller (alternative)
    # traefik.ingress.kubernetes.io/timeout: "900s"
    # HAProxy Ingress Controller (alternative)
    # haproxy.org/timeout-client: "900s"
    # haproxy.org/timeout-server: "900s"
  hosts:
    - host: your-domain.example.com
      # Additional hosts can be added here
  tls:
    - secretName: daedalus-tls
      hosts:
        - your-domain.example.com
