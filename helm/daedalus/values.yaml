global:
  nameOverride: ""
  fullnameOverride: ""
  networkName: daedalus-network

images:
  builder:
    repository: daedalus.ddns.me:5050/btuttle/daedalus
    tag: builder-0.1.0
    pullPolicy: Always
  backend:
    repository: daedalus.ddns.me:5050/btuttle/daedalus
    tag: backend-0.1.0
    pullPolicy: Always
  frontend:
    repository: daedalus.ddns.me:5050/btuttle/daedalus
    tag: frontend-0.1.0
    pullPolicy: Always
  nginx:
    repository: nginx
    tag: alpine
    pullPolicy: Always
  redis:
    repository: redis
    tag: "8.0.3"
    pullPolicy: Always
  redisinsight:
    repository: redis/redisinsight
    tag: "latest"
    pullPolicy: Always

backend:
  enabled: true
  port: 8000
  env:
    # Name of an existing Secret to load via envFrom (external secret)
    fromSecret: ""
    # If you prefer Helm to create the Secret, set createSecret=true and provide key/value pairs under data
    createSecret: false
    data: {}
    # Explicit env overrides applied in the pod, useful to fix bad values from secrets
    overrides:
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
  config:
    enabled: true
    # Contents of backend/config.yaml; if empty, configMap not created
    data: |
      # Override to inject your backend config.yaml
  service:
    type: ClusterIP
    port: 8000
  networkPolicy:
    enabled: true # Set to true to restrict backend access to only frontend and nginx pods
  persistence:
    enabled: true
    size: 6Gi
    storageClassName: ""
    create: true
    existingClaimName: ""

frontend:
  enabled: true
  port: 3000
  env:
    fromSecret: ""
    createSecret: false
    data: {}
    overrides: {}
  service:
    type: ClusterIP
    port: 3000

nginx:
  enabled: true
  httpPort: 80
  https:
    enabled: true
    tlsSecretName: ""
  config:
    useTemplate: true
    restrictedMode: true # Set to true to block direct API access through nginx
    # If useTemplate is false, rawConf is used
    rawConf: |
      # Provide nginx conf if not using template
    # Leave empty to default to the in-cluster FQDN of the backend Service
    backendHost: ""
    backendPort: 8000
  imageVolume:
    enabled: true
    size: 1Gi
    storageClassName: ""
    create: true
    existingClaimName: ""
  service:
    type: ClusterIP

redis:
  enabled: true
  persistence:
    enabled: true
    size: 64Gi
    storageClassName: ""
    create: true
    existingClaimName: ""
  service:
    type: ClusterIP
    port: 6379

redisinsight:
  enabled: true
  persistence:
    enabled: true
    size: 4Gi
    storageClassName: ""
    create: true
    existingClaimName: ""
  service:
    type: ClusterIP
    port: 5540
  env:
    overrides: {}

ingress:
  enabled: true
  className: ""
  annotations:
    # Nginx Ingress Controller - Increase timeouts for long-running AI requests (comprehensive_research_agent can take up to 15 minutes)
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "900"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "900"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "900"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Disable buffering for streaming responses
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    # Traefik Ingress Controller (alternative)
    # traefik.ingress.kubernetes.io/timeout: "900s"
    # HAProxy Ingress Controller (alternative)
    # haproxy.org/timeout-client: "900s"
    # haproxy.org/timeout-server: "900s"
  hosts:
    - host: daedalus.ddns.me
      # Additional hosts can be added here
  tls:
    - secretName: daedalus-tls
      hosts:
        - daedalus.ddns.me
