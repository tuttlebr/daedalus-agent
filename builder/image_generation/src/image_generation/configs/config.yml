general:
  logging:
    console:
      _type: console
      level: INFO

  front_end:
    _type: fastapi

workflow:
  _type: image_generation
  api_endpoint: null   # Optional: override OpenAI base URL
  api_key: null        # Falls back to OPENAI_API_KEY env var
  timeout: 60.0
  model: "gpt-image-1.5"
  quality: null        # Optional: "low" (fast) or "high" (detail-heavy scenes)
  size: null           # Optional: "1024x1024", "1024x1536", "1536x1024", or "auto"
  n: null              # Optional: number of variations to generate (1-10)
  prompt_rewrite: null # Example:
  #   llm: balanced_llm
  #   system_prompt: |
  #     You are an expert visual prompt engineer. Rewrite the user's input
  #     into a vivid, detailed prompt suitable for image generation while
  #     keeping their intent and required elements intact. Output only the
  #     improved prompt.
  #   max_tokens: 256
  #   temperature: 0.2
