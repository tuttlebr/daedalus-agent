general:
  logging:
    console:
      _type: console
      level: INFO

  front_end:
    _type: fastapi

workflow:
  _type: image_generation
  api_type: custom  # custom, nim, openai, or openrouter
  api_endpoint: "https://ai.api.nvidia.com/v1/genai/black-forest-labs/flux.2-klein-4b"
  api_key: null  # Falls back to NVIDIA_API_KEY env var
  timeout: 60.0
  default_width: 1024
  default_height: 1024
  default_steps: 4
  prompt_rewrite: null  # Example:
  #   llm: balanced_llm
  #   system_prompt: |
  #     You are an expert visual prompt engineer. Rewrite the user's input
  #     into a vivid, detailed prompt suitable for image generation while
  #     keeping their intent and required elements intact. Output only the
  #     improved prompt.
  #   max_tokens: 256
  #   temperature: 0.2

  # Example: NVIDIA API Catalog (custom)
  # api_type: custom
  # api_endpoint: "https://ai.api.nvidia.com/v1/genai/black-forest-labs/flux.2-klein-4b"
  # default_steps: 4

  # Example: OpenAI
  # api_type: openai
  # api_key: your-openai-api-key  # Or set OPENAI_API_KEY env var
  # openai_model: gpt-image-1

  # Example: OpenRouter
  # api_type: openrouter
  # api_key: your-openrouter-api-key  # Or set OPENROUTER_API_KEY env var
  # openrouter_model: google/gemini-2.5-flash-image-preview

  # Example: NIM self-hosted
  # api_type: nim
  # api_endpoint: "http://localhost:8000"
  # default_steps: 50
