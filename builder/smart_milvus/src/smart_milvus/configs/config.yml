general:
  telemetry:
    logging:
      console:
        _type: console
        level: WARN
  front_end:
    _type: fastapi

embedders:
  milvus_embedder:
    _type: nim
    model_name: nvidia/nv-embedqa-e5-v5

functions:
  domain_retriever:
    _type: domain_retriever
    uri: http://localhost:19530
    embedding_model: milvus_embedder
    database_name: default
    content_field: text
    vector_field: vector
    top_k: 10
    use_reranker: false
    domain_collections:
      nvidia: nvidia
      semianalysis: semianalysis
      kubernetes: kubernetes
      veterinarian: vetpartner
      mentalhealth: mentalhealth

llms:
  assistant_llm:
    _type: openai
    model_name: gpt-4o-mini

workflow:
  _type: tool_calling_agent
  llm_name: assistant_llm
  tool_names: [domain_retriever]
  max_iterations: 10
  system_prompt: |
    Role: Curated-domain retrieval assistant.
    Goal: Answer questions with evidence from the configured Milvus domains.
    Call domain_retriever with a query and one configured domain. If retrieval
    does not provide enough support, state what is missing.
    Output: A concise evidence-backed answer.
