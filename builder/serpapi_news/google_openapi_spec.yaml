openapi: 3.0.0
info:
  title: Google Search API
  version: 1.0.0
  description: Google Search API allows you to search the web with Google using various parameters to filter and customize the results.
servers:
  - url: https://www.searchapi.io/api/v1
paths:
  /search:
    get:
      operationId: searchGoogle
      summary: Search Google
      description: Use this endpoint to search Google. You can use various parameters to filter and customize the results.
      parameters:
        - $ref: '#/components/parameters/engine'
        - $ref: '#/components/parameters/api_key'
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/kgmid'
        - $ref: '#/components/parameters/device'
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/uule'
        - $ref: '#/components/parameters/google_domain'
        - $ref: '#/components/parameters/gl'
        - $ref: '#/components/parameters/hl'
        - $ref: '#/components/parameters/lr'
        - $ref: '#/components/parameters/cr'
        - $ref: '#/components/parameters/nfpr'
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/safe'
        - $ref: '#/components/parameters/time_period'
        - $ref: '#/components/parameters/time_period_min'
        - $ref: '#/components/parameters/time_period_max'
        - $ref: '#/components/parameters/num'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/optimization_strategy'
      responses:
        '200':
          description: Successful search
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: "Error message describing what went wrong"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: "Error message describing what went wrong"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: "Error message describing what went wrong"
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: "Error message describing what went wrong"
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: "Error message describing what went wrong"
components:
  parameters:
    # Search Query Parameters
    q:
      name: q
      in: query
      required: false
      description: "Parameter defines the query you want to search. You can use anything that you would use in a regular Google search. e.g. inurl:, site:, intitle:, and more. Either q or kgmid must be provided."
      schema:
        type: string
    kgmid:
      name: kgmid
      in: query
      required: false
      description: "Defines a Knowledge Graph identifier (kgmid), representing entities in Google's Knowledge Graph. Format: Location Identifier (/m/): Typically followed by 2 to 7 characters. Used primarily to represent specific locations. Find the identifier by searching for the 'Freebase ID' on Wikidata. Example: kgmid=/m/02_286 refers to New York. Google Knowledge Graph Identifier (/g/): Typically followed by a longer alphanumeric string. Represents general entities in Google's Knowledge Graph. Find details on Wikidata. Example: kgmid=/g/11f555cn8l refers to TikTok."
      schema:
        type: string

    # Device Parameters
    device:
      name: device
      in: query
      required: false
      description: "The default parameter desktop defines the search on a desktop device. The mobile parameter defines the search on a mobile device. The tablet parameter defines the search on a tablet device."
      schema:
        type: string
        enum: ["desktop", "mobile", "tablet"]
        default: "desktop"

    # Geographic Location Parameters
    location:
      name: location
      in: query
      required: false
      description: "Parameter defines from where you want the search to originate. If several locations match the location requested, we'll pick the most popular one. Head to the Locations API if you need more precise control."
      schema:
        type: string
    uule:
      name: uule
      in: query
      required: false
      description: "Parameter is the Google encoded location you want to use for the search. SearchApi automatically generated the uule parameter when you use the location parameter but we allow you to overwrite it directly. uule and location parameters can't be used together."
      schema:
        type: string

    # Localization Parameters
    google_domain:
      name: google_domain
      in: query
      required: false
      description: "Defines the Google domain for the search. The default is google.com. Check the full list of supported Google google_domain domains."
      schema:
        type: string
        default: "google.com"
        enum: ["google.com", "google.ad", "google.ae", "google.com.af", "google.com.ag", "google.com.ai", "google.al", "google.am", "google.co.ao", "google.com.ar", "google.as", "google.at", "google.com.au", "google.az", "google.ba", "google.com.bd", "google.be", "google.bf", "google.bg", "google.com.bh", "google.bi", "google.bj", "google.com.bn", "google.com.bo", "google.com.br", "google.bs", "google.bt", "google.co.bw", "google.by", "google.com.bz", "google.ca", "google.com.kh", "google.cd", "google.cf", "google.cg", "google.ch", "google.ci", "google.co.ck", "google.cl", "google.cm", "google.com.co", "google.co.cr", "google.com.cu", "google.cv", "google.com.cy", "google.cz", "google.de", "google.dj", "google.dk", "google.dm", "google.com.do", "google.dz", "google.com.ec", "google.ee", "google.com.eg", "google.es", "google.com.et", "google.fi", "google.fm", "google.com.fj", "google.fr", "google.ga", "google.ge", "google.com.gh", "google.com.gi", "google.gg", "google.gl", "google.gm", "google.gp", "google.gr", "google.com.gt", "google.gy", "google.com.hk", "google.hn", "google.hr", "google.ht", "google.hu", "google.co.id", "google.iq", "google.ie", "google.co.il", "google.co.in", "google.is", "google.it", "google.com.jm", "google.jo", "google.co.jp", "google.co.ke", "google.ki", "google.kg", "google.co.kr", "google.com.kw", "google.kz", "google.la", "google.com.lb", "google.li", "google.lk", "google.co.ls", "google.lt", "google.lu", "google.lv", "google.com.ly", "google.co.ma", "google.md", "google.mg", "google.mk", "google.ml", "google.com.mm", "google.mn", "google.ms", "google.com.mt", "google.mu", "google.mv", "google.mw", "google.com.mx", "google.com.my", "google.co.mz", "google.com.na", "google.ne", "google.com.ng", "google.com.ni", "google.nl", "google.no", "google.com.np", "google.nr", "google.nu", "google.co.nz", "google.com.om", "google.com.pk", "google.com.pa", "google.com.pe", "google.com.ph", "google.pl", "google.com.pg", "google.com.pr", "google.ps", "google.pt", "google.com.py", "google.com.qa", "google.ro", "google.rs", "google.ru", "google.rw", "google.com.sa", "google.com.sb", "google.sc", "google.se", "google.com.sg", "google.sh", "google.si", "google.sk", "google.com.sl", "google.sn", "google.sm", "google.so", "google.sr", "google.com.sv", "google.td", "google.tg", "google.co.th", "google.com.tj", "google.tk", "google.tl", "google.tm", "google.to", "google.tn", "google.com.tr", "google.tt", "google.com.tw", "google.co.tz", "google.com.ua", "google.co.ug", "google.co.uk", "google.com.uy", "google.co.uz", "google.com.vc", "google.co.ve", "google.vg", "google.co.vi", "google.com.vn", "google.vu", "google.ws", "google.co.za", "google.co.zm", "google.co.zw", "google.im", "google.je", "google.me", "google.pn", "google.st", "google.cat"]
    gl:
      name: gl
      in: query
      required: false
      description: "The default parameter us defines the country of the search. See the full list of Google Shopping countries."
      schema:
        type: string
        default: "us"
        enum: ["af", "al", "dz", "as", "ad", "ao", "ai", "aq", "ag", "ar", "am", "aw", "au", "at", "az", "bs", "bh", "bd", "bb", "by", "be", "bz", "bj", "bm", "bt", "bo", "ba", "bw", "bv", "br", "io", "bn", "bg", "bf", "bi", "kh", "cm", "ca", "cv", "ky", "cf", "td", "cl", "cn", "cx", "cc", "co", "km", "cg", "cd", "ck", "cr", "ci", "hr", "cu", "cy", "cz", "dk", "dj", "dm", "do", "ec", "eg", "sv", "gq", "er", "ee", "et", "fk", "fo", "fj", "fi", "fr", "gf", "pf", "tf", "ga", "gm", "ge", "de", "gh", "gi", "gr", "gl", "gd", "gp", "gu", "gt", "gn", "gw", "gy", "ht", "hm", "va", "hn", "hk", "hu", "is", "in", "id", "ir", "iq", "ie", "il", "it", "jm", "jp", "jo", "kz", "ke", "ki", "kp", "kr", "kw", "kg", "la", "lv", "lb", "ls", "lr", "ly", "li", "lt", "lu", "mo", "mk", "mg", "mw", "my", "mv", "ml", "mt", "mh", "mq", "mr", "mu", "yt", "mx", "fm", "md", "mc", "mn", "ms", "ma", "mz", "mm", "na", "nr", "np", "nl", "nc", "nz", "ni", "ne", "ng", "nu", "nf", "mp", "no", "om", "pk", "pw", "ps", "pa", "pg", "py", "pe", "ph", "pn", "pl", "pt", "pr", "qa", "re", "ro", "ru", "rw", "sh", "kn", "lc", "pm", "vc", "ws", "sm", "st", "sa", "sn", "rs", "sc", "sl", "sg", "sk", "si", "sb", "so", "za", "gs", "es", "lk", "sd", "sr", "sj", "sz", "se", "ch", "sy", "tw", "tj", "tz", "th", "tl", "tg", "tk", "to", "tt", "tn", "tr", "tm", "tc", "tv", "ug", "ua", "ae", "uk", "gb", "us", "um", "uy", "uz", "vu", "ve", "vn", "vg", "vi", "wf", "eh", "ye", "zm", "zw", "gg", "je", "im", "me"]
    hl:
      name: hl
      in: query
      required: false
      description: "The default parameter en defines the interface language of the search. Check the full list of supported Google hl languages."
      schema:
        type: string
        default: "en"
        enum: ["af", "ak", "sq", "am", "ar", "hy", "az", "eu", "be", "bem", "bn", "bh", "xx-bork", "bs", "br", "bg", "km", "ca", "chr", "ny", "zh-cn", "zh-tw", "co", "hr", "cs", "da", "nl", "xx-elmer", "en", "eo", "et", "ee", "fo", "tl", "fi", "fr", "fy", "gaa", "gl", "ka", "de", "el", "kl", "gn", "gu", "xx-hacker", "ht", "ha", "haw", "iw", "hi", "hu", "is", "ig", "id", "ia", "ga", "it", "ja", "jw", "kn", "kk", "rw", "rn", "xx-klingon", "kg", "ko", "kri", "ku", "ckb", "ky", "lo", "la", "lv", "ln", "lt", "loz", "lg", "ach", "mk", "mg", "my", "ms", "ml", "mt", "mv", "mi", "mr", "mfe", "mo", "mn", "sr-me", "ne", "pcm", "nso", "no", "nn", "oc", "or", "om", "ps", "fa", "xx-pirate", "pl", "pt", "pt-br", "pt-pt", "pa", "qu", "ro", "rm", "nyn", "ru", "gd", "sr", "sh", "st", "tn", "crs", "sn", "sd", "si", "sk", "sl", "so", "es", "es-419", "su", "sw", "sv", "tg", "ta", "tt", "te", "th", "ti", "to", "lua", "tum", "tr", "tk", "tw", "ug", "uk", "ur", "uz", "vu", "vi", "cy", "wo", "xh", "yi", "yo", "zu"]

    lr:
      name: lr
      in: query
      required: false
      description: "The lr parameter restricts search results to documents written in a particular language or a set of languages. The accepted format for this parameter is lang_{2-letter country code}. For instance, to filter documents written in Japanese, the value should be set to lang_jp. To incorporate multiple languages, a value like lang_it|lang_de restricts the search to documents written in either Italian or German. Google identifies the document language based on the top-level domain (TLD) of the document's URL, any language meta tags present, or the language utilized within the document's body text. Supported languages include: lang_ar, lang_hy, lang_bg, lang_ca, lang_cs, lang_da, lang_de, lang_el, lang_en, lang_es, lang_et, lang_tl, lang_fi, lang_fr, lang_hr, lang_hi, lang_hu, lang_id, lang_is, lang_it, lang_iw, lang_ja, lang_ko, lang_lt, lang_lv, lang_nl, lang_no, lang_fa, lang_pl, lang_pt, lang_ro, lang_ru, lang_sk, lang_sl, lang_sr, lang_sv, lang_th, lang_tr, lang_uk, lang_vi, lang_zh-CN, lang_zh-TW."
      schema:
        type: string
        pattern: "^lang_[a-z]{2}(-[A-Z]{2})?(\\|lang_[a-z]{2}(-[A-Z]{2})?)*$"
        example: "lang_en|lang_de"
    cr:
      name: cr
      in: query
      required: false
      description: "The cr parameter restricts search results to documents originating in a particular country. Google determines the country of a document by the top-level domain (TLD) of the document's URL or by Web server's IP address geographic location. Check the full list of supported Google cr countries."
      schema:
        type: string

    # Filter Parameters
    nfpr:
      name: nfpr
      in: query
      required: false
      description: "This parameter controls whether results from queries that have been auto-corrected for spelling errors are included. To exclude these auto-corrected results, set the value to 1. By default, the value is 0, meaning auto-corrected results are included."
      schema:
        type: string
        enum: ["0", "1"]
        default: "0"
    filter:
      name: filter
      in: query
      required: false
      description: "This parameter controls whether the 'Duplicate Content' and 'Host Crowding' filters are enabled. Set the value to 1 to enable these filters, which is the default setting. To disable these filters, set the value to 0."
      schema:
        type: string
        enum: ["0", "1"]
        default: "1"
    safe:
      name: safe
      in: query
      required: false
      description: "This parameter toggles the SafeSearch feature for the results. SafeSearch operates by filtering out adult content from your search results. Google's filters use proprietary technology to check keywords, phrases and URLs. While no filters are 100 percent accurate, SafeSearch will remove the overwhelming majority of adult content from your search results. Set the value to active to enable SafeSearch. To disable it, set the value to off. By default, SafeSearch is disabled."
      schema:
        type: string
        enum: ["active", "off"]
        default: "off"
    time_period:
      name: time_period
      in: query
      required: false
      description: "This parameter restricts results to URLs based on date. Supported values are: last_hour - data from the past hour. last_day - data from the past 24 hours. last_week - data from the past week. last_month - data from the past month. last_year - data from the past year. Using time_period_min or time_period_max parameters, you can specify a custom time period. Note, that the time_period_min and time_period_max parameters could be used separately as well."
      schema:
        type: string
        enum: ["last_hour", "last_day", "last_week", "last_month", "last_year"]
    time_period_min:
      name: time_period_min
      in: query
      required: false
      description: "This parameter specifies the start of the time period. It could be used in combination with the time_period_max parameter. The value should be in the format MM/DD/YYYY."
      schema:
        type: string
        pattern: '^(0?[1-9]|1[0-2])\/(0?[1-9]|[12][0-9]|3[01])\/(19|20)\d\d$'
    time_period_max:
      name: time_period_max
      in: query
      required: false
      description: "This parameter specifies the end of the time period. It could be used in combination with the time_period_min parameter. The value should be in the format MM/DD/YYYY."
      schema:
        type: string
        pattern: '^(0?[1-9]|1[0-2])\/(0?[1-9]|[12][0-9]|3[01])\/(19|20)\d\d$'

    # Pagination Parameters
    num:
      name: num
      in: query
      required: false
      description: "This parameter specifies the number of results to display per page. Use in combination with the page parameter to implement pagination functionality."
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    page:
      name: page
      in: query
      required: false
      description: "This parameter indicates which page of results to return. By default, it is set to 1. Use in combination with the num parameter to implement pagination."
      schema:
        type: integer
        minimum: 1
        default: 1

    # Optimization Parameters
    optimization_strategy:
      name: optimization_strategy
      in: query
      required: false
      description: "Controls how the search request is optimized. Available options: performance (Default), ads - optimizes for higher ad collection success rate, which may result in longer request processing times."
      schema:
        type: string
        enum: ["performance", "ads"]
        default: "performance"

    # Engine Parameters
    engine:
      name: engine
      in: query
      required: true
      description: "Parameter defines an engine that will be used to retrieve real-time data. It must be set to google."
      schema:
        type: string
        enum: ["google"]

    # API Key Parameters
    api_key:
      name: api_key
      in: query
      required: true
      description: "The api_key authenticates your requests. Use it as a query parameter (https://www.searchapi.io/api/v1/search?api_key=YOUR_API_KEY) or in the Authorization header (Bearer YOUR_API_KEY)."
      schema:
        type: string

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: "Error message describing what went wrong"
      required: [error]

    SearchResponse:
      type: object
      properties:
        search_metadata:
          $ref: '#/components/schemas/SearchMetadata'
        search_parameters:
          $ref: '#/components/schemas/SearchParameters'
        search_information:
          $ref: '#/components/schemas/SearchInformation'
        ai_overview:
          $ref: '#/components/schemas/AiOverview'
        shopping_ads:
          type: array
          items:
            $ref: '#/components/schemas/ShoppingAd'
        shopping_ads_more_link:
          type: string
          description: "Link to see more shopping ads"
        ads:
          type: array
          items:
            $ref: '#/components/schemas/Ad'
        local_ads:
          $ref: '#/components/schemas/LocalAds'
        answer_box:
          $ref: '#/components/schemas/AnswerBox'
        sports_results:
          $ref: '#/components/schemas/SportResults'
        weather_result:
          $ref: '#/components/schemas/WeatherResult'
        salary_estimates:
          type: array
          items:
            $ref: '#/components/schemas/SalaryEstimate'
        knowledge_graph:
          $ref: '#/components/schemas/KnowledgeGraph'
        organic_results:
          type: array
          items:
            $ref: '#/components/schemas/OrganicResult'
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        nearby_events:
          type: array
          items:
            $ref: '#/components/schemas/NearbyEvent'
        universities:
          type: array
          items:
            $ref: '#/components/schemas/University'
        about_this_result:
          type: array
          items:
            $ref: '#/components/schemas/AboutThisResultItem'
          description: "About this result information"
        about_this_result_more_link:
          type: string
          description: "Link to more about this result information"
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/Job'
        inline_images:
          $ref: '#/components/schemas/InlineImages'
        inline_shopping:
          type: array
          items:
            $ref: '#/components/schemas/InlineShoppingItem'
        local_map:
          $ref: '#/components/schemas/LocalMap'
        local_results:
          type: array
          items:
            $ref: '#/components/schemas/LocalResult'
        local_results_more_link:
          type: object
          properties:
            link:
              type: string
              description: "Link to more local results"
        from_sources_across_the_web:
          $ref: '#/components/schemas/FromSourcesAcrossTheWeb'
        discussions_and_forums:
          type: array
          items:
            $ref: '#/components/schemas/DiscussionForum'
        related_questions:
          type: array
          items:
            $ref: '#/components/schemas/RelatedQuestion'
        questions_and_answers:
          type: array
          items:
            $ref: '#/components/schemas/QuestionAnswer'
        explore_brands:
          type: array
          items:
            $ref: '#/components/schemas/ExploreBrand'
        courses:
          type: array
          items:
            $ref: '#/components/schemas/Course'
        top_stories:
          type: array
          items:
            $ref: '#/components/schemas/TopStory'
        top_stories_more_link:
          type: string
          description: "Link to more top stories"
        latest_posts:
          type: array
          items:
            $ref: '#/components/schemas/LatestPost'
        perspectives:
          type: array
          items:
            $ref: '#/components/schemas/Perspective'
        local_news:
          type: array
          items:
            $ref: '#/components/schemas/LocalNewsItem'
        things_to_do:
          type: array
          items:
            $ref: '#/components/schemas/ThingToDo'
        things_to_do_more_link:
          type: string
          description: "Link to more things to do"
        popular_destinations:
          type: array
          items:
            $ref: '#/components/schemas/PopularDestination'
        inline_videos:
          type: array
          items:
            $ref: '#/components/schemas/VideoItem'
          description: "Array of inline video results"
        inline_videos_more_link:
          type: string
          description: "Link to more inline videos"
        inline_tweets:
          $ref: '#/components/schemas/InlineTweets'
        scholarly_articles:
          $ref: '#/components/schemas/ScholarlyArticles'
        inline_recipes:
          type: array
          items:
            $ref: '#/components/schemas/InlineRecipe'
        related_searches:
          type: array
          items:
            $ref: '#/components/schemas/RelatedSearch'
        pagination:
          $ref: '#/components/schemas/Pagination'
      additionalProperties: false

    SearchMetadata:
      type: object
      properties:
        id:
          type: string
          description: "Unique identifier for the search request"
        status:
          type: string
          description: "Status of the search request"
        created_at:
          type: string
          format: date-time
          description: "Timestamp when the search was created"
        request_time_taken:
          type: number
          description: "Time taken to make the request in seconds"
        parsing_time_taken:
          type: number
          description: "Time taken to parse the results in seconds"
        total_time_taken:
          type: number
          description: "Total time taken for the search in seconds"
      required: [id, status]

    SearchParameters:
      type: object
      properties:
        engine:
          type: string
          description: "Search engine used"
        q:
          type: string
          description: "Search query"
        kgmid:
          type: string
          description: "Knowledge Graph ID"
        location:
          type: string
          description: "Location for the search"
        location_used:
          type: string
          description: "Canonical name of the location actually used for the search"
        uule:
          type: string
          description: "Encoded location"
        google_domain:
          type: string
          description: "Google domain used"
        hl:
          type: string
          description: "Interface language"
        gl:
          type: string
          description: "Country code"
        lr:
          type: string
          description: "Language restriction"
        cr:
          type: string
          description: "Country restriction"
        device:
          type: string
          description: "Device type"
        page:
          type: integer
          description: "Page number"
        num:
          type: integer
          description: "Results per page"
        safe:
          type: string
          description: "SafeSearch setting"
        filter:
          type: string
          description: "Content filter setting"
        nfpr:
          type: string
          description: "No auto-correction setting"
        time_period:
          type: string
          description: "Time period filter"
        time_period_min:
          type: string
          description: "Start date for time period"
        time_period_max:
          type: string
          description: "End date for time period"
        optimization_strategy:
          type: string
          description: "Optimization strategy used"
      additionalProperties: true

    SearchInformation:
      type: object
      properties:
        query_displayed:
          type: string
          description: "Query as displayed in the search results"
        total_results:
          type: integer
          description: "Total number of results found"
        page:
          type: integer
          description: "Current page number"
        time_taken_displayed:
          type: string
          description: "Time taken as displayed in search results"
        detected_location:
          type: string
          description: "Location detected by Google"
