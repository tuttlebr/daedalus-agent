general:
  logging:
    console:
      _type: console
      level: INFO

  front_end:
    _type: fastapi

workflow:
  _type: vtt_interpreter
  api_endpoint: "http://localhost:8000"
  redis_url: "redis://daedalus-redis.daedalus.svc.cluster.local:6379"
  api_key: null  # Set if your API requires authentication or use NVIDIA_API_KEY env var
  timeout: 300.0  # 5 minutes for processing longer transcripts
  model: "meta/llama-3.1-405b-instruct"  # Large model for complex text analysis
  max_tokens: 4096  # Enough tokens for detailed meeting notes
