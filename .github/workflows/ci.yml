name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  builder:
    name: Builder Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: builder
        run: uv pip install --system -e ".[test]"

      - name: Run tests with coverage
        working-directory: builder
        run: pytest --cov --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: builder/coverage.xml

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      SESSION_SECRET: ci-session-secret-for-build-only
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit --incremental false

      - name: Unit tests
        run: npm test -- --run

      - name: Build
        run: npm run build

  helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint helm/daedalus

      - name: Render chart
        run: helm template daedalus helm/daedalus >/tmp/daedalus-rendered.yaml

  docker:
    name: Docker / Compose Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Seed Compose env
        run: cp .env.template .env

      - name: Validate Compose config
        run: docker compose config --quiet

      - name: Build runtime images
        run: docker compose build backend frontend evals

  security:
    name: Security Scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2

      - name: Dependency vulnerability scan
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload vulnerability scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  evals:
    name: Eval Harness Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r evals/requirements.txt

      - name: Compile eval harness
        run: python -m py_compile evals/runner.py evals/evaluators/*.py

      - name: Validate eval datasets
        run: python evals/runner.py --validate-only --dataset routing --dataset factuality --dataset workflows
