name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  builder:
    name: Builder Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: builder
        run: uv pip install --system -e ".[test]"

      - name: Run tests with coverage
        working-directory: builder
        run: pytest --cov --cov-report=xml --cov-report=term-missing --cov-fail-under=65

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-xml
          path: builder/coverage.xml

  builder-integration:
    name: Builder Integration Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis/redis-stack-server:7.4.0-v8@sha256:798ab84d9f266936b034ab11c4d04a2b8e4b441884c5aa7d17ac951eefdf742a
        env:
          REDIS_ARGS: --requirepass ci-real-redis-password
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli -a ci-real-redis-password --no-auth-warning ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: builder
        run: uv pip install --system -e ".[test]" redis

      - name: Run integration tests against real Redis
        working-directory: builder
        env:
          PYTEST_USE_REAL_REDIS: '1'
          REDIS_URL: redis://default:ci-real-redis-password@localhost:6379
        run: pytest -m integration -v

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      SESSION_SECRET: ci-session-secret-for-build-only
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit --incremental false

      - name: Unit tests with coverage gates
        run: npm run coverage

      - name: Build
        run: npm run build

  frontend-e2e:
    name: Frontend Browser E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install pinned Chromium runtime
        run: npx playwright install --with-deps chromium

      - name: Run real-browser agentic workflows
        run: npm run e2e

      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          retention-days: 14

  helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4

      - name: Lint chart
        run: helm lint helm/daedalus

      - name: Render chart
        run: helm template daedalus helm/daedalus >/tmp/daedalus-rendered.yaml

  redis-upgrade:
    name: Persisted Redis Helm Upgrade
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4

      - name: Set up Kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          install_only: true

      - name: Upgrade and rotate a persisted Redis fixture
        run: bash scripts/test_redis_helm_upgrade.sh

  docker:
    name: Docker / Compose Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Seed Compose env
        run: cp .env.template .env

      - name: Validate Compose config
        run: docker compose config --quiet

      - name: Build runtime images
        run: >-
          docker buildx bake --load --provenance=mode=max --sbom=true
          -f docker-compose.yaml backend frontend evals redis

      - name: Scan backend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: docker.io/your-user/daedalus:backend-0.1.0
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: docker.io/your-user/daedalus:frontend-0.1.0
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Scan eval image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: docker.io/your-user/daedalus:evals-0.1.0
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Scan Redis image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: docker.io/your-user/daedalus:redis-0.1.0
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

  security:
    name: Security Scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2

      - name: Dependency vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          scanners: vuln
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: true
          exit-code: '1'

      - name: Verify vulnerability scan results
        run: test -s trivy-results.sarif

      - name: Upload vulnerability scan results
        uses: github/codeql-action/upload-sarif@eec0bff2f6c15bf3f1e8a0152f94d17664a06a06 # v4
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        with:
          sarif_file: trivy-results.sarif

  evals:
    name: Eval Harness Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r evals/requirements.txt

      - name: Compile eval harness
        run: python -m py_compile evals/runner.py evals/evaluators/*.py

      - name: Validate eval datasets
        run: python evals/runner.py --validate-only --dataset routing --dataset factuality --dataset workflows
