global:
  nameOverride: ''
  fullnameOverride: ''
  networkName: daedalus-network
  # Restrict pod scheduling to these nodes; leave empty to allow any node
  nodePlacement:
    allowedNodes: ['daedalus-01', 'daedalus-02', 'daedalus-03', 'daedalus-04']

images:
  builder:
    repository: daedalus.ddns.me:5050/btuttle/daedalus
    tag: builder-0.1.0
    pullPolicy: Always
  backend:
    repository: daedalus.ddns.me:5050/btuttle/daedalus
    tag: backend-0.1.0
    pullPolicy: Always
  frontend:
    repository: daedalus.ddns.me:5050/btuttle/daedalus
    tag: frontend-0.1.0
    pullPolicy: Always
  nginx:
    repository: nginx
    tag: alpine
    pullPolicy: Always
  redis:
    repository: redis/redis-stack-server
    tag: '7.4.0-v8'
    pullPolicy: Always
  redisinsight:
    repository: redis/redisinsight
    tag: '3.2'
    pullPolicy: Always

backend:
  # Default backend configuration
  default:
    enabled: true
    port: 8000
    # UNAS Pro exports the default nfs-client backing share with all_squash,
    # anonuid=977,anongid=988. Run PVC writers as that identity so writes do
    # not depend on root passthrough.
    securityContext:
      runAsNonRoot: true
      runAsUser: 977
      runAsGroup: 988
      fsGroup: 988
      fsGroupChangePolicy: OnRootMismatch
    env:
      # Name of an existing Secret to load via envFrom (external secret)
      fromSecret: 'daedalus-backend-env'
      # If you prefer Helm to create the Secret, set createSecret=true and provide key/value pairs under data
      createSecret: false
      data: {}
      # Explicit env overrides applied in the pod, useful to fix bad values from secrets
      overrides:
        SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
        # Trust nginx proxy headers so OAuth callbacks reconstruct the public
        # https://... redirect URI during token exchange.
        FORWARDED_ALLOW_IPS: '*'
        HOME: /tmp
        XDG_CACHE_HOME: /tmp/.cache
    config:
      enabled: true
      # Contents of backend/tool-calling-config.yaml; set with --set-file.
      # If empty, the ConfigMap renders an empty config.yaml.
      data: ''
    service:
      type: ClusterIP
      port: 8000

  # Shared backend configuration
  networkPolicy:
    enabled: true # Set to true to restrict backend access to only frontend and nginx pods
    cilium:
      enabled: true
      webscrape:
        enabled: true
        l7Filtering: false
      extraFQDNs: []
  persistence:
    enabled: true
    storageClassName: ''
    create: true
    existingClaimName: ''
  # Agent Skills directory — skills are baked into the Docker image at /skills by default.
  # Set enabled: true to override with a PVC (useful for hot-swapping skills without rebuilding).
  # When enabled without a pvcName, an emptyDir is used (skills from the image are shadowed).
  skills:
    enabled: false
    mountPath: /skills
    pvcName: ''

frontend:
  enabled: true
  port: 3000
  # Frontend image already runs as non-root (nextjs:1001), so securityContext is safe here
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
  env:
    fromSecret: 'daedalus-frontend-env'
    createSecret: false
    data: {}
    overrides:
      # Backend API path - controls which NAT API endpoint to use
      # Supported values: /chat, /chat/stream, /generate, /generate/stream, /v1/chat/completions
      # Uploaded document ingestion uses the direct streaming endpoint by default.
      # Set to "0" only to force the legacy NAT async fallback.
      DAEDALUS_DIRECT_DOCUMENT_INGEST_STREAM: '1'
      # V8 heap ceiling — sized under the pod memory limit to leave headroom for off-heap Buffers
      # during large-document base64 decode (200MB doc ≈ 267MB base64 + multiple copies in flight)
      NODE_OPTIONS: '--max-old-space-size=8192'
  service:
    type: ClusterIP
    port: 3000

nginx:
  enabled: true
  securityContext: {}
  httpPort: 80
  https:
    enabled: true
    tlsSecretName: 'daedalus-tls'
  config:
    useTemplate: true
    restrictedMode: true # Set to true to block direct API access through nginx
    # If useTemplate is false, rawConf is used
    rawConf: |
      # Provide nginx conf if not using template
    # Leave empty to default to the in-cluster FQDN of the backend Service
    backendHost: ''
    backendPort: 8000
  imageVolume:
    enabled: true
    storageClassName: ''
    create: true
    existingClaimName: ''
  service:
    type: NodePort
    nodePorts:
      https: 30443

redis:
  enabled: true
  securityContext:
    runAsNonRoot: true
    runAsUser: 977
    runAsGroup: 988
    fsGroup: 988
    fsGroupChangePolicy: OnRootMismatch
  persistence:
    enabled: true
  service:
    type: ClusterIP
    port: 6379

redisinsight:
  enabled: true
  securityContext:
    runAsNonRoot: true
    runAsUser: 977
    runAsGroup: 988
    fsGroup: 988
    fsGroupChangePolicy: OnRootMismatch
  persistence:
    enabled: true
  service:
    type: NodePort
    nodePorts:
      https: 30540
  env:
    overrides: {}

autonomousAgent:
  # Dedicated autonomous worker that follows UI-managed goals and publishes
  # state to the Autonomy dashboard.
  enabled: true
  # Set suspend: true to pause the worker Deployment without removing it
  suspend: false
  replicas: 1
  securityContext: {}
  # Poll timeout for async workflow completion
  requestTimeout: 3600
  # Which backend API path to use (/v1/workflow/async for submit+poll, /chat/stream for SSE)
  backendApiPath: '/v1/workflow/async'
  # User whose memory and conversation history the agent operates on
  userId: 'tuttlebr'
  worker:
    pollIntervalSeconds: 10
    leaseTtlSeconds: 60
    intervalSeconds: 14400
  env:
    # Optional extra API-key secret. The internal backend auth token is always
    # injected from the chart-managed internal-api secret so memory tools can
    # trust the worker's x-user-id header.
    fromSecret: 'daedalus-backend-env'
    overrides: {}

ingress:
  enabled: true
  className: ''
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: '900'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '900'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '900'
    nginx.ingress.kubernetes.io/proxy-body-size: '300m' # Support document uploads up to 200MB (base64 adds ~33% overhead)
    nginx.ingress.kubernetes.io/proxy-buffering: 'off'
    nginx.ingress.kubernetes.io/proxy-request-buffering: 'off'
  hosts:
    - host: daedalus.ddns.me
  tls:
    - secretName: daedalus-tls
      hosts:
        - daedalus.ddns.me
