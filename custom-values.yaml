global:
  nameOverride: ''
  fullnameOverride: ''
  networkName: daedalus-network
  # Restrict pod scheduling to these nodes; leave empty to allow any node
  nodePlacement:
    allowedNodes: ['daedalus-01', 'daedalus-02', 'daedalus-03', 'daedalus-04']

images:
  # deploy.sh resolves these application tags to immutable registry digests
  # before Helm runs.
  backend:
    repository: daedalus.ddns.me:5050/btuttle/daedalus
    tag: backend-0.1.0
    digest: ''
    pullPolicy: Always
  frontend:
    repository: daedalus.ddns.me:5050/btuttle/daedalus
    tag: frontend-0.1.0
    digest: ''
    pullPolicy: Always
  nginx:
    repository: nginxinc/nginx-unprivileged
    tag: alpine
    digest: 'sha256:a718212f9cf21e241f14067333000a3f0930292f5354fe0db269e9a2a2596b9e'
    pullPolicy: Always
  redis:
    # Repository-owned, security-updated Redis Stack 7.4.0-v8 image. Keep
    # this version compatible with the persisted AOF/RDB data.
    repository: daedalus.ddns.me:5050/btuttle/daedalus
    tag: redis-0.1.0
    digest: ''
    pullPolicy: Always

# Give document upload/download code only the dedicated object-store
# credential. deploy.sh creates this Secret only from explicit
# DOCUMENT_OBJECT_* values and never copies the broader MINIO credential or any
# object-store credential into the general frontend Secret.
documentObjectStorage:
  enabled: true
  endpoint: http://milvus-minio.milvus.svc.cluster.local:9000
  bucket: nv-ingest
  region: us-east-1
  prefix: daedalus-documents
  expirySeconds: 604800
  networkPolicy:
    namespace: milvus
    port: 9000
  auth:
    existingSecret: daedalus-document-objects
    accessKey: ''
    secretKey: ''
    accessKeyKey: DOCUMENT_OBJECT_ACCESS_KEY
    secretKeyKey: DOCUMENT_OBJECT_SECRET_KEY

backend:
  # Default backend configuration
  default:
    enabled: true
    port: 8000
    # UNAS Pro exports the default nfs-client backing share with all_squash,
    # anonuid=977,anongid=988. Run PVC writers as that identity so writes do
    # not depend on root passthrough.
    securityContext:
      runAsNonRoot: true
      runAsUser: 977
      runAsGroup: 988
      fsGroup: 988
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
    env:
      # Name of an existing Secret to load via envFrom (external secret)
      fromSecret: 'daedalus-backend-env'
      # If you prefer Helm to create the Secret, set createSecret=true and provide key/value pairs under data
      createSecret: false
      data: {}
      # Explicit env overrides applied in the pod, useful to fix bad values from secrets
      overrides:
        SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
        # Trust nginx proxy headers so OAuth callbacks reconstruct the public
        # https://... redirect URI during token exchange.
        FORWARDED_ALLOW_IPS: '*'
        HOME: /tmp
        XDG_CACHE_HOME: /tmp/.cache
    config:
      enabled: true
      # Contents of backend/tool-calling-config.yaml; set with --set-file.
      # If empty, the ConfigMap renders an empty config.yaml.
      data: ''
    service:
      type: ClusterIP
      port: 8000

  # Shared backend configuration
  networkPolicy:
    enabled: true # Set to true to restrict backend access to only frontend and nginx pods
    extraEgressNamespaces:
      - name: llm-sandbox
        ports:
          - port: 8080
            protocol: TCP
    cilium:
      enabled: true
      webscrape:
        enabled: true
        l7Filtering: false
      extraFQDNs: []
  persistence:
    enabled: true
    storageClassName: ''
    create: true
    existingClaimName: ''
  # Agent Skills directory — skills are baked into the Docker image at /skills by default.
  # Set enabled: true to override with a PVC (useful for hot-swapping skills without rebuilding).
  # When enabled without a pvcName, an emptyDir is used (skills from the image are shadowed).
  skills:
    enabled: false
    mountPath: /skills
    pvcName: ''

frontend:
  enabled: true
  port: 3000
  # Frontend image already runs as non-root (nextjs:1001), so securityContext is safe here
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  env:
    fromSecret: 'daedalus-frontend-env'
    createSecret: false
    data: {}
    overrides:
      # Backend API path - controls which NAT API endpoint to use
      # Supported values: /chat, /chat/stream, /generate, /generate/stream, /v1/chat/completions
      NODE_OPTIONS: '--max-old-space-size=4096'
  service:
    type: ClusterIP
    port: 3000
  streamWorker:
    env:
      fromSecret: 'daedalus-stream-worker-env'
      createSecret: false
      data: {}
      overrides: {}

nginx:
  enabled: true
  securityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]
  httpPort: 80
  containerPort: 8080
  https:
    enabled: true
    tlsSecretName: 'daedalus-tls'
    containerPort: 8443
  config:
    useTemplate: true
    restrictedMode: true # Set to true to block direct API access through nginx
    clientMaxBodySize: '32M'
    documentUploadMaxBodySize: '201M'
    videoUploadMaxBodySize: '150M'
    imageUploadMaxBodySize: '14M'
    transcriptUploadMaxBodySize: '15M'
    # If useTemplate is false, rawConf is used
    rawConf: |
      # Provide nginx conf if not using template
  imageVolume:
    enabled: true
    storageClassName: ''
    create: true
    existingClaimName: ''
  service:
    type: NodePort
    nodePorts:
      https: 30443

redis:
  enabled: true
  auth:
    enabled: true
    username: daedalus
    password: ''
    previousPassword: ''
    existingSecret: ''
    secretKey: REDIS_PASSWORD
    previousSecretKey: REDIS_PREVIOUS_PASSWORD
  tls:
    # Supply a Secret containing tls.crt, tls.key, and ca.crt before enabling.
    enabled: false
    existingSecret: ''
    certKey: tls.crt
    privateKeyKey: tls.key
    caKey: ca.crt
    mountPath: /etc/redis-tls
  securityContext:
    runAsNonRoot: true
    runAsUser: 977
    runAsGroup: 988
    fsGroup: 988
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  persistence:
    enabled: true
  service:
    type: ClusterIP
    port: 6379

autonomousAgent:
  # Dedicated autonomous worker that follows UI-managed goals and publishes
  # state to the Autonomy dashboard.
  enabled: true
  # Set suspend: true to pause the worker Deployment without removing it
  suspend: false
  replicas: 1
  securityContext:
    runAsNonRoot: true
    runAsUser: 977
    runAsGroup: 988
    fsGroup: 988
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]
  # Poll timeout for async workflow completion
  requestTimeout: 3600
  # Reuse the loaded backend workflow over SSE.
  backendApiPath: '/v1/chat/completions'
  # User whose memory and conversation history the agent operates on
  userId: 'tuttlebr'
  worker:
    pollIntervalSeconds: 10
    leaseTtlSeconds: 60
    intervalSeconds: 14400
  env:
    # Normally empty. The chart injects the internal backend token and Redis
    # credential directly, and this worker doesn't need model, MCP, Milvus,
    # MinIO, Phoenix, or document-object credentials.
    fromSecret: ''
    overrides: {}

ingress:
  enabled: true
  className: ''
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: '900'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '900'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '900'
    nginx.ingress.kubernetes.io/proxy-body-size: '201m'
    nginx.ingress.kubernetes.io/proxy-buffering: 'off'
    nginx.ingress.kubernetes.io/proxy-request-buffering: 'off'
  hosts:
    - host: daedalus.ddns.me
  tls:
    - secretName: daedalus-tls
      hosts:
        - daedalus.ddns.me
