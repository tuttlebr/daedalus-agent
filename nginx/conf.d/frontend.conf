# Nginx configuration for Next.js frontend with API routing

# Use Docker's internal DNS resolver
resolver 127.0.0.11 valid=30s;

# Upstream definitions with variables for dynamic resolution
upstream frontend {
    server frontend:3000 max_fails=3 fail_timeout=30s;
}

upstream backend {
    server backend:8000 max_fails=3 fail_timeout=30s;
}

# Main server block
server {
    listen 80;
    server_name localhost;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Client settings
    client_max_body_size 50M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # Proxy settings
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_buffering off;
    proxy_request_buffering off;


    # Main application - Next.js frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Handle Next.js specific paths
        proxy_set_header Accept-Encoding "";
    }

    # API routes - OpenAI compatible endpoint
    location /v1/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # No explicit CORS headers; rely on same-origin via nginx and app

        # Enable streaming for chat completions
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # SSE specific headers
        proxy_set_header Cache-Control no-cache;
        proxy_set_header X-Accel-Buffering no;

        # Increase timeouts for long-running requests (deep research)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Enable chunked responses
        chunked_transfer_encoding on;
    }

        # NAT generate endpoints (including streaming) - match exact backend paths
    location /generate/ {
        proxy_pass http://backend/generate/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # No explicit CORS headers; rely on same-origin via nginx and app

        # Enable streaming
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # SSE specific headers
        proxy_set_header Cache-Control no-cache;
        proxy_set_header X-Accel-Buffering no;

        # Increase timeouts for long-running requests
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Enable chunked responses
        chunked_transfer_encoding on;
    }

    # Chat endpoints
    location /chat/ {
        proxy_pass http://backend/chat/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # No explicit CORS headers; rely on same-origin via nginx and app

        # Enable streaming
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # SSE specific headers
        proxy_set_header Cache-Control no-cache;
        proxy_set_header X-Accel-Buffering no;

        # Increase timeouts for long-running requests
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Enable chunked responses
        chunked_transfer_encoding on;
    }

    # Session endpoints (mock responses since NAT backend is stateless)
    location = /session/create {
        add_header Content-Type application/json;
        return 200 '{"session_id": "session-$request_id", "created": true}';
    }

    location ~ ^/session/([a-zA-Z0-9\-_]+)$ {
        add_header Content-Type application/json;
        if ($request_method = GET) {
            return 200 '{"session_id": "$1", "status": "active", "created_at": "2024-01-01T00:00:00Z"}';
        }
        if ($request_method = DELETE) {
            return 200 '{"session_id": "$1", "deleted": true}';
        }
        return 404 '{"error": "Session method not supported"}';
    }

    # Upload endpoints
    location ~ ^/(upload|tools|health)/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large file uploads
        client_max_body_size 100M;
        proxy_request_buffering off;
        # No explicit CORS headers; rely on same-origin via nginx and app
    }

    # Evaluate endpoints
    location /evaluate {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for evaluation jobs
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        # No explicit CORS headers; rely on same-origin via nginx and app
    }

    # Auth redirect endpoint
    location /auth/redirect {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # No explicit CORS headers; rely on same-origin via nginx and app
    }

    # Image serving endpoint - serve directly from volume
    location /images/ {
        alias /tmp/generated_images/;
        try_files $uri =404;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;

        # Cache images for better performance
        expires 1h;
        add_header Cache-Control "public, max-age=3600";

        # Only allow image files
        location ~* \.(jpg|jpeg|png|gif)$ {
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }
    }


    # Health check endpoint (backend doesn't have /health, use /docs as health check)
    location /health {
        proxy_pass http://backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Next.js specific routes
    location /_next/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache Next.js assets
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Handle favicon
    location /favicon.ico {
        proxy_pass http://frontend/favicon.ico;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

