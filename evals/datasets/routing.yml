# Routing correctness dataset.
#
# Each case asserts how the orchestrator SHOULD route based on
# backend/tool-calling-config.yaml. The optimized workflow is a single
# responses_api_agent, so requests should call leaf tools directly rather than
# nested specialist agents.
#
# Schema:
#   id: unique string
#   query: user message sent to /chat/stream
#   expected:
#     route_tool: expected leaf tool name, or null
#     required_tools: [...]  # optional, all must be called
#     skill: <skill_name> | null
#   forbidden_tools: [...]    # optional
#   conversational_only: true # optional; expects NO routing tool calls

- id: research-001
  query: What are the current state-of-the-art results on the GSM8K math benchmark?
  expected:
    route_tool: perplexity_search_tool
    skill: null

- id: research-002
  query: Summarize the latest NVIDIA earnings call sentiment from analyst coverage.
  expected:
    route_tool: perplexity_search_tool
    skill: null

- id: deep-research-001
  query: |
    Produce a comprehensive report comparing AI inference optimization
    strategies across NVIDIA Dynamo, KV-cache reuse, speculative decoding,
    and model routing. Use at least six independent sources and include
      practical recommendations for a production agent platform.
  expected:
    required_tools:
      - source_policy_tool
      - research_plan_approval_tool
    skill: null

- id: ops-001
  query: List the pods in the daedalus namespace and report their status.
  expected:
    route_tool: k8s_mcp_server
    skill: null

- id: ops-002
  query: Show me the three most recent merged pull requests in the daedalus-agent GitHub repo.
  expected:
    route_tool: null
    skill: pr-monitor

- id: media-001
  query: Generate an image of a street art-style portrait of a Roman senator.
  expected:
    route_tool: visual_media_tool
    skill: null

- id: user-docs-001
  query: Search my uploaded documents for mentions of "GPU utilization" and summarize what I've said about it.
  expected:
    route_tool: user_document_tool
    skill: null

- id: user-data-001
  query: What is on my calendar today?
  expected:
    route_tool: calendar_mcp_server
    skill: null

- id: daily-summary-001
  query: Run my daily briefing.
  expected:
    required_tools:
      - get_memory
      - current_datetime_tool
      - agent_skills_tool
    skill: nv-html
  forbidden_tools:
    - visual_media_tool

- id: skill-001
  query: Review the open pull requests on the daedalus-agent repo and give me a PR status summary.
  expected:
    route_tool: null
    skill: pr-monitor

- id: skill-nat-001
  query: Use the NeMo Agent Toolkit skill to add a custom toolkit function for support-ticket lookup.
  expected:
    route_tool: null
    skill: nat-user-rules

- id: conversational-001
  query: Hey, thanks for the help earlier.
  conversational_only: true
  expected:
    route_tool: null
    skill: null
  forbidden_tools:
    - research_agent
    - deep_research_agent
    - nvidia_docs_agent
    - ops_agent
    - user_document_agent
    - user_data_agent
    - daily_summary_agent
    - k8s_mcp_server
    - vtt_interpreter_tool
    - gmail_mcp_server
    - calendar_mcp_server
    - user_document_tool
    - visual_media_tool
