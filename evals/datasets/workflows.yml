# Workflow audit dataset.
#
# These cases are broader than the default routing/factuality suites and may
# invoke live tools. Run explicitly against staging or production:
#
#   ./run-eval.sh --dataset workflows
#
# The evaluator is deterministic and checks observable trace contracts plus
# budget hints. Tighten the budgets after collecting a real p95 baseline.

- id: chat-simple-001
  workflow: top_level_chat_routing
  audience: customer-facing
  query: Thanks, that answered my question.
  success_criteria: Direct response after required memory lookup; no research, ops, media, or document tools.
  expected:
    required_tools:
      - get_memory
    forbidden_tools:
      - research_agent
      - deep_research_agent
      - nvidia_docs_agent
      - ops_agent
      - user_document_agent
      - user_data_agent
      - daily_summary_agent
      - domain_retriever_tool
      - curated_feed_search_tool
      - serpapi_search_tool
      - k8s_mcp_server
      - user_document_tool
      - gmail_mcp_server
      - calendar_mcp_server
      - visual_media_tool
      - vtt_interpreter_tool
    max_tool_calls: 1
    max_workflow_calls: 1
    max_latency_s: 10
    max_total_tokens: 2000

- id: research-technical-001
  workflow: research_answers
  audience: customer-facing
  query: Summarize the H200 GPU memory bandwidth from an NVIDIA source and cite it.
  success_criteria: Direct research tool route, cited technical answer, no ops/media/user-doc tools.
  expected:
    required_tools:
      - domain_retriever_tool
    forbidden_tools:
      - research_agent
      - ops_agent
      - k8s_mcp_server
      - vtt_interpreter_tool
      - user_document_tool
      - gmail_mcp_server
      - calendar_mcp_server
    requires_citation: true
    max_workflow_calls: 1
    max_latency_s: 120
    max_total_tokens: 30000

- id: research-current-001
  workflow: research_answers
  audience: customer-facing
  query: What is the latest NVIDIA Developer Blog post about NeMo or inference tooling? Cite the source.
  success_criteria: Current-information research route with a source URL.
  expected:
    required_tools:
      - curated_feed_search_tool
    requires_citation: true
    max_workflow_calls: 1
    max_latency_s: 180
    max_total_tokens: 40000

- id: ops-readonly-001
  workflow: ops_workflows
  audience: employee-facing
  query: List the pods in the daedalus namespace and report their status.
  success_criteria: Read-only ops route, no confirmation prompt, plain error if cluster access is unavailable.
  expected:
    required_tools:
      - k8s_mcp_server
    forbidden_tools:
      - research_agent
      - domain_retriever_tool
      - vtt_interpreter_tool
      - user_document_tool
      - gmail_mcp_server
      - calendar_mcp_server
      - user_interaction_tool
    max_workflow_calls: 1
    max_latency_s: 120
    max_total_tokens: 25000

- id: ops-github-001
  workflow: github_workflows
  audience: employee-facing
  query: Show me the three most recent merged pull requests in the daedalus-agent GitHub repo.
  success_criteria: GitHub read-only request routes through the pr-monitor skill.
  expected:
    required_tools:
      - agent_skills_tool
    forbidden_tools:
      - k8s_mcp_server
      - user_interaction_tool
      - vtt_interpreter_tool
      - user_document_tool
      - gmail_mcp_server
      - calendar_mcp_server
    max_workflow_calls: 1
    max_latency_s: 120
    max_total_tokens: 25000

- id: user-docs-search-001
  workflow: user_documents
  audience: customer-facing
  query: Search my uploaded documents for mentions of GPU utilization and summarize what they say.
  success_criteria: User document route; graceful empty-result behavior if no indexed docs exist.
  expected:
    required_tools:
      - user_document_tool
    forbidden_tools:
      - research_agent
      - domain_retriever_tool
      - k8s_mcp_server
      - vtt_interpreter_tool
      - gmail_mcp_server
      - calendar_mcp_server
    max_workflow_calls: 1
    max_latency_s: 120
    max_total_tokens: 25000

- id: media-image-001
  workflow: media_workflows
  audience: customer-facing
  query: Generate a simple product-style image of a green circuit board on a white background.
  success_criteria: Media route and verbatim markdown image reference.
  expected:
    required_tools:
      - visual_media_tool
    forbidden_tools:
      - research_agent
      - domain_retriever_tool
      - k8s_mcp_server
      - user_document_tool
      - gmail_mcp_server
      - calendar_mcp_server
    response_regex:
      - "!?\\[[^\\]]*\\]\\([^\\)]+\\)"
    max_workflow_calls: 1
    max_latency_s: 240
    max_total_tokens: 25000

- id: media-transcript-001
  workflow: media_workflows
  audience: customer-facing
  query: |
    Summarize this VTT transcript into decisions and action items:

    WEBVTT

    00:00:00.000 --> 00:00:05.000
    Alice: We will move the eval gate to CI this sprint.

    00:00:05.000 --> 00:00:10.000
    Bob: I will own the latency dashboard and p95 budget.
  success_criteria: Transcript route with decisions and action items.
  expected:
    required_tools:
      - vtt_interpreter_tool
    response_contains:
      - eval gate
      - latency dashboard
    max_workflow_calls: 1
    max_latency_s: 120
    max_total_tokens: 25000

- id: daily-summary-briefing-001
  workflow: daily_summary
  audience: internal-only
  query: Run my daily briefing.
  success_criteria: Daily summary route returns a concise structured briefing and does not use visual media.
  expected:
    required_tools:
      - get_memory
      - current_datetime_tool
    forbidden_tools:
      - daily_summary_agent
      - visual_media_tool
    response_contains:
      - Daily Summary
      - 'Next Best Actions'
    max_workflow_calls: 1
    max_latency_s: 240
    max_total_tokens: 50000

- id: autonomous-cycle-contract-001
  workflow: autonomous_agent
  audience: internal-only
  query: |
    Act as the autonomous background agent for one dry-run cycle. Do not mutate memory.
    Choose one research direction from recent AI infrastructure news and produce only:
    Cycle Report, Executive Summary, Priority Updates.
  success_criteria: Autonomous-style output shape without memory mutation or architecture routing.
  expected:
    required_tools:
      - get_memory
    required_tool_groups:
      - - curated_feed_search_tool
        - serpapi_search_tool
    forbidden_tools:
      - add_memory
    response_contains:
      - Cycle Report
      - Executive Summary
      - Priority Updates
    max_workflow_calls: 1
    max_latency_s: 180
    max_total_tokens: 40000
