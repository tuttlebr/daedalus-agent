# Nginx Configuration for Long-Running AI Requests
# Place this in your nginx site config (e.g., /etc/nginx/sites-available/daedalus)

server {
    listen 80;
    listen 443 ssl http2;
    server_name daedalus.ddns.me;

    # SSL configuration (if using HTTPS)
    # ssl_certificate /path/to/cert.pem;
    # ssl_certificate_key /path/to/key.pem;

    # Increase client timeouts
    client_max_body_size 10M;
    client_body_timeout 600s;
    client_header_timeout 600s;

    # Increase send timeout
    send_timeout 600s;

    # General proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API chat endpoint - special handling for streaming
    location /api/chat {
        proxy_pass http://localhost:3000;

        # Critical: Disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;

        # Keep connection alive for streaming
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;

        # Increase timeouts significantly for long-running AI requests
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # Prevent connection from closing
        keepalive_timeout 650s;
    }

    # All other API endpoints
    location /api/ {
        proxy_pass http://localhost:3000;

        # Standard timeouts for other endpoints
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Frontend static files
    location / {
        proxy_pass http://localhost:3000;

        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
}
