    description: 'ACTION: Generate Python code for any programming task. REASONING: Specialized LLM for code generation with proper syntax, best practices. MANDATORY for all code requests. WHEN: User needs Python code, scripts, functions, classes, algorithms, data processing. OUTPUT: Complete, runnable Python code. CAPABILITIES: Any Python task - data analysis, automation, algorithms, API integration, ML models. TEMPERATURE: 0.2 for consistency. NEXT: Can test/refine based on requirements. CRITICAL: Use ONLY this tool for code generation, not general LLM.

      '
