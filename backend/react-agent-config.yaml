embedders:
  milvus_embedder:
    _type: nim
    base_url: https://84105d6a-bb7e-4fc3-b401-f82cb3707a28.invocation.api.nvcf.nvidia.com/v1
    model_name: nvidia/llama-3.2-nv-embedqa-1b-v2
    truncate: END
functions:
  code_generation:
    _type: code_generation
    description: Generates executable Python code using a specialized coding LLM. Use this for any Python code requirement, including scripts, functions, algorithms, and data processing. It produces complete, runnable Python code with necessary imports and error handling.
    llm_name: coding_llm
    programming_language: Python
    verbose: true
  current_datetime_tool:
    _type: current_datetime
    description: Provides the current date, time, and timezone. Use this tool to get the current temporal context, especially when the user mentions 'today', 'now', or other time-sensitive phrases. It is essential for tools that require up-to-date information.
    verbose: true
  daedalus_react_agent:
    _type: react_agent
    description: A meta-agent that orchestrates other tools using a ReAct pattern to accomplish complex tasks. It autonomously reasons and chains multiple tool calls together. This agent is the primary executor for complex workflows.
    llm_name: tool_calling_llm
    max_tool_calls: 15
    parse_agent_response_max_retries: 3
    pass_tool_call_errors_to_agent: true
    system_prompt: "# Daedalus React Agent - Intelligent Tool Orchestrator\n\n**UNIQUE ROLE**: Meta-agent coordinating all tools using React pattern for optimal task completion.\n\n**TOOL SELECTION STRATEGY**:\n1. Consider MUTUAL INFORMATION between tools - which combinations provide maximum value\n2. Minimize CONDITIONAL ENTROPY - select tools that reduce uncertainty most effectively\n3. Follow WORKFLOW SEQUENCES - respect tool dependencies and optimal ordering\n\n## Available Tools\n{tools}\n\n## Tool Selection Guidelines\n\n**MEMORY TOOLS** (ALWAYS FIRST):\n- get_memory: MANDATORY first tool - retrieves user preferences/history\n- memory_add: Store new preferences discovered during interaction\n\n**INFORMATION GATHERING**:\n- Domain Retrievers: Use for specialized knowledge (K8s, NVIDIA, mental health, etc.)\n- Search Tools: realtime_serpapi_ai_tool (quick facts) < realtime_serpapi_search_tool (research) < realtime_serpapi_news_tool (breaking news)\n\n**PROCESSING & GENERATION**:\n- code_generation: EXCLUSIVE for any Python code needs\n- Research Pipeline: query_writer → searches → summarizer → reflect → extend → finalize\n\n**UTILITIES**:\n- current_datetime_tool: For temporal context (singleton per session)\n- geolocation_retriever_tool: PREREQUISITE for weather/location-based searches\n- weather_tool: Real-time weather (requires geolocation first)\n- nv_ingest_tool → user_uploaded_files_retriever_tool: PDF processing pipeline\n\nFor get_memory tool (MANDATORY FIRST CALL):\n{\n    \"query\": \"your search query here\",\n    \"top_k\": 5,\n    \"user_id\": \"<username>\"\n}\n\nFor memory_add tool:\n{\n    \"conversation\": [\n        {\n            \"role\": \"user\",\n            \"content\": \"user message\"\n        },\n        {\n            \"role\": \"assistant\",\n            \"content\": \"assistant response\"\n        }\n    ],\n    \"user_id\": \"<username>\",\n    \"metadata\": {\n        \"key_value_pairs\": {\n            \"type\": \"category\",\n            \"relevance\": \"high\"\n        }\n    },\n    \"memory\": \"What to remember\"\n}\n\n## React Pattern Format\n\nFor tool usage:\nQuestion: the input question you must answer\nThought: analyze which tool(s) best reduce uncertainty for this task\nAction: the action to take, should be one of [{tool_names}]\nAction Input: the input to the action in exact JSON format\nObservation: wait for tool result\n\n... (repeat Thought/Action/Action Input/Observation as needed)\n\nFor final answer:\nThought: I now know the final answer\nFinal Answer: the final answer to the original input question\n\n## Optimization Principles\n\n1. **TOOL SYNERGY**: Combine tools that provide complementary information\n2. **MINIMIZE CALLS**: Select tools that answer the most with fewest calls\n3. **RESPECT WORKFLOWS**: Follow established pipelines (e.g., research workflow)\n4. **CACHE WISELY**: Don't repeat singleton tools (datetime, geolocation)\n5. **FAIL FAST**: If unsure between tools, pick the more specific one\n6. **HANDLE ERRORS**: On tool error, refine inputs or try a suitable alternative once; then proceed.\n"
    tool_call_max_retries: 3
    tool_names:
    - current_datetime_tool
    - get_memory
    - memory_add
    - geolocation_retriever_tool
    - kubernetes_retriever_tool
    - code_generation
    - mentalhealth_retriever_tool
    - nvidia_retriever_tool
    - nv_ingest_tool
    - nvidia_rss_feed_tool
    - realtime_serpapi_ai_tool
    - realtime_serpapi_news_tool
    - realtime_serpapi_search_tool
    - semianalysis_retriever_tool
    - veterinarian_retriever_tool
    - weather_tool
    - webscrape_tool
    - finalize_report_researcher
    - query_writer_researcher
    - reflection_researcher
    - relevancy_checker_researcher
    - report_extender_researcher
    - user_uploaded_files_retriever_tool
    - summarizer_researcher
    verbose: true
    workflow_alias: Daedalus-Deep-Thinker
  finalize_report_researcher:
    _type: chat_completion
    description: Polishes a research report for final delivery, focusing on editorial improvements. This is the last step in the research workflow, ensuring a professional and consistent format. It does not generate new content but refines the existing report.
    llm_name: medium_llm
    system_prompt: '# Report Finalizer - Publication Polish Engine


      ROLE: Polish the provided report for delivery. Do not add new content.

      INPUT: Complete report from <summarizer_researcher> or <report_extender_researcher>.

      POSITION: Final step before sending to user.


      Output Format

      <finalize_report_researcher> # [Polished Title]

      ## Introduction [Engaging hook, context, preview]

      ## [Section Name] [Polished content with smooth flow]

      ## Key Takeaways - [Essential insight 1] - [Essential insight 2] - [Essential insight 3]

      ## Conclusion [Synthesis, significance, future]

      ## Sources and References - [All citations used] </finalize_report_researcher>


      TERMINAL: NO commentary. NO markdown fences. ONLY polished report.

      '
    verbose: true
  geolocation_retriever_tool:
    _type: nat_retriever
    content_field: canonical_name
    description: Resolves ambiguous location names into canonical geolocation information, including coordinates. This is a prerequisite for any tool that requires a location, such as weather or location-based search, to prevent ambiguity. It returns the canonical name, coordinates, and region for a given location.
    retriever: geolocation_retriever
    topic: Canonical geolocation normalization and lookup
    verbose: true
  get_memory:
    _type: get_memory
    description: Retrieves the user's preferences, interaction history, and other custom settings from memory. This tool should be used at the beginning of an interaction to personalize the conversation. It helps in understanding user context without having to ask for it repeatedly.
    memory: redis_memory
  image_augmentation_tool:
    _type: image_augmentation
    api_endpoint: https://fde8d464-c30b-4a51-ad04-ee3200156352.invocation.api.nvcf.nvidia.com
    default_seed: 42
    default_steps: 30
    description: Modifies or augments an existing image provided by the user. Use this tool when a user uploads an image and requests edits, modifications, or transformations. It requires an image reference from the user's message to apply changes like adding objects or changing styles.
    redis_url: ${REDIS_URL}
    timeout: 300.0
    verbose: true
  image_generation_tool:
    _type: image_generation
    api_endpoint: https://407754b4-d173-45c9-8d6e-5368726fed70.invocation.api.nvcf.nvidia.com
    default_cfg_scale: 3.5
    default_height: 1024
    default_steps: 50
    default_width: 1024
    description: Generates a new image from a text description. Use this for requests to 'create an image', 'visualize', 'draw a picture', or 'illustrate a concept'. It cannot edit existing images.
    prompt_rewrite:
      llm: fast_llm
      max_tokens: 256
      temperature: 0.9
    timeout: 300.0
    verbose: true
  kubernetes_retriever_tool:
    _type: nat_retriever
    description: Retrieves information from a specialized Kubernetes knowledge base. Use this for questions about Kubernetes concepts, best practices, and troubleshooting. This tool is preferred over general web search for Kubernetes topics.
    retriever: kubernetes_retriever
    topic: Kubernetes and container orchestration
    verbose: true
  memory_add:
    _type: add_memory
    description: Stores or updates user preferences and context in memory for future interactions. Use this when the user states a preference or when a new piece of context should be saved. It helps personalize future conversations.
    memory: redis_memory
  mentalhealth_retriever_tool:
    _type: nat_retriever
    description: Retrieves information from an evidence-based mental health knowledge base. Use for topics like anxiety, stress, and emotional wellness. A disclaimer about educational use must be included in the response.
    retriever: mentalhealth_retriever
    topic: Mental health and psychological wellness
    verbose: true
  nv_ingest_tool:
    _type: nat_nv_ingest
    chunk_overlap: 150
    chunk_size: 1024
    description: Processes and ingests PDF files into a searchable vector format. This is a prerequisite for using the `user_uploaded_files_retriever_tool`. This tool is typically triggered automatically when a user uploads a PDF.
    milvus_uri: ${MILVUS_URI}
    minio_access_key: minioadmin
    minio_endpoint: ${MINIO_ENDPOINT}
    minio_secret_key: minioadmin
    nv_ingest_host: ${NV_INGEST_HOST}
    nv_ingest_port: ${NV_INGEST_PORT}
    redis_url: ${REDIS_URL}:${REDIS_PORT}
    verbose: true
  nvidia_retriever_tool:
    _type: nat_retriever
    description: Retrieves technical and product information from an authoritative NVIDIA knowledge base. Use for any questions about NVIDIA products like GPUs, CUDA, TensorRT, and DGX. This is the preferred source for official NVIDIA information.
    retriever: nvidia_retriever
    topic: NVIDIA technology, products, and corporate information
    verbose: true
  nvidia_rss_feed_tool:
    _type: rss_feed
    description: Fetches and scrapes the latest articles from the NVIDIA developer blog RSS feed. Use this for recent news, announcements, and updates from NVIDIA. It provides the full content of the most relevant article.
    feed_url: https://developer.nvidia.com/blog/feed
    reranker_api_key: ${NVIDIA_API_KEY}
    reranker_endpoint: https://c5b64ba3-16fd-4c3c-a2b8-cd9526f9d34b.invocation.api.nvcf.nvidia.com/v1/ranking
    reranker_model: nvidia/llama-3.2-nv-rerankqa-1b-v2
    verbose: true
  query_writer_researcher:
    _type: chat_completion
    description: Initiates a research workflow by generating 2-3 optimized and diverse search queries for a given topic. This tool is the starting point for conducting comprehensive research and ensures broad coverage of the subject.
    llm_name: medium_llm
    system_prompt: '# Query Writer - Research Pipeline Initiator


      ROLE: Write 2-3 optimized, diverse search queries to kick off research.

      POSITION: Start of pipeline → searches → summarizer → (optional) extend/reflect → finalize.


      Query Types

      1) FOUNDATION: overview/definitions/fundamentals

      2) DEPTH: technical details/mechanisms/implementation

      3) CURRENCY: latest developments/applications/future


      Rules

      - Each query covers a different dimension

      - Use expert terminology; avoid overlap and generic phrasing


      Output

      <query_writer_researcher> "[Query 1 - foundational coverage]" "[Query 2 - technical depth]" "[Query 3 - current state/applications]" </query_writer_researcher>


      CRITICAL: Exactly 2-3 queries. No commentary.

      '
    verbose: true
  realtime_serpapi_ai_tool:
    _type: serpapi_ai
    default_location: Detroit,Michigan,United States
    description: Provides a quick, AI-summarized answer to factual queries using a search engine. Use for 'what is' questions or when a single, verifiable fact is needed. It returns a direct answer with sources.
    geolocation_retriever_name: geolocation_retriever_tool
    use_geolocation_retriever: true
    verbose: true
  realtime_serpapi_news_tool:
    _type: serpapi_news
    default_location: Detroit,Michigan,United States
    description: Searches for breaking news and scrapes the full content of the top articles. Use for requests about news, latest developments, or recent events. It returns headlines and the full text of the articles.
    geolocation_retriever_name: geolocation_retriever_tool
    use_geolocation_retriever: true
    verbose: true
  realtime_serpapi_search_tool:
    _type: serpapi_search
    default_location: Detroit,Michigan,United States
    default_num_results: 10
    description: Performs a comprehensive web search and scrapes the content of the top results. Use for in-depth research, 'how-to' questions, and finding technical documentation from the web. It provides multiple sources and perspectives.
    geolocation_retriever_name: geolocation_retriever_tool
    use_geolocation_retriever: true
    verbose: true
  reflection_researcher:
    _type: chat_completion
    description: Analyzes a generated research report to identify information gaps and ensure completeness. If gaps are found, it can trigger new searches to gather missing information. This acts as a quality gate before finalizing the report.
    llm_name: medium_llm
    system_prompt: '# Reflection - Gap Analysis Engine


      ROLE: Quality gate. Identify material gaps in the report before finalization.

      INPUT: Report from <summarizer_researcher> or <report_extender_researcher>.


      Detect Gaps

      - Missing core concepts or unsupported claims

      - Technical voids (specs/metrics/how-to)

      - Currency/practical gaps if relevant


      Output

      IF GAPS (max 2 queries):

      <reflection_researcher>

      "query": "[Precise search to fill specific gap]"

      "report_section": "[Exact section name needing info]"

      "rationale": "[Why this gap blocks understanding]"

      </reflection_researcher>


      IF COMPLETE:

      <reflection_researcher> NO_GAPS </reflection_researcher>

      '
    verbose: true
  relevancy_checker_researcher:
    _type: chat_completion
    description: Acts as a binary filter for search results to ensure only relevant content is used for report synthesis. It validates each piece of retrieved information against the original query. This helps to eliminate noise from the research pipeline.
    llm_name: medium_llm
    system_prompt: '# Relevancy Checker - Quality Gate Filter


      ROLE: Binary relevance judge between search and synthesis.

      INPUTS: Query (from tags) + retrieved content.


      Criteria

      YES: directly answers query core + sufficient detail + authoritative.

      NO: tangential, shallow, wrong aspect, or poor quality.


      Output

      <relevancy_checker_researcher> "score": "yes" "explanation": "[brief why]" </relevancy_checker_researcher>

      OR

      <relevancy_checker_researcher> "score": "no" "explanation": "[brief why]" </relevancy_checker_researcher>

      '
    verbose: true
  report_extender_researcher:
    _type: chat_completion
    description: Integrates new findings into an existing research report to fill identified gaps. It seamlessly weaves new information into the report while preserving its original structure and narrative flow. This is used when a report needs to be enhanced with additional details.
    llm_name: medium_llm
    system_prompt: '# Report Extender - Seamless Integration Engine


      ROLE: Integrate new findings into the existing report to fill gaps.

      INPUTS: Base report + new research results.

      POSITION: After reflection finds gaps and new searches are complete.


      Method

      - Map new info to sections, weave in naturally, keep voice/structure

      - Add brief transitions; limit growth to ~20%


      Output

      <report_extender_researcher> # [Original Title - Never Change]

      ## [Section Name] [Original content with new information naturally woven in]

      ## [Another Section] [Enhanced with specific gap-filling content] </report_extender_researcher>


      CONSTRAINT: Enhance, don’t rewrite.

      '
    verbose: true
  semianalysis_retriever_tool:
    _type: nat_retriever
    description: Retrieves expert analysis and market intelligence on the semiconductor industry. Use for topics like foundries (TSMC, Intel), process nodes, and chip economics. This is the preferred source for deep industry insights.
    retriever: semianalysis_retriever
    topic: Semiconductor industry analysis and market intelligence
    verbose: true
  summarizer_researcher:
    _type: chat_completion
    description: Synthesizes raw research findings from various sources into a structured and coherent report. This tool creates the initial draft of the report by organizing information and extracting key insights. It transforms unstructured search results into a narrative.
    llm_name: medium_llm
    system_prompt: '# Summarizer - Research Synthesizer


      ROLE: Turn raw search results into a structured, insightful report.

      INPUTS: Search results for queries from <query_writer_researcher>.

      POSITION: After searches; before extend/reflect/finalize.


      Report Architecture

      <summarizer_researcher> # [Descriptive Title That Captures Essence]

      ## Introduction [Hook + Context + Scope + Preview]

      ## [Core Section 1 - Fundamentals] [Synthesize across sources]

      ## [Core Section 2 - Technical Details] [Deep dive with examples]

      ## [Core Section 3 - Applications/Implications] [Real-world relevance]

      ## Key Insights - [Finding 1] - [Finding 2] - [Finding 3]

      ## Conclusion [Synthesis + So What? + Future] </summarizer_researcher>


      Quality

      - Synthesis > summary; strong narrative flow

      - Evidence-based; actionable where possible


      Constraints: Single synthesis pass. No new searches.

      '
    verbose: true
  user_uploaded_files_retriever_tool:
    _type: nat_retriever
    description: Queries and retrieves information from a user's uploaded PDF documents. This tool can only be used after a PDF has been processed by the `nv_ingest_tool`. It allows searching the content of the user's private files.
    retriever: user_uploaded_files_retriever
    topic: User uploaded files from PDF
    verbose: true
  veterinarian_retriever_tool:
    _type: nat_retriever
    description: Retrieves information from an authoritative veterinary medical knowledge base. Use for any questions about pet health, including symptoms, diseases, and treatments. A disclaimer to consult a veterinarian must be included in the response.
    retriever: veterinarian_retriever
    topic: Veterinary medicine and animal care
    verbose: true
  weather_tool:
    _type: weather
    description: Provides real-time weather data and forecasts for a specified location. It requires a normalized location from the `geolocation_retriever_tool`. Use this for any questions about weather conditions, temperature, or forecasts.
    fallback_latitude: 42.1667
    fallback_location_name: Detroit,Michigan,United States
    fallback_longitude: -83.7816
    geocoding_timeout: 30.0
    geolocation_retriever_name: geolocation_retriever_tool
    include_hourly: true
    use_geolocation_retriever: true
    verbose: true
    weather_timeout: 30.0
  webscrape_tool:
    _type: webscrape
    allowed_schemes:
    - http
    - https
    description: Extracts the full text content from a given URL. Use this when you need to read the content of a specific webpage, for example, from a URL found in search results. It is useful for getting more detail than a search snippet provides.
    max_output_tokens: 64000
    respect_robots_txt: true
    timeout: 30.0
    user_agent: daedalus-webscraper/1.0
    verbose: true
general:
  front_end:
    _type: fastapi
    step_adaptor:
      event_category:
      - LLM
      - TOOL
      mode: default
  telemetry:
    tracing:
      phoenix:
        _type: phoenix
        endpoint: ${DAEDALUS_PHOENIX_ENDPOINT}
        project: daedalus-deep-thinker
llms:
  coding_llm:
    _type: nim
    api_key: ${NVIDIA_API_KEY}
    base_url: https://27c0f207-e2a5-46c4-bad5-b39468c3a75e.invocation.api.nvcf.nvidia.com/v1
    max_tokens: 65536
    model_name: qwen/qwen2.5-coder-32b-instruct
  fast_llm:
    _type: nim
    api_key: ${NVIDIA_API_KEY}
    base_url: https://5183a11a-633e-4945-b882-de86ce85125e.invocation.api.nvcf.nvidia.com/v1
    max_tokens: 2048
    model_name: nvidia/nvidia-nemotron-nano-9b-v2
    temperature: 0.6
    thinking: false
  medium_llm:
    _type: nim
    api_key: ${NVIDIA_API_KEY}
    base_url: https://9adef108-3097-4540-ba5f-873a9da8e54f.invocation.api.nvcf.nvidia.com/v1
    max_tokens: 65536
    model_name: openai/gpt-oss-120b
    temperature: 1
    top_p: 1
  reasoning_llm:
    _type: nim
    api_key: ${NVIDIA_API_KEY}
    base_url: https://0fc21779-145c-4e2a-9237-ec8599e8e4c8.invocation.api.nvcf.nvidia.com/v1
    max_tokens: 65536
    model_name: Qwen/Qwen3-Next-80B-A3B-Thinking
    temperature: 0.6
    top_p: 0.7
  tool_calling_llm:
    _type: openai
    api_key: ${NEBIUS_API_KEY}
    base_url: https://api.studio.nebius.com/v1
    max_tokens: 4096
    model_name: zai-org/GLM-4.5
memory:
  redis_memory:
    _type: nat.plugins.redis/redis_memory
    db: 0
    embedder: milvus_embedder
    host: ${RI_REDIS_HOST_DAEDALUS}
    key_prefix: nat
    port: ${REDIS_PORT}
retrievers:
  geolocation_retriever:
    _type: smart_milvus
    collection_name: geolocation
    content_field: canonical_name
    database_name: default
    description: 'UNIQUE: Canonical geolocation database for location normalization. DIFFERENTIATOR: Resolves ambiguous locations with authoritative data vs guessing. MUTUAL_INFO: Essential for location-based tools needing precise coordinates. WHEN_SELECT: Any ambiguous location name before using weather/search tools. ENTROPY_REDUCTION: Eliminates location ambiguity errors. COMBINES_WITH: weather_tool, serpapi tools with location params. OUTPUT: Canonical name, lat/lon, region. USE_CASE: "Paris" → "Paris, France" or "Paris, Texas". NOT_FOR: Already precise locations.'
    embedding_model: milvus_embedder
    reranker_endpoint: https://c5b64ba3-16fd-4c3c-a2b8-cd9526f9d34b.invocation.api.nvcf.nvidia.com/v1/ranking
    reranker_model: nvidia/llama-3.2-nv-rerankqa-1b-v2
    reranker_top_n: 1
    return_as_string: false
    top_k: 5
    uri: ${MILVUS_URI}
    use_reranker: true
    vector_field: embedding
  kubernetes_retriever:
    _type: smart_milvus
    collection_name: kubernetes
    content_field: text
    database_name: default
    description: 'UNIQUE: Curated Kubernetes technical documentation and best practices - not updated regularly. DIFFERENTIATOR: K8s-specific expertise vs general web search results. MUTUAL_EXCLUSION: Use instead of web search for Kubernetes topics. WHEN_SELECT: Pod scheduling, service mesh, K8s networking, storage, security policies. ENTROPY_REDUCTION: Authoritative K8s patterns vs varying blog quality. COMBINES_WITH: code_generation (YAML manifests). OUTPUT: Config patterns, troubleshooting guides, architecture concepts. COVERAGE: Official docs + expert technical blogs. NOT_FOR: Generic container questions.'
    embedding_model: milvus_embedder
    reranker_endpoint: https://c5b64ba3-16fd-4c3c-a2b8-cd9526f9d34b.invocation.api.nvcf.nvidia.com/v1/ranking
    reranker_model: nvidia/llama-3.2-nv-rerankqa-1b-v2
    reranker_top_n: 10
    return_as_string: false
    top_k: 20
    uri: ${MILVUS_URI}
    use_reranker: true
    vector_field: vector
    verbose: true
  mentalhealth_retriever:
    _type: smart_milvus
    collection_name: mentalhealth
    content_field: text
    database_name: default
    description: 'UNIQUE: Evidence-based mental health content from Mental Health Foundation - not updated regularly. DIFFERENTIATOR: Validated mental wellness info vs potentially harmful web content. MUTUAL_EXCLUSION: Use over general search for mental health topics. WHEN_SELECT: Anxiety, depression, stress, trauma, coping strategies, wellness practices. ENTROPY_REDUCTION: Trusted source vs unverified online advice. MANDATORY: Include educational disclaimer, not therapy. COMBINES_WITH: current_datetime_tool (crisis resources). OUTPUT: Condition guides, coping strategies, support resources. CRITICAL: Educational only; direct crises to hotlines.'
    embedding_model: milvus_embedder
    reranker_endpoint: https://c5b64ba3-16fd-4c3c-a2b8-cd9526f9d34b.invocation.api.nvcf.nvidia.com/v1/ranking
    reranker_model: nvidia/llama-3.2-nv-rerankqa-1b-v2
    reranker_top_n: 10
    return_as_string: false
    top_k: 20
    uri: ${MILVUS_URI}
    use_reranker: true
    vector_field: vector
    verbose: true
  nvidia_retriever:
    _type: smart_milvus
    collection_name: nvidia
    content_field: text
    database_name: default
    description: 'UNIQUE: Comprehensive NVIDIA knowledge base spanning products to research - not updated regularly. DIFFERENTIATOR: Official NVIDIA content vs nvidia_rss_feed (news) or web search. MUTUAL_EXCLUSION: Primary source for ANY NVIDIA technical topic. WHEN_SELECT: GPU architectures (H100/A100), CUDA, TensorRT, DGX, Jetson, NeMo. ENTROPY_REDUCTION: Accurate specs vs outdated web info. COMBINES_WITH: nvidia_rss_feed_tool (latest updates); code_generation (CUDA code). OUTPUT: Technical docs, product specs, research papers. COVERAGE: Hardware, software, corporate strategy. NOT_FOR: Competitor GPUs.'
    embedding_model: milvus_embedder
    reranker_endpoint: https://c5b64ba3-16fd-4c3c-a2b8-cd9526f9d34b.invocation.api.nvcf.nvidia.com/v1/ranking
    reranker_model: nvidia/llama-3.2-nv-rerankqa-1b-v2
    reranker_top_n: 10
    return_as_string: false
    top_k: 20
    uri: ${MILVUS_URI}
    use_reranker: true
    vector_field: vector
    verbose: true
  semianalysis_retriever:
    _type: smart_milvus
    collection_name: semianalysis
