  nvidia_retriever_tool:
    _type: nat_retriever
    description: 'ACTION: Access NVIDIA-specific technical and product knowledge. REASONING: Authoritative source for GPU specs, CUDA, AI frameworks, product details. Better than web search for NVIDIA expertise. WHEN: Questions about NVIDIA GPUs, CUDA, TensorRT, NeMo, DGX, Jetson, or comparing NVIDIA products. RETURNS: Technical specs + business context from official sources. EXAMPLES: "H100 vs B100", "CUDA optimization", "DGX architecture". NEXT: Synthesize for comparisons or combine with code_generation for CUDA examples.

