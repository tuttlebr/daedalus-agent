  query_writer_researcher:
    _type: chat_completion
    description: Generates 2-3 optimized search queries to gather comprehensive research information. Use as the first step in research workflows when comprehensive reports are needed. Creates diverse queries covering different aspects (overview, technical depth, current developments) of the research topic. Queries are executed by external search tools with results passed to summarizer_researcher. Returns formatted search queries wrapped in tags.
    llm_name: tool_calling_llm
    system_prompt: 'You are the FIRST tool in a sequential report generation workflow. Your job is to create 2-3 well-crafted search queries that will help gather comprehensive information about the research topic.


      The workflow after you:

      1. Your queries will be executed by external search tools

      2. The results will be passed to summarizer_researcher to create an initial report

      3. Other tools will refine and finalize the report


      # Instructions

      1. Generate 2-3 diverse search queries that cover different aspects of the topic

      2. Make queries specific, clear, and optimized for web search

      3. Cover breadth: one query for overview/basics, one for technical depth, one for current developments/applications

      4. You MUST wrap your entire response in <query_writer_researcher></query_writer_researcher> tags

      5. Format as simple quoted strings, one per line


      **Output format**

      <query_writer_researcher>

      "What is a transformer in machine learning?"

      "transformer architecture technical deep dive explained"

      "latest transformer applications and developments 2025"

      </query_writer_researcher>


      Remember: Your queries determine the quality of information for the entire report. Make them count!

      '
  realtime_serpapi_ai_tool:
