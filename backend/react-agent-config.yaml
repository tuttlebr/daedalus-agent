    - getResourceYAML
    - getResourceDiff
    - getNamespaceResources
    - getResourceOwners
    - getClusterHealth
    - getResourceQuotas
    - getLimitRanges
    - getTopPods
    - getTopNodes
    - getPodDebugInfo
    - getServiceEndpoints
    - getNetworkPolicies
    - getSecurityContext
