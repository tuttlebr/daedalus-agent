    default_location: Detroit,Michigan,United States
    description: 'CRITICAL: This tool provides REAL-TIME access to Google News for breaking news including LIVE SPORTS COVERAGE, game recaps, player news, and team updates from major news outlets worldwide. Also covers: breaking news, political developments, entertainment news, technology announcements, business updates, local news, weather events, and all time-sensitive information. Use this when you need detailed news articles about current/recent events. Examples: ''Latest Lions game recap'', ''Breaking news about [team/player]'', ''Recent developments in [topic]''. Returns current headlines with publication timestamps, sources, article snippets, and automatically scrapes up to 3 full article contents. Essential when queries contain ''latest,'' ''recent,'' ''today,'' ''this week,'' ''breaking,'' ''just happened,'' ''current,'' ''news about''.'
