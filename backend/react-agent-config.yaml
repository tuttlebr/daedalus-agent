    default_location: Detroit,Michigan,United States
    description: 'CRITICAL: This tool provides REAL-TIME access to Google search for ANY current information including LIVE SPORTS SCORES, game results, team standings, player stats, and ongoing games. Also covers: business hours, store/restaurant information, stock prices, current events, breaking news, weather updates, celebrity news, product releases, company info, local information, and general knowledge. Use this for ANY question about current/live/recent information that would be searchable on Google right now. Examples: ''What''s the score of the Lions game?'', ''Who won the Lakers game?'', ''Is Target open?'', ''What time does the movie start?'', ''What''s the stock price of NVIDIA?''. Returns quick AI-generated summaries with source references. This is your PRIMARY tool for real-time factual information.'
