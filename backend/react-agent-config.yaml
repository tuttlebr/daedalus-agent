    base_url: https://84105d6a-bb7e-4fc3-b401-f82cb3707a28.invocation.api.nvcf.nvidia.com/v1
    model_name: nvidia/llama-3.2-nv-embedqa-1b-v2
    truncate: END
function_groups:
  deepwiki_mcp_server:
