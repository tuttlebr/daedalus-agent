    description: Searches Wikipedia for encyclopedic information on topics. Use when users ask about historical events, biographical information, scientific concepts, geographic locations, cultural topics, or any subject that benefits from comprehensive, well-sourced reference material. Best for factual background information, definitions, and context. Wikipedia provides neutral, well-edited content but may not have the latest breaking news or highly specialized technical details. Returns article summaries with links to full articles.
