      - https
    description: Extracts and parses full content from specific web pages. Use when you have a URL (from search results or user-provided) and need to read the complete article, documentation page, or webpage content. Returns cleaned, readable text from the page body. Essential for following up on search results to get full details, or when users provide specific URLs to analyze. Respects robots.txt and has timeout/size limits. Not suitable for sites requiring authentication or JavaScript-heavy single-page applications.
    max_output_tokens: 64000
