# =============================================================================
# NeMo Agent Toolkit Configuration
# =============================================================================
# This configuration defines a multi-modal AI agent with retrieval capabilities,
# code generation, web scraping, and specialized domain knowledge.
#
# Structure:
# 1. Language Models (LLMs) - Different models for different use cases
# 2. Embedders - Text embedding models for vector search
# 3. Retrievers - Vector databases for domain-specific knowledge
# 4. Functions/Tools - Available capabilities for the agent
# 5. Workflow - Agent configuration and orchestration
# =============================================================================

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
general:
  logging:
    console:
      _type: console
      level: INFO

# =============================================================================
# LANGUAGE MODELS
# =============================================================================
# Three-tier LLM strategy: fast for quick responses, balanced for general use,
# intelligent for complex reasoning tasks
llms:
  # Fast, lightweight model for quick responses and simple tasks
  fast_llm:
    _type: nim
    model_name: nvidia/nvidia-nemotron-nano-9b-v2
    base_url: https://5183a11a-633e-4945-b882-de86ce85125e.invocation.api.nvcf.nvidia.com/v1
    max_tokens: 64000
    thinking: false
    temperature: 0.9

  # Balanced model for general-purpose tasks with good quality/speed tradeoff
  balanced_llm:
    _type: nim
    model_name: nvidia/llama-3-3-nemotron-super-49b-v1-5
    base_url: https://5eb560ed-7ab8-4985-ab2a-dd1f7ea5eb66.invocation.api.nvcf.nvidia.com/v1
    temperature: 0
    max_tokens: 64000
    thinking: false
    tool_choice: auto
    parallel_tool_calls: true
    optimizable_params:
      - temperature
      - top_p
      - max_tokens

  # High-capability model for complex reasoning and analysis
  intelligent_llm:
    _type: nim
    model_name: openai/gpt-oss-120b
    base_url: https://9adef108-3097-4540-ba5f-873a9da8e54f.invocation.api.nvcf.nvidia.com/v1
    max_tokens: 64000
    optimizable_params:
      - temperature
      - top_p
      - max_tokens

# =============================================================================
# EMBEDDING MODELS
# =============================================================================
# Models for converting text to vector representations for semantic search
embedders:
  # Primary embedder for all retrieval operations
  milvus_embedder:
    _type: nim
    model_name: nvidia/llama-3.2-nv-embedqa-1b-v2
    base_url: https://84105d6a-bb7e-4fc3-b401-f82cb3707a28.invocation.api.nvcf.nvidia.com/v1

# =============================================================================
# KNOWLEDGE RETRIEVERS
# =============================================================================
# Vector databases containing domain-specific knowledge with reranking
retrievers:
  # Known Geolocation values
  geolocation_retriever:
    _type: smart_milvus
    description: Given an approximate location, retrieve information from authoritative geolocation information.
    uri: http://milvus.milvus.svc.cluster.local:19530
    database_name: default
    collection_name: geolocation
    content_field: canonical_name
    embedding_model: milvus_embedder
    top_k: 5
    vector_field: embedding
    use_reranker: true
    reranker_endpoint: https://c5b64ba3-16fd-4c3c-a2b8-cd9526f9d34b.invocation.api.nvcf.nvidia.com/v1/ranking
    reranker_model: nvidia/llama-3.2-nv-rerankqa-1b-v2
    reranker_top_n: 1

  # Infrastructure and container orchestration knowledge
  kubernetes_retriever:
    _type: smart_milvus
    description: Retrieve information from Kubernetes from documentation and technical blogs
    uri: http://milvus.milvus.svc.cluster.local:19530
    database_name: default
    collection_name: kubernetes
    embedding_model: milvus_embedder
    top_k: 10
    vector_field: embedding
    use_reranker: true
    reranker_endpoint: https://c5b64ba3-16fd-4c3c-a2b8-cd9526f9d34b.invocation.api.nvcf.nvidia.com/v1/ranking
    reranker_model: nvidia/llama-3.2-nv-rerankqa-1b-v2
    reranker_top_n: 5

  # NVIDIA corporate and technical knowledge
  nvidia_retriever:
    _type: smart_milvus
    description: Retrieve information from NVIDIA from corporate news, documentation and technical blogs
    uri: http://milvus.milvus.svc.cluster.local:19530
    database_name: default
    collection_name: nvidia
    embedding_model: milvus_embedder
    top_k: 10
    vector_field: embedding
    use_reranker: true
    reranker_endpoint: https://c5b64ba3-16fd-4c3c-a2b8-cd9526f9d34b.invocation.api.nvcf.nvidia.com/v1/ranking
    reranker_model: nvidia/llama-3.2-nv-rerankqa-1b-v2
    reranker_top_n: 5

  # Veterinary and animal care knowledge
  veterinarian_retriever:
    _type: smart_milvus
    description: Retrieve information about veterinary care from VetPartner
    uri: http://milvus.milvus.svc.cluster.local:19530
    database_name: default
    collection_name: vetpartner
    embedding_model: milvus_embedder
    top_k: 10
    vector_field: embedding
    use_reranker: true
    reranker_endpoint: https://c5b64ba3-16fd-4c3c-a2b8-cd9526f9d34b.invocation.api.nvcf.nvidia.com/v1/ranking
    reranker_model: nvidia/llama-3.2-nv-rerankqa-1b-v2
    reranker_top_n: 5

# =============================================================================
# FUNCTIONS & TOOLS
# =============================================================================
# Available capabilities for the agent, organized by category
functions:
  # ---------------------------------------------------------------------------
  # KNOWLEDGE RETRIEVAL TOOLS
  # ---------------------------------------------------------------------------
  # Domain-specific retrieval tools that leverage the vector databases above
  geolocation_retriever_tool:
    _type: nat_retriever
    retriever: geolocation_retriever
    content_field: canonical_name
    topic: Retrieve information from Known geolocation values for search

  nvidia_retriever_tool:
    _type: nat_retriever
    retriever: nvidia_retriever
    topic: Retrieve information from NVIDIA from documentation and technical blogs
    description: Use this tool whenever the user asks for information a NVIDIA solution architect/engineer would know.

  veterinarian_retriever_tool:
    _type: nat_retriever
    retriever: veterinarian_retriever
    topic: Retrieve information about veterinary care from VetPartner
    description: Use this tool whenever the user asks for information a veterinarian would know.

  kubernetes_retriever_tool:
    _type: nat_retriever
    retriever: kubernetes_retriever
    topic: Retrieve information from Kubernetes from documentation.
    description: Use this tool whenever the user asks for information a Kubernetes solution architect/engineer would know.

  # ---------------------------------------------------------------------------
  # WEB SEARCH & INFORMATION GATHERING
  # ---------------------------------------------------------------------------
  # External information sources for real-time data and general knowledge
  wikipedia_search_tool:
    _type: wiki_search
    max_results: 3
    description: Use this tool whenever the user asks for information which would benefit from a Wikipedia search.

  serpapi_search_tool:
    _type: serpapi_search
    default_location: United States
    default_num_results: 10
    description: Use this tool whenever the user asks for information which would benefit from a web search.
    use_geolocation_retriever: true
    geolocation_retriever_name: geolocation_retriever_tool

  serpapi_ai_tool:
    _type: serpapi_ai
    default_location: United States
    description: Use this tool whenever the user asks for information which would benefit from instant answers from search engines.
    use_geolocation_retriever: true
    geolocation_retriever_name: geolocation_retriever_tool

  serpapi_news_tool:
    _type: serpapi_news
    description: Use this tool whenever the user asks for information which would benefit from a news search.
    use_geolocation_retriever: true
    geolocation_retriever_name: geolocation_retriever_tool

  webscrape_tool:
    _type: webscrape
    user_agent: "daedalus-webscraper/1.0"
    request_timeout: 15.0
    max_content_length: 1_000_000
    respect_robots_txt: true
    allowed_schemes: ["https", "http"]

  # ---------------------------------------------------------------------------
  # UTILITY & SYSTEM TOOLS
  # ---------------------------------------------------------------------------
  # Basic system utilities and helper functions

  current_datetime_tool:
    _type: current_datetime

  weather_tool:
    _type: weather
    include_hourly: true
    timeout: 30.0
    use_geolocation_retriever: true
    geolocation_retriever_name: geolocation_retriever_tool

  # ---------------------------------------------------------------------------
  # CONTENT GENERATION TOOLS
  # ---------------------------------------------------------------------------
  # Tools for creating various types of content

  code_generation_tool:
    _type: code_generation
    programming_language: Python
    description: Useful to generate Python code. For any questions about code generation, you must only use this tool!
    llm_name: intelligent_llm
    verbose: true

  image_generation_tool:
    _type: image_generation
    api_endpoint: https://407754b4-d173-45c9-8d6e-5368726fed70.invocation.api.nvcf.nvidia.com
    default_width: 1024
    default_height: 1024
    default_steps: 50
    default_cfg_scale: 3.5
    timeout_seconds: 300
    prompt_rewrite:
      llm: fast_llm
      temperature: 0.9
      max_tokens: 256

  # ---------------------------------------------------------------------------
  # SPECIALIZED ANALYSIS TOOLS
  # ---------------------------------------------------------------------------
  # Domain-specific analysis and decision support tools

  bang_for_buck_tool:
    _type: chat_completion
    llm_name: intelligent_llm
    description: Calculate the bang for buck (!/$) ratio for infrastructure projects
    system_prompt: |
      # Infrastructure Prioritization Assistant - System Prompt

      You are an Infrastructure Prioritization Assistant specialized in analyzing and calculating the return on investment (ROI) for infrastructure projects using the Bang for Buck (!/$ ) methodology. Your primary objective is to help teams make data-driven decisions about resource allocation by quantifying the expected benefit versus cost of proposed work.

      ## Core Principles

      1. **Value Focus**: All infrastructure work must demonstrate measurable time savings for chip teams in a scalable fashion.
      2. **Minimum Threshold**: Do not prioritize items with a !/$ ratio less than 5:1.
      3. **Lasting Impact**: Infrastructure investments should provide durable, scalable value across multiple teams and projects.

      ## Bang for Buck (!/$ ) Calculation Framework

      ### Formula
      ```
      ! (Bang) = (% time saved) × (number of people affected) × (time in relevant project/milestone)
      $ (Buck) = (estimated implementation effort) + (transition costs + ongoing process costs)
      ```

      **Important**: Both ! and $ must use the same effort units (person-days, person-weeks, or person-months).

      ### Key Considerations
      - Implementation effort includes testing and documentation time
      - Only major items (>1 week effort) require formal POR documentation
      - Daily operational items (bugs, enhancements) still require !/$ analysis

      ## Calculation Guidelines by Scenario Type

      ### 1. Standard Time Savings
      Calculate direct time saved per person × number of affected people × project timeframe.

      Example: 3 people save 30 min/week for 6 months = ((0.5/40) × 3 × (6×4×5)) = 4.5 person-days saved

      ### 2. Productivity Enhancements with Escape Prevention
      Include time saved from preventing downstream issues and debugging.

      Example: Eliminating monthly debugging sessions (2 people × 2 days) over 6 months = 24 person-days in bang calculation

      ### 3. Risk Insurance Items
      Calculate as: (probability of bad event) × (cost if event occurs)

      Example: 1% chance of missed bug × 5 people × 2 months full-time = (0.01 × 5 × 40) = 2 person-days

      ### 4. Verification Flow Enablement
      Consider the massive impact of missing critical verification:
      - Potential affected: 150+ people for 3+ months if serious silicon bugs occur
      - Include costs of debugging, workarounds, customer impact, and potential chip respin

      ### 5. Bringup/Emergency Items
      Measure in "chip-days" when entire teams are blocked
      - Affects: All SW, Marketing, and related teams waiting on investigation

      ### 6. Latency Improvements
      Use 10% of latency reduction as actual time saved (conservative estimate accounting for context switching and non-optimal work ordering)

      ### 7. Internal Tool Health/Efficiency
      Use the team's average !/$ as multiplier for internal improvements

      ### 8. Cost Savings (Non-Personnel)
      Convert hardware/license savings to person-time using $250K/year per engineer

      ## Project Timeframes (Update Quarterly)

      When calculating bang, use the following project horizons:
      - Completed projects: 0 months
      - Active near-term projects: 12 months
      - Future projects: 24+ months (with defined start dates)
      - General infrastructure: 12 months (applies to all projects continuously)

      **Default Rule**: Use timeframe for only one project unless other projects explicitly sponsor the request.

      ## Prioritization Guidelines

      1. **Estimation Accuracy**: Aim for order-of-magnitude correctness, not precision
      2. **People Buckets**: Use standard groupings (1, 3, 10, 30, 100+ people)
      3. **P0 Quick Items**: ~1 hour tasks with clear !/$ >5 can bypass formal analysis
      4. **Iteration**: Update bang estimates as understanding evolves

      ## Decision Thresholds

      - **!/$ < 4**: Generally will not be prioritized
      - **!/$ between 4-10**: Requires careful consideration and possible scope adjustment
      - **!/$ > 10**: Clear candidates for implementation

      ## When Analyzing Requests, Consider:

      1. **Who is affected?** Identify specific user groups and their sizes
      2. **What time is saved?** Quantify current inefficiency or risk
      3. **How long is the benefit?** Use appropriate project timeframe
      4. **What's the true cost?** Include implementation, transition, and ongoing costs
      5. **Can we improve !/$?** Negotiate scope if bang is high but cost is prohibitive

      ## Output Format

      When analyzing an infrastructure request, provide:
      1. Clear identification of the scenario type
      2. Detailed bang calculation with assumptions
      3. Cost estimation breakdown
      4. Final !/$ ratio
      5. Recommendation (proceed/reconsider/rescope)
      6. Any suggestions for improving !/$ if borderline

      Remember: The goal is to maximize company-wide benefit through objective, auditable prioritization that enables management to resolve resource allocation across teams and projects.

  first_principles_tool:
    _type: chat_completion
    llm_name: intelligent_llm
    description: Use first principles to reason about the user's question when the user's question involves problem solving or philosophical debate.
    system_prompt: |
      You are an advanced reasoning engine that operates strictly from first‑principles thinking. Your task is to approach every query by:
      1. **Identifying Indemonstrable Foundations**
        - Seek the most basic, self‑evident truths or axioms that cannot be further reduced.
        - Explicitly label these as "Fundamental Premise" and note any underlying physical, mathematical, or logical laws.

      2. **Challenging Assumptions**
        - List every implicit or explicit assumption in the problem statement.
        - For each, ask: "Is this truly necessary? Can it be proven, or is it merely a convention?"
        - Discard or replace assumptions that lack justification.

      3. **Decomposing the Problem**
        - Break the problem into its smallest constituent components, tracing each back to the identified fundamental premises.
        - Represent the decomposition as a hierarchy or step‑by‑step logical flow.

      4. **Reconstructing Solutions from the Ground Up**
        - Using only the validated fundamental premises, rebuild a solution path.
        - Ensure each step follows directly from a premise or a previously proven intermediate result.
        - Highlight any novel connections or insights that emerge during reconstruction.

      5. **Fostering Innovation**
        - Actively explore alternative configurations of the fundamental premises that could lead to more efficient, elegant, or previously unseen solutions.
        - Propose "What‑if" scenarios that relax or modify premises, and evaluate their impact.

      **Output Format**
      - **Fundamental Premises:** bullet list of core truths.
      - **Assumptions Audit:** table of assumptions with justification status.
      - **Decomposition Tree:** concise outline of sub‑problems linked to premises.
      - **Reconstructed Solution:** stepwise reasoning that culminates in the final answer, referencing only validated premises.
      - **Innovative Extensions (optional):** brief suggestions for further exploration or improvement.

      Always prioritize logical rigor, clarity, and minimal reliance on unproven beliefs. Your goal is to illuminate the problem’s essence and craft solutions that stand on indisputable foundations.

  socratic_method_tool:
    _type: chat_completion
    llm_name: intelligent_llm
    description: Use the socratic method to reason about the user's question when the user's question involves problem solving or philosophical debate.
    system_prompt: |
      You are an AI tutor who engages users through the Socratic method. Your role is to facilitate collaborative dialogue, not to provide direct answers. Follow these principles in every interaction:

      Guided Inquiry

      Begin with open‑ended, thought‑provoking questions that invite the user to explore the topic.
      Use "What…?", "How…?", "Why do you think…?", and "Can you explain…?" to steer the conversation.
      Challenge Assumptions

      Gently question any underlying premises the user presents.
      Ask for clarification or evidence: "What evidence supports that assumption?" or "Could there be an alternative perspective?"
      Promote Self‑Discovery

      Encourage the user to generate their own examples, analogies, or solutions.
      When the user reaches a partial insight, ask, "What does this imply for the larger problem?" or "How might you test this idea?"
      Foster Evidence‑Based Reasoning

      Request supporting data, logical steps, or references: "What sources could verify this claim?"
      Prompt the user to evaluate the reliability of their evidence: "How credible is that source, and why?"
      Maintain Openness and Respect

      Acknowledge the user’s contributions and encourage curiosity.
      Avoid judgment; instead, ask, "What other possibilities might we have missed?"
      Avoid Direct Answers

      If the user explicitly asks for a solution, respond with a guiding question that leads them toward the answer themselves.

  deep_thinker_tool:
    _type: react_agent
    description: "Applies deep philosophical thought to a user's question. Should be used for complex questions that require deep philosophical thought and may not have one best answer."
    llm_name: intelligent_llm
    parse_agent_response_max_retries: 3
    tool_names:
      - wikipedia_search_tool
      - socratic_method_tool
      - first_principles_tool

  internet_deep_search_tool:
    _type: react_agent
    description: Provides deep INTERNET search to a user's question. Should be used for complex questions that require deep INTERNET search and may not have one single answer.
    llm_name: intelligent_llm
    parse_agent_response_max_retries: 3
    tool_names:
      - serpapi_ai_tool
      - serpapi_search_tool
      - serpapi_news_tool
      - wikipedia_search_tool

  veterinarian_deep_search_tool:
    _type: react_agent
    description: Provides deep VETERINARY search to a user's question. Should be used for complex questions that require deep VETERINARY search and may not have one single answer.
    llm_name: intelligent_llm
    parse_agent_response_max_retries: 3
    tool_names:
      - serpapi_ai_tool
      - serpapi_search_tool
      - veterinarian_retriever_tool
      - wikipedia_search_tool

  nvidia_deep_search_tool:
    _type: react_agent
    description: Provides deep NVIDIA search to a user's question. Should be used for complex questions that require deep NVIDIA search and may not have one single answer.
    llm_name: intelligent_llm
    parse_agent_response_max_retries: 3
    tool_names:
      - serpapi_ai_tool
      - serpapi_search_tool
      - nvidia_retriever_tool
      - serpapi_news_tool
      - wikipedia_search_tool

  kubernetes_deep_search_tool:
    _type: react_agent
    description: Provides deep KUBERNETES search to a user's question. Should be used for complex questions that require deep KUBERNETES search and may not have one single answer.
    llm_name: intelligent_llm
    parse_agent_response_max_retries: 3
    tool_names:
      - serpapi_ai_tool
      - serpapi_search_tool
      - kubernetes_retriever_tool
      - wikipedia_search_tool

# =============================================================================
# WORKFLOW CONFIGURATION
# =============================================================================
# Main agent orchestration settings and tool integration
workflow:
  _type: tool_calling_agent
  llm_name: balanced_llm
  handle_tool_errors: true
  verbose: true
  tool_choice: auto
  parallel_tool_calls: true
  additional_instructions: |
    You're encouraged to use multiple tools to answer the user's question when it would provide a more complete answer.
    Always cite your sources at the end of the response in the following markdown format:
    "> Cited sources: [source1], [source2], [source3]"

    Additionally, ensure that:
    1. Sources are listed in the order they appear in the response.
    2. Each source is clearly labeled (e.g., "Wikipedia", "Google News", "Webpage: [URL]").
    3. If a tool doesn't provide a direct source (e.g., weather data), omit it from the list.
    4. The citation block is separated by a blank line from the main content for readability.
  tool_names:
    - nvidia_deep_search_tool
    - veterinarian_deep_search_tool
    - internet_deep_search_tool
    - kubernetes_deep_search_tool
    - geolocation_retriever_tool
    - wikipedia_search_tool
    - webscrape_tool
    - current_datetime_tool
    - weather_tool
    - code_generation_tool
    - bang_for_buck_tool
    - deep_thinker_tool
    - image_generation_tool
    - serpapi_ai_tool
    - serpapi_search_tool
    - serpapi_news_tool
  return_direct:
    - bang_for_buck_tool
    - image_generation_tool

optimizer:
  output_path: "/data/optimizer_results"

  # Numeric (Optuna)
  numeric:
    enabled: true
    n_trials: 50

  # Prompt (Genetic Algorithm)
  prompt:
    enabled: true
    prompt_population_init_function: "prompt_optimizer"
    prompt_recombination_function: "prompt_recombiner" # optional
    ga_population_size: 16
    ga_generations: 8
    ga_offspring_size: 12 # optional; defaults to pop_size - elitism
    ga_crossover_rate: 0.7
    ga_mutation_rate: 0.2
    ga_elitism: 2
    ga_selection_method: "tournament" # or "roulette"
    ga_tournament_size: 3
    ga_parallel_evaluations: 8
    ga_diversity_lambda: 0.0

  # Evaluation
  reps_per_param_set: 5
  eval_metrics:
    latency:
      evaluator_name: "latency"
      direction: "minimize"
      weight: 0.2
    correctness:
      evaluator_name: "correctness"
      direction: "maximize"
      weight: 0.8
