k8s_mcp_get_api_resources:
  _type: mcp_tool_wrapper
  description: Use this tool when the user want's to know the current status of their Daedalus Kubernetes cluster.
  mcp_tool_name: getAPIResources
  url: ${KUBERNETES_MCP_SERVER}

k8s_mcp_list_resources:
  _type: mcp_tool_wrapper
  description: Use this tool to list all instances of a specific resource type in the Kubernetes cluster.
  mcp_tool_name: listResources
  url: ${KUBERNETES_MCP_SERVER}

k8s_mcp_get_resource:
  _type: mcp_tool_wrapper
  description: Use this tool to retrieve detailed information about a specific resource in the Kubernetes cluster.
  mcp_tool_name: getResource
  url: ${KUBERNETES_MCP_SERVER}

k8s_mcp_describe_resource:
  _type: mcp_tool_wrapper
  description: Use this tool to describe a resource in the Kubernetes cluster, similar to `kubectl describe`.
  mcp_tool_name: describeResource
  url: ${KUBERNETES_MCP_SERVER}

k8s_mcp_get_pods_logs:
  _type: mcp_tool_wrapper
  description: Use this tool to retrieve the logs of a specific pod in the Kubernetes cluster.
  mcp_tool_name: getPodsLogs
  url: ${KUBERNETES_MCP_SERVER}

k8s_mcp_get_node_metrics:
  _type: mcp_tool_wrapper
  description: Use this tool to retrieve resource usage metrics for a specific node in the Kubernetes cluster.
  mcp_tool_name: getNodeMetrics
  url: ${KUBERNETES_MCP_SERVER}

k8s_mcp_get_pod_metrics:
  _type: mcp_tool_wrapper
  description: Use this tool to retrieve CPU and Memory metrics for a specific pod in the Kubernetes cluster.
  mcp_tool_name: getPodMetrics
  url: ${KUBERNETES_MCP_SERVER}

k8s_mcp_get_events:
  _type: mcp_tool_wrapper
  description: Use this tool to retrieve events for a specific namespace or resource in the Kubernetes cluster.
  mcp_tool_name: getEvents
  url: ${KUBERNETES_MCP_SERVER}

k8s_mcp_create_or_update_resource:
  _type: mcp_tool_wrapper
  description: Use this tool to create a new resource or update an existing one from a JSON manifest in the Kubernetes cluster.
  mcp_tool_name: createOrUpdateResource
  url: ${KUBERNETES_MCP_SERVER}

k8s_mcp_create_or_update_resource_yaml:
  _type: mcp_tool_wrapper
  description: Use this tool to create a new resource or update an existing one from a YAML manifest in the Kubernetes cluster.
  mcp_tool_name: createOrUpdateResourceYAML
  url: ${KUBERNETES_MCP_SERVER}

k8s_mcp_rollout_restart:
  _type: mcp_tool_wrapper
  description: Use this tool to trigger a rolling restart of a Kubernetes resource like a Deployment or StatefulSet.
  mcp_tool_name: rolloutRestart
  url: ${KUBERNETES_MCP_SERVER}

k8s_mcp_delete_resource:
  _type: mcp_tool_wrapper
  description: Use this tool to delete a specific resource from the Kubernetes cluster.
  mcp_tool_name: deleteResource
  url: ${KUBERNETES_MCP_SERVER}

k8s_mcp_get_ingresses:
  _type: mcp_tool_wrapper
  description: Use this tool to retrieve ingress resources from the Kubernetes cluster, optionally filtering by host.
  mcp_tool_name: getIngresses
  url: ${KUBERNETES_MCP_SERVER}

k8s_mcp_helm_list:
  _type: mcp_tool_wrapper
  description: Use this tool to list all Helm releases in the cluster or a specific namespace.
  mcp_tool_name: helmList
  url: ${KUBERNETES_MCP_SERVER}

k8s_mcp_helm_get:
  _type: mcp_tool_wrapper
  description: Use this tool to get details of a specific Helm release.
  mcp_tool_name: helmGet
  url: ${KUBERNETES_MCP_SERVER}

k8s_mcp_helm_history:
  _type: mcp_tool_wrapper
  description: Use this tool to get the history of a Helm release.
  mcp_tool_name: helmHistory
  url: ${KUBERNETES_MCP_SERVER}
