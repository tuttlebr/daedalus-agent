authentication:
  github_mcp_server:
    _type: api_key
    custom_header_name: Authorization
    custom_header_prefix: Bearer
    raw_key: ${GITHUB_PAT}
embedders:
  milvus_embedder:
    _type: nim
    api_key: ${EMBEDDING_API_KEY}
    base_url: ${EMBEDDING_BASE_URL}
    model_name: ${EMBEDDING_MODEL}
    truncate: END
function_groups:
  github_mcp_server:
    _type: mcp_client
    tool_call_timeout: 120
    reconnect_enabled: true
    include:
      - get_file_contents
      - get_label
      - get_latest_release
      - get_me
      - get_release_by_tag
      - get_tag
      - get_team_members
      - get_teams
      - issue_read
      - list_branches
      - list_commits
      - list_issues
      - list_issue_types
      - list_releases
      - list_tags
      - search_code
      - search_issues
      - search_pull_requests
      - search_repositories
      - search_users
    server:
      auth_provider: github_mcp_server
      transport: streamable-http
      url: https://api.githubcopilot.com/mcp
  dynamo_mcp_server:
    _type: mcp_client
    tool_call_timeout: 120
    reconnect_enabled: true
    include:
      - searchDocs
    server:
      transport: streamable-http
      url: https://docs.dynamo.nvidia.com/dynamo/_mcp/server
  k8s_mcp_server:
    _type: mcp_client
    tool_call_timeout: 120
    reconnect_enabled: true
    server:
      transport: streamable-http
      url: ${KUBERNETES_MCP_SERVER}
  serpapi_mcp_server:
    _type: mcp_client
    tool_call_timeout: 120
    reconnect_enabled: true
    server:
      transport: streamable-http
      url: https://mcp.serpapi.com/${SERPAPI_KEY}/mcp
functions:
  agent_skills_tool:
    _type: agent_skills
    skills_directory: /skills
    allow_script_execution: true
    allowed_script_extensions:
      - .py
      - .sh
    script_timeout: 120
    description: >-
      Discover and use agent skills — specialised instruction sets, workflows,
      and scripts that you can load on demand. Call list_skills to see what is
      available, load_skill to read a skill's instructions or resources, and
      run_skill_script to execute a bundled script.
    verbose: false
  add_memory:
    _type: add_memory
    description:
      'Store a user preference, fact, or personal detail for recall in
      future conversations. Always use this when the user mentions a
      preference, shares personal information, or when you learn something
      worth remembering across sessions. The memory field should describe
      the preference or fact clearly, not the raw question or answer.

      CRITICAL: The memory parameter MUST be a plain text string, never a
      JSON object or dict. Passing a JSON object will cause a validation
      error. Always pass memory as a simple string value.

      REQUIRED PARAMETERS:

      - user_id: string (username)

      - memory: string (plain text description of the preference, fact,
      or detail to store. MUST be a string, not a JSON object.)

      OPTIONAL PARAMETERS:

      - metadata: object with key_value_pairs for categorization (helps
      future retrieval by tagging the memory with type and relevance)

      Examples:

      Basic: {"user_id": "john", "memory": "Prefers dark mode and concise
      responses. Timezone: America/New_York"}

      With metadata: {"user_id": "john", "memory": "User is interested in
      semiconductor supply chain analysis and TSMC process nodes",
      "metadata": {"key_value_pairs": {"type": "interest",
      "relevance": "high"}}}

      '
    memory: redis_memory
    verbose: false
  current_datetime_tool:
    _type: current_datetime
    description: Get the current date, time, and timezone. Use when answering
      time-sensitive questions, calculating deadlines, or when the user asks
      what day or time it is.
    verbose: false
  delete_memory:
    _type: delete_memory
    description:
      'Remove ALL stored memories for a user. This is a bulk operation that
      deletes every memory associated with the given user_id. Individual
      memories cannot be selectively deleted.

      REQUIRED PARAMETERS:

      - user_id: string (username whose memories to delete)

      Example: {"user_id": "john"}

      '
    memory: redis_memory
    verbose: false
  get_memory:
    _type: get_memory
    description:
      'Always call this tool FIRST before calling any other tools, even if
      the user does not mention it. Retrieve stored user preferences,
      interests, and personal details via semantic search. The query should
      focus on preferences that help you tailor your response style, tone,
      and content for this user.

      REQUIRED PARAMETERS (ALL THREE ARE MANDATORY):

      - user_id: string (username to retrieve memories for)

      - query: string (semantic search query; use "user preferences,
      interests, and context" for the initial call, or target a specific
      topic when relevant, e.g. "what does the user know about Kubernetes")

      - top_k: integer (number of results to return, use 5)

      Examples:

      Initial: {"user_id": "john", "query": "user preferences, interests,
      and context", "top_k": 5}

      Topic-specific: {"user_id": "john", "query": "semiconductor industry
      interests and background", "top_k": 5}

      '
    memory: redis_memory
    top_k: 5
    verbose: false
  image_augmentation_tool:
    _type: image_augmentation
    api_endpoint: ${IMAGE_AUGMENTATION_BASE_URL}
    api_key: ${IMAGE_AUGMENTATION_API_KEY}
    api_type: openai
    openai_model: ${IMAGE_AUGMENTATION_MODEL}
    description:
      'Modify an existing user-uploaded image by applying edits, filters,
      transformations, or adding visual elements. The user must have already
      uploaded an image in the conversation.

      REQUIRED PARAMETERS:

      - imageRef: object (from the user''s message, contains imageId and
      sessionId)

      - prompt: string (description of the modifications to apply)

      Example: {"imageRef": {"imageId": "abc123", "sessionId": "xyz"}, "prompt":
      "Add a sunset background and increase contrast"}

      '
    redis_url: ${REDIS_URL}
    timeout: 120
    verbose: false
  image_comprehension_tool:
    _type: image_comprehension
    api_endpoint: ${IMAGE_COMPREHENSION_BASE_URL}
    api_key: ${IMAGE_COMPREHENSION_API_KEY}
    api_type: openai
    openai_model: ${IMAGE_COMPREHENSION_MODEL}
    description: 'Analyze a user-uploaded image and provide descriptions, answer
      questions, extract text (OCR), identify objects, or describe scenes.
      Does not modify the image.

      REQUIRED PARAMETERS:

      - imageRef: object (from the user''s message, contains imageId and
      sessionId)

      OPTIONAL PARAMETERS:

      - query: string (a specific question about the image)

      Example: {"imageRef": {"imageId": "abc123", "sessionId": "xyz"}, "query":
      "What text is visible in this image?"}

      '
    redis_url: ${REDIS_URL}
    timeout: 120
    verbose: false
  image_generation_tool:
    _type: image_generation
    api_endpoint: ${IMAGE_GENERATION_BASE_URL}
    api_key: ${IMAGE_GENERATION_API_KEY}
    api_type: openai
    openai_model: ${IMAGE_GENERATION_MODEL}
    description:
      'Generate a new image from a text description. Produces a 1024x1024
      image based on the prompt. Use when the user requests an original
      image, illustration, or visual creation from scratch.

      REQUIRED PARAMETERS:

      - prompt: string (detailed description of the image to generate)

      Example: {"prompt": "A futuristic city skyline at sunset with flying
      cars and neon lights"}

      '
    redis_url: ${REDIS_URL}
    timeout: 120
    verbose: false
  kubernetes_retriever_tool:
    _type: nat_retriever
    description:
      Search a curated knowledge base of Kubernetes documentation, best
      practices, architecture patterns, and configuration guides. Covers
      official K8s docs, expert technical blogs, and deployment patterns.
      Use for conceptual questions, YAML configuration help, networking,
      storage, RBAC, Helm, operators, and troubleshooting guidance.
    retriever: kubernetes_retriever
    topic: Kubernetes and container orchestration
    verbose: false
  mentalhealth_retriever_tool:
    _type: nat_retriever
    description: Search a curated knowledge base of evidence-based mental health
      information from the Mental Health Foundation. Covers condition guides,
      coping strategies, wellness practices, and psychological well-being
      topics. Educational content only. Always include a disclaimer that
      this information is educational and does not replace professional
      mental health care.
    retriever: mentalhealth_retriever
    topic: Mental health and psychological wellness
    verbose: false
  nv_ingest_postprocessing_tool:
    _type: tool_calling_agent
    tool_names:
      - nv_ingest_tool
    llm_name: tool_calling_llm
    description:
      'Ingest a user-uploaded document (PDF, DOCX, etc.) into the vector
      knowledge base. Processes, chunks, and indexes the document content
      so it becomes searchable. Use when a user uploads a document and wants
      to ask questions about its contents.

      This tool accepts a single input_message string. Pass the full
      instruction including the documentRef JSON, username, and
      collection_name as a natural-language sentence inside input_message.

      Example input_message: "Process the document with
      documentRef={\"documentId\": \"abc123\", \"sessionId\": \"xyz\"},
      username=\"alice\", and collection_name=\"my_docs\"."

      Do NOT pass documentRef as a separate parameter.

      '
    handle_tool_errors: true
    max_iterations: 1
    return_direct:
      - nv_ingest_tool
  nv_ingest_tool:
    _type: nat_nv_ingest
    chunk_overlap: 150
    chunk_size: 1024
    default_collection_name: user_uploads
    description:
      Core document ingestion engine that processes and indexes documents
      into the vector knowledge base using the NVIDIA NV-Ingest service.
    milvus_uri: ${MILVUS_URI}
    minio_access_key: ${MINIO_ACCESS_KEY}
    minio_endpoint: ${MINIO_ENDPOINT}
    minio_secret_key: ${MINIO_SECRET_KEY}
    nv_ingest_host: ${NV_INGEST_HOST}
    nv_ingest_port: ${NV_INGEST_PORT}
    redis_url: ${REDIS_URL}:${REDIS_PORT}
    verbose: false
  nvidia_blog_rss:
    _type: rss_feed
    description:
      Fetch recent articles from the official NVIDIA Blog covering thought
      leadership, AI research trends, business strategy, and general company
      perspectives. Returns the most relevant recent articles ranked against
      the query. Use for questions about recent NVIDIA blog posts, AI industry
      commentary, or broad NVIDIA news and viewpoints.
    feed_url: https://feeds.feedburner.com/nvidiablog
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: false
  nvidia_developer_blog_rss:
    _type: rss_feed
    description:
      Fetch recent articles from the NVIDIA Developer Blog covering SDK
      updates, coding tutorials, how-to guides, API announcements, and technical
      walkthroughs for CUDA, TensorRT, NeMo, and other NVIDIA developer tools.
      Returns the most relevant recent articles ranked against the query. Use
      for questions about NVIDIA developer resources, coding examples, SDK
      release notes, or technical implementation guides.
    feed_url: https://developer.nvidia.com/blog/feed
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: false
  nvidia_news_room_rss:
    _type: rss_feed
    description:
      Fetch recent official NVIDIA press releases and corporate announcements
      from the NVIDIA Newsroom. Covers product launches, partnerships, earnings
      reports, executive statements, and formal corporate communications.
      Returns the most relevant recent releases ranked against the query.
      Use for questions about official NVIDIA announcements, product release
      dates, business partnerships, or corporate news.
    feed_url: https://nvidianews.nvidia.com/releases.xml
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: false
  nvidia_retriever_tool:
    _type: nat_retriever
    description:
      Search a comprehensive NVIDIA technical knowledge base covering GPU
      hardware specifications, CUDA programming documentation, SDK and
      framework guides, research papers, and product information. Use for
      in-depth technical questions about NVIDIA technologies, architecture
      details, API references, and product capabilities. Scope includes
      GPUs, CUDA, TensorRT, NeMo, Triton, RAPIDS, Omniverse, DGX, data
      center products, and NVIDIA research.
    retriever: nvidia_retriever
    topic: NVIDIA technology, products, and corporate information
    verbose: false
  semianalysis_retriever_tool:
    _type: nat_retriever
    description:
      Search a curated knowledge base of expert semiconductor industry
      analysis from SemiAnalysis. Covers foundry economics, process node
      technology, fabrication capacity, supply chain dynamics, competitive
      intelligence, and market trends across the chip industry. Use for
      questions about semiconductor manufacturing, TSMC, Samsung Foundry,
      Intel Foundry, lithography, EUV, chip market dynamics, and industry
      competitive analysis.
    retriever: semianalysis_retriever
    topic: Semiconductor industry analysis and market intelligence
    verbose: false
  semianalysis_rss:
    _type: rss_feed
    description:
      Fetch recent articles from the SemiAnalysis newsletter covering timely
      semiconductor industry analysis, foundry updates, chip market news, and
      supply chain developments. Returns the most relevant recent articles
      ranked against the query. Use for questions about the latest semiconductor
      industry news, recent foundry developments, or current chip market
      conditions.
    feed_url: https://newsletter.semianalysis.com/feed
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: false
  karpathy_bearblog_rss:
    _type: rss_feed
    description:
      Fetch recent blog posts from Andrej Karpathy's Bear Blog. Covers AI
      insights, deep learning perspectives, LLM training and inference, and
      personal reflections on the AI field from a leading researcher and
      former OpenAI / Tesla AI director. Returns the most relevant recent
      posts ranked against the query.
    feed_url: https://karpathy.bearblog.dev/feed/
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: false
  karpathy_github_rss:
    _type: rss_feed
    description:
      Fetch posts from Andrej Karpathy's GitHub Pages blog. Contains longer-form
      technical writing on neural networks, deep learning research, and AI
      education from a leading researcher and former OpenAI / Tesla AI director.
      Returns the most relevant recent posts ranked against the query.
    feed_url: https://karpathy.github.io/feed.xml
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: false
  user_uploaded_files_retriever_tool:
    _type: user_document_retriever
    content_field: text
    database_name: default
    description:
      'Search the content of previously ingested user-uploaded documents
      using semantic search. Returns the most relevant passages from documents
      that have been processed and indexed into the knowledge base.

      ONLY use this tool when the user explicitly asks about their uploaded
      or ingested documents. Do NOT use for daily briefings, general
      knowledge questions, or real-time information requests.

      REQUIRED PARAMETERS:

      - query: string (semantic search query describing what to find in the
      documents)

      - collection_name: string (name of the document collection, typically
      "user_uploads")

      Example: {"query": "What are the main findings?", "collection_name":
      "user_uploads"}

      '
    distance_cutoff: 1.2
    embedder_name: milvus_embedder
    milvus_uri: ${MILVUS_URI}
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    reranker_top_n: 5
    top_k: 10
    use_reranker: true
    vector_field: vector
    verbose: false
  veterinarian_retriever_tool:
    _type: nat_retriever
    description:
      Search a curated veterinary knowledge base from VetPartner covering
      animal health, treatment protocols, medication information, nutrition
      guidelines, and species-specific care for dogs, cats, horses, birds,
      reptiles, fish, and exotic pets. Use for questions about pet health,
      animal symptoms, veterinary medications, and animal care. Always
      include a disclaimer recommending consultation with a licensed
      veterinarian for specific medical advice.
    retriever: veterinarian_retriever
    topic: Veterinary medicine and animal care
    verbose: false
  vtt_interpreter_tool:
    _type: vtt_interpreter
    api_endpoint: ${DEFAULT_LLM_MODEL_BASE_URL}
    model: ${DEFAULT_LLM_MODEL_MODEL}
    api_key: ${DEFAULT_LLM_MODEL_API_KEY}
    description:
      'Convert VTT or SRT transcript text into structured meeting notes
      organized into four sections: Attendees, Business Updates, Technical
      Updates, and Action Items. Use when a user provides a meeting transcript
      and wants it summarized or structured.

      REQUIRED PARAMETERS:

      - vtt_content: string (raw VTT or SRT transcript text)

      Example: {"vtt_content": "WEBVTT\n\n00:00:00.000 --> 00:00:05.000\nJohn:
      Hello everyone..."}

      '
    timeout: 120
    verbose: false
  think_tool:
    _type: think_tool
    max_thought_length: 50000
    max_chain_steps: 20
    description: >-
      Cognitive reasoning scratchpad. Provides think() for single-step
      private reasoning and sequential_think() for multi-step chains with
      revision. Zero side effects. Use to process complex requests, plan
      tool invocations, synthesize multi-source results, or check reasoning
      before acting. Call think BEFORE acting whenever the path forward is
      not immediately obvious.
    verbose: false
  content_distiller_tool:
    _type: content_distiller
    fast_llm_name: distill_llm
    llm_name: tool_calling_llm
    max_input_chars: 100000
    max_output_tokens: 4096
    temperature: 0.1
    wrapper_type: LANGCHAIN
    description: >-
      Secondary LLM content processing pipeline. Provides three tools:
      distill_content (summarize/focus long content), extract_structured
      (pull structured data from unstructured text), and synthesize
      (combine multiple source fragments into coherent analysis). Use to
      post-process verbose tool outputs before responding.
    verbose: false
  user_interaction_tool:
    _type: user_interaction
    max_options: 6
    description: >-
      Structured user interaction framework. Provides clarify (ask
      clarification questions with options), confirm_action (get approval
      before consequential actions), and present_options (structured
      comparison of alternatives). Use to reduce ambiguity and prevent
      wasted effort.
    verbose: false
  mas_optimizer_tool:
    _type: mas_optimizer
    sas_accuracy_threshold: 0.45
    decomposability_threshold: 0.35
    tool_count_threshold: 12
    default_user_id: ${DAEDALUS_DEFAULT_USER:-daedalus}
    drift_keywords:
      - vision language
      - VLM
      - Qwen3-VL
      - image model
    required_keywords:
      - MAS
      - verifier
      - capability gate
      - orchestrat
      - decomposab
    verbosity_ceiling: 2000
    description: >-
      MAS architecture optimizer — evaluate tasks for Multi-Agent vs
      Single-Agent routing, verify draft responses for topic drift and
      missing content, and log outcomes for closed-loop calibration.
      Based on 'Towards a Science of Scaling Agent Systems'
      (arXiv:2512.08296v2).
    verbose: false
  mas_orchestrator_tool:
    _type: tool_calling_agent
    tool_names:
      - add_memory
      - agent_skills_tool
      - content_distiller_tool
      - current_datetime_tool
      - delete_memory
      - dynamo_mcp_server
      - get_memory
      - github_mcp_server
      - k8s_mcp_server
      - kubernetes_retriever_tool
      - mentalhealth_retriever_tool
      - nvidia_blog_rss
      - nvidia_developer_blog_rss
      - nvidia_news_room_rss
      - nvidia_retriever_tool
      - semianalysis_retriever_tool
      - semianalysis_rss
      - karpathy_bearblog_rss
      - karpathy_github_rss
      - serpapi_search_tool
      - think_tool
      - user_interaction_tool
      - user_uploaded_files_retriever_tool
      - veterinarian_retriever_tool
      - vtt_interpreter_tool
      - webscrape_tool
      - mas_optimizer_tool
    llm_name: reasoning_llm
    description: >-
      Primary query handler for all non-image requests. Evaluates every
      task with mas_evaluate to select Single-Agent (SAS) or Multi-Agent
      (MAS) architecture. For SAS tasks, uses tools directly with no
      overhead. For MAS tasks, spawns parallel analysis roles with a
      verifier stage that reduces error amplification from 17.2x to 4.4x.
    handle_tool_errors: true
    max_iterations: 30
    verbose: false
    system_prompt: |
      You are Daedalus, built on NVIDIA NeMo Agent toolkit and implementing
      task-contingent architecture selection per 'Towards a Science of
      Scaling Agent Systems' (arXiv:2512.08296v2). Your audience is senior
      technology executives and founders.

      # Startup

      On every request, call get_memory(user_id=<username>,
      query="user preferences, interests, and context", top_k=5) in
      parallel with mas_evaluate to assess the task.

      Exception: when the user requests their daily briefing, call
      get_memory FIRST and wait for results before calling any other
      tools. The briefing procedure and its constraints are stored in
      memory and must be followed exactly.

      # Architecture routing

      If mas_evaluate recommends SAS: use your tools directly to answer
      the query. No orchestration overhead.

      If mas_evaluate recommends MAS (centralized_mas_with_verifier):
      1. Execute three analysis roles:
         - Intent: Call get_memory for user corrections and preferences.
           Summarize in exactly 5 words.
         - Principles: Identify applicable architecture rules. Summarize
           in 5 words.
         - Brevity: Call get_memory for response style preferences.
           Summarize in 5 words.
      2. Synthesize a draft response from the three summaries, using
         retrieval and search tools as needed to gather information.
      3. Call mas_verify with the draft, original task, and task type.
         If verification fails, apply revision notes and re-verify once.
      4. Call mas_log_outcome with final metrics, then persist via
         add_memory.

      # Memory

      Store noteworthy preferences or details with add_memory as clear
      declarative statements. Include metadata key_value_pairs when it
      aids retrieval. Call get_memory mid-conversation with topic-specific
      queries when prior context would improve your answer.

      # Style

      Brevity and information density are paramount. Every sentence should
      earn its place. Lead with the answer; add supporting detail only
      when it changes what the reader would do. Write the way a sharp
      colleague talks: natural, confident, no filler. If it would sound
      stilted or awkward spoken aloud, rewrite it. Reserve lists and
      tables for genuinely comparative content.

      Never use em dashes, emojis, or emoticons. Minimize bold/italic.
      Keep paragraphs short.

      # Reasoning

      Use think() before acting whenever the request is complex, ambiguous,
      or requires synthesizing information from multiple sources. Use
      sequential_think() for extended multi-step analysis that benefits
      from tracking and revising reasoning steps.

      # User interaction

      Use clarify when a request has multiple valid interpretations.
      Use confirm_action before modifying external state (Kubernetes,
      GitHub, memory deletion). Use present_options when you identify
      multiple valid approaches and the best choice depends on user
      preferences.

      # Content processing

      When tool outputs are verbose (web scrapes, long RSS articles,
      multiple retriever chunks), use content_distiller_tool to process
      them before incorporating into your response. Use distill_content
      for summarization, extract_structured for pulling specific data
      points, and synthesize when combining information from multiple
      sources.

      # Tool selection

      Prefer retrieval and real-time data over prior knowledge. On tool
      failure, explain and suggest alternatives. State uncertainty
      honestly; offer to investigate.

      user_uploaded_files_retriever_tool is ONLY for searching the content
      of documents the user has explicitly uploaded and ingested. NEVER use
      it as a substitute for get_memory, and NEVER call it unless the user
      is asking about a specific document they uploaded.
  deep_thinker_tool:
    _type: tool_calling_agent
    tool_names:
      - add_memory
      - agent_skills_tool
      - content_distiller_tool
      - current_datetime_tool
      - delete_memory
      - dynamo_mcp_server
      - get_memory
      - github_mcp_server
      - k8s_mcp_server
      - kubernetes_retriever_tool
      - mentalhealth_retriever_tool
      - nv_ingest_postprocessing_tool
      - nvidia_blog_rss
      - nvidia_developer_blog_rss
      - nvidia_news_room_rss
      - nvidia_retriever_tool
      - semianalysis_retriever_tool
      - semianalysis_rss
      - karpathy_bearblog_rss
      - karpathy_github_rss
      - serpapi_search_tool
      - think_tool
      - user_interaction_tool
      - user_uploaded_files_retriever_tool
      - veterinarian_retriever_tool
      - vtt_interpreter_tool
      - webscrape_tool
      - mas_optimizer_tool
    llm_name: reasoning_llm
    verbose: false
    handle_tool_errors: true
    max_iterations: 25
  serpapi_search_tool:
    _type: serpapi_search
    description: >-
      Search the web using SerpAPI and return structured results with rich
      visual cards. Results include organic web listings, knowledge graph
      panels, answer boxes, top stories, news, images, shopping results, and
      videos. Supports Google Search (default), Google News, Google Images,
      Google Shopping, and Google Videos via the search_type parameter.
      Use location for geographically relevant queries.
      Use time_period for recency filtering: "qdr:h" (hour), "qdr:d" (day),
      "qdr:w" (week), "qdr:m" (month), "qdr:y" (year).
  webscrape_tool:
    _type: webscrape
    allowed_schemes:
      - http
      - https
    browser_timeout: 120
    description:
      'Fetch a webpage at a known URL and convert its content to readable
      markdown text. Automatically handles JavaScript-rendered pages and sites
      with bot protection (e.g. Cloudflare) by falling back to a headless browser.
      Use when the user provides a specific URL to read, or when a URL has been
      identified that needs to be visited for its content.

      REQUIRED PARAMETERS:

      - url: string (full http or https URL to fetch)

      Example: {"url": "https://example.com/article"}

      '
    max_output_tokens: 20000
    respect_robots_txt: false
    timeout: 120
    use_browser_fallback: true
    user_agent: daedalus-webscraper/0.1.0
    verbose: false
