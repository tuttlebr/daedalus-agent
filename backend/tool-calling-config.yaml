authentication:
  github_mcp_server:
    _type: api_key
    custom_header_name: Authorization
    custom_header_prefix: Bearer
    raw_key: ${GITHUB_PAT}
embedders:
  milvus_embedder:
    _type: nim
    api_key: ${EMBEDDING_API_KEY}
    base_url: ${EMBEDDING_BASE_URL}
    model_name: ${EMBEDDING_MODEL}
    truncate: END
function_groups:
  github_mcp_server:
    _type: mcp_client
    include:
      - get_file_contents
      - get_label
      - get_latest_release
      - get_me
      - get_release_by_tag
      - get_tag
      - get_team_members
      - get_teams
      - issue_read
      - list_branches
      - list_commits
      - list_issues
      - list_issue_types
      - list_releases
      - list_tags
      - search_code
      - search_issues
      - search_pull_requests
      - search_repositories
      - search_users
    tool_call_timeout: 120
    reconnect_enabled: true
    reconnect_max_attempts: 3
    session_idle_timeout: 600
    tool_overrides:
      search_code:
        description: >-
          Search CODE across repos the user has access to. Args: query
          (GitHub code-search syntax, e.g. 'language:python org:nvidia
          foo'). Returns: file hits with snippets. Use
          search_repositories for repo-level finding.
      search_repositories:
        description: >-
          Find REPOS by name/topic/owner. Args: query (e.g.
          'topic:llm stars:>1000'). Returns: repo list. Use
          search_code for in-file matches.
      list_issues:
        description: >-
          List issues in ONE specific repo. Args: owner, repo, state.
          Returns: issue list. Use search_issues for cross-repo
          search.
      issue_read:
        description: >-
          Read a single issue with full comments. Args: owner, repo,
          issue_number. Returns: issue body + comments.
    server:
      auth_provider: github_mcp_server
      transport: streamable-http
      url: https://api.githubcopilot.com/mcp
  dynamo_mcp_server:
    _type: mcp_client
    include:
      - searchDocs
    tool_call_timeout: 120
    reconnect_enabled: true
    reconnect_max_attempts: 3
    session_idle_timeout: 600
    tool_overrides:
      searchDocs:
        description: >-
          Search NVIDIA Dynamo inference runtime docs. Args: query.
          Returns: doc passages. Use for Dynamo-specific API/config
          questions; prefer nvidia_retriever_tool for broader NVIDIA
          topics.
    server:
      transport: streamable-http
      url: https://docs.dynamo.nvidia.com/dynamo/_mcp/server
  k8s_mcp_server:
    _type: mcp_client
    tool_call_timeout: 600
    reconnect_enabled: true
    reconnect_max_attempts: 3
    session_idle_timeout: 1200
    server:
      transport: streamable-http
      url: ${KUBERNETES_MCP_SERVER}
functions:
  research_agent:
    _type: tool_calling_agent
    llm_name: reasoning_llm
    max_iterations: 20
    handle_tool_errors: true
    verbose: true
    return_direct:
      - user_interaction_tool
    tool_names:
      - nvidia_retriever_tool
      - semianalysis_retriever_tool
      - kubernetes_retriever_tool
      - veterinarian_retriever_tool
      - mentalhealth_retriever_tool
      - nvidia_blog_rss
      - nvidia_developer_blog_rss
      - nvidia_news_room_rss
      - semianalysis_rss
      - karpathy_bearblog_rss
      - karpathy_github_rss
      - serpapi_search_tool
      - webscrape_tool
      - content_distiller_tool
      - source_verifier_tool
      - think_tool
      - current_datetime_tool
    description: >-
      Run a research task. Input: a one-sentence research question or
      "brief me on X". Triggers: "research", "summarize", "what's the
      latest", "compare", "state of", any knowledge-gathering or
      briefing. Returns: distilled findings with source URLs. Do NOT
      use for live ops (ops_agent), image/video/transcripts
      (media_agent), or user document search (user_data_agent).
    system_prompt: |
      You are Daedalus's research specialist. Your job: answer
      research questions with high signal and low token cost.

      Source priority:
      1. Specialized retriever (nvidia, semianalysis, kubernetes,
         vet, mentalhealth) for established reference.
      2. RSS feed when the query is about recent items ("latest",
         "this week", "current").
      3. serpapi_search_tool for topics outside the retrievers.
      4. webscrape_tool only when you already have a specific URL.

      Efficiency:
      - Run independent queries in parallel.
      - If a tool output exceeds ~5000 tokens, route it through
        content_distiller_tool before incorporating.
      - For any claim destined for memory, call
        source_verifier_tool.verify_claim first.

      Output: concise bullet findings with [source: url] citations.
      No greetings, no filler. The parent workflow handles voice.
  ops_agent:
    _type: tool_calling_agent
    llm_name: tool_calling_llm
    max_iterations: 15
    handle_tool_errors: true
    verbose: true
    return_direct:
      - user_interaction_tool
    tool_names:
      - github_mcp_server
      - k8s_mcp_server
      - dynamo_mcp_server
      - kubernetes_retriever_tool
      - think_tool
      - user_interaction_tool
      - current_datetime_tool
    description: >-
      Execute ops against GitHub, Kubernetes, or Dynamo docs. Input:
      imperative instruction ("list prs for org X", "scale deployment
      foo to 3", "describe pod bar in namespace baz", "search dynamo
      docs for Y"). Triggers: repo, PR, issue, release, label,
      branch, commit, pod, deployment, namespace, helm, kubectl,
      dynamo docs. Returns: action result or error. Fails when: task
      mixes unrelated concerns or is purely a research question.
    system_prompt: |
      You are Daedalus's ops specialist. You execute, not advise.

      ACTION BIAS: when a tool covers the action, CALL IT. Do not
      explain, do not list tools, do not offer scripts.

      Confirmation gate: call user_interaction_tool.confirm_action
      BEFORE any destructive k8s op (delete, patch that removes
      fields, scale-to-zero, rollback that loses data, helm
      uninstall, helm rollback) and BEFORE any GitHub write (push,
      merge, close/reopen issue or PR, delete branch). Reads and
      non-destructive writes proceed directly.

      If a tool returns an MCP application error (e.g. "not found",
      "missing parameter"), report it plainly. Do NOT retry blindly.

      Output: concise command summary + outcome. Skip preamble.
  media_agent:
    _type: tool_calling_agent
    llm_name: tool_calling_llm
    max_iterations: 6
    handle_tool_errors: true
    verbose: true
    tool_names:
      - image_generation_tool
      - image_augmentation_tool
      - image_comprehension_tool
      - vtt_interpreter_tool
      - think_tool
    description: >-
      Handle media tasks: generate/edit/analyze images or video, or
      interpret VTT/SRT meeting transcripts. Input: task description
      plus any imageRef, videoRef, or transcript_text. Triggers:
      "draw", "generate image", "edit image", "describe image",
      "OCR", "summarize meeting", "action items". Returns: markdown
      image ref (forwarded verbatim) or text analysis. Fails when: an
      image/video ref is needed but absent.
    system_prompt: |
      You handle image and transcript tasks.

      Tool selection:
      - Create a new image from text -> image_generation_tool
      - Modify an uploaded image -> image_augmentation_tool
      - Describe, OCR, or analyze an image/video -> image_comprehension_tool
      - Process a VTT/SRT transcript -> vtt_interpreter_tool

      When image_generation_tool or image_augmentation_tool returns a
      markdown image ref `![...](...)`, forward that ref VERBATIM to
      the caller. The image will not display otherwise.

      Generate faithfully to user intent. If the request is literal
      (diagram, chart, product photo), do not inject an artistic
      style.
  user_data_agent:
    _type: tool_calling_agent
    llm_name: tool_calling_llm
    max_iterations: 6
    handle_tool_errors: true
    verbose: true
    return_direct:
      - nv_ingest_tool
    tool_names:
      - nv_ingest_tool
      - user_uploaded_files_retriever_tool
      - think_tool
    description: >-
      Ingest or search the user's uploaded documents. Input: either
      "ingest documentRef=... username=... collection_name=..." or
      "search my docs for X". Triggers: user uploaded a file, or
      references "my doc", "the PDF I uploaded", "that report".
      Returns: ingestion receipt or reranked passages. Do NOT use as
      a substitute for get_memory or the topical retrievers.
    system_prompt: |
      You manage user-uploaded documents.

      Flow:
      - If the user just uploaded and asks about it without prior
        ingestion, call nv_ingest_tool first, then retrieve.
      - For later searches, call user_uploaded_files_retriever_tool
        directly.
      - Never substitute this agent for general knowledge retrieval.
        Those requests belong to research_agent.
  agent_skills_tool:
    _type: agent_skills
    skills_directory: /skills
    allow_script_execution: true
    allowed_script_extensions:
      - .py
      - .sh
    script_timeout: 120
    description: >-
      Discover and run agent skills in /skills. Operations:
      list_skills (discover what exists), load_skill (read procedure
      + metadata), run_skill_script (execute .py/.sh, 120s timeout).
      Trigger: user names a skill, task matches a skill's purpose, or
      you need a procedure you don't yet know. Args depend on
      operation. Returns: JSON metadata or script stdout (truncated
      at 1MB). Fails when: skill not found or script exceeds timeout.
    verbose: true
  add_memory:
    _type: add_memory
    description: >-
      Store a durable user fact, preference, project context, or
      verified finding as a single declarative sentence. Trigger:
      user states a preference, identity fact, ongoing project, or
      after verify_claim returns supported. Args: memory (plain text,
      NEVER JSON), user_id (from [IDENTITY]), optional
      key_value_pairs. Returns: memory id. Fails when: memory is
      empty, user_id missing, or a finding lacks a prior verify_claim
      pass.
    memory: redis_memory
    verbose: true
  current_datetime_tool:
    _type: current_datetime
    description: >-
      Get current date, time, and timezone. Trigger: any
      time-relative query ("today", "this week", "how old is X").
      Args: none. Returns: ISO datetime + timezone. Fails when:
      never.
    verbose: true
  delete_memory:
    _type: delete_memory
    description: >-
      Permanently delete ALL memories for a user. Destructive,
      irreversible bulk wipe. Trigger: user explicitly says
      "delete/erase/wipe my memories". Args: user_id. Returns:
      deletion count. Fails when: called without prior
      user_interaction_tool.confirm_action (you MUST confirm first).
    memory: redis_memory
    verbose: true
  get_memory:
    _type: get_memory
    description: >-
      Semantic search over this user's stored memories. Trigger:
      start of every substantive request, daily briefings (call
      FIRST for briefings), any "remember when", "what do you know
      about me", or personalized ask. Args: user_id, query, top_k
      (default 5). Returns: ranked memory entries with metadata.
      Fails when: user_id is "anonymous" with no prior memories
      (returns empty list, not error).
    memory: redis_memory
    top_k: 5
    verbose: true
  image_augmentation_tool:
    _type: image_augmentation
    api_endpoint: ${IMAGE_AUGMENTATION_BASE_URL}
    api_key: ${IMAGE_AUGMENTATION_API_KEY}
    model: ${IMAGE_AUGMENTATION_MODEL}
    description: >-
      Modify an EXISTING user-uploaded image (edit, inpaint, style
      transfer). Trigger: user uploaded an image and asks to change
      it. Args: imageRef (from upload), prompt. Returns: markdown
      image ref, include verbatim in your reply. Fails when: no
      imageRef (ask user to upload first).

      Write prompts that split "what changes" from "what to
      preserve". State the change first, then repeat a preserve
      list ("keep the face, pose, clothing, camera angle, and
      lighting exactly the same") on every turn to prevent drift.
      When passing multiple images, index them in the prompt
      ("Image 1: subject. Image 2: style reference. Apply Image
      2's palette to Image 1.").
    redis_url: ${REDIS_URL}
    timeout: 120
    verbose: true
  image_comprehension_tool:
    _type: image_comprehension
    api_endpoint: ${IMAGE_COMPREHENSION_BASE_URL}
    api_key: ${IMAGE_COMPREHENSION_API_KEY}
    model: ${IMAGE_COMPREHENSION_MODEL}
    description: >-
      Read-only analysis of an uploaded image or video; returns TEXT
      only. Trigger: "what is this", "describe this image", "OCR
      this", "who is in the video". Args: imageRef, videoRef, or
      public url, plus prompt. Returns: text description or answer.
      Fails when: no ref or url supplied.
    redis_url: ${REDIS_URL}
    timeout: 120
    verbose: true
  image_generation_tool:
    _type: image_generation
    api_endpoint: ${IMAGE_GENERATION_BASE_URL}
    api_key: ${IMAGE_GENERATION_API_KEY}
    model: ${IMAGE_GENERATION_MODEL}
    description: >-
      Generate a NEW image from text; no input image required.
      Trigger: "draw", "create image", "illustrate", "generate
      picture". Args: prompt (text). Returns: markdown image ref
      `![...](...)` which you MUST include verbatim in your reply
      (users cannot see the image otherwise). Fails when: prompt is
      empty or model endpoint errors.

      For best results, structure the prompt as scene/background →
      subject → key visual details → constraints. For photorealism,
      use photography terms (lens, aperture, lighting) rather than
      generic "high quality". Put any literal text in quotes and
      name its typography. State exclusions explicitly ("no
      watermark, no extra text").
    redis_url: ${REDIS_URL}
    timeout: 120
    verbose: true
  kubernetes_retriever_tool:
    _type: nat_retriever
    description: >-
      Search Kubernetes reference: official docs, best practices,
      YAML patterns, networking, storage, RBAC, Helm, troubleshooting.
      Trigger: "how do I configure X", "what is the pattern for Y".
      For LIVE cluster ops use k8s_mcp_server (via ops_agent). Args:
      query. Returns: reranked passages. Fails when: task needs live
      cluster state.
    retriever: kubernetes_retriever
    topic: Kubernetes and container orchestration
    verbose: true
  mentalhealth_retriever_tool:
    _type: nat_retriever
    description: >-
      Search Mental Health Foundation: condition guides, coping
      strategies, wellness practices. Trigger: mental health or
      wellness question. ALWAYS include disclaimer that content is
      educational, not professional care. Args: query. Returns:
      reranked passages. Fails when: topic is not mental health.
    retriever: mentalhealth_retriever
    topic: Mental health and psychological wellness
    verbose: true
  nv_ingest_tool:
    _type: nat_nv_ingest
    chunk_overlap: 150
    chunk_size: 1024
    default_collection_name: user_uploads
    description: >-
      Ingest a user-uploaded PDF/DOCX/PPTX into the vector store so
      user_uploaded_files_retriever_tool can search it later.
      Trigger: user uploads a document and asks to summarize or
      search it. Args: documentRef, username (from [IDENTITY]),
      collection_name (default user_uploads). Returns: ingestion
      receipt. Fails when: unsupported file type or MinIO/Milvus
      unreachable.
    milvus_uri: ${MILVUS_URI}
    minio_access_key: ${MINIO_ACCESS_KEY}
    minio_endpoint: ${MINIO_ENDPOINT}
    minio_secret_key: ${MINIO_SECRET_KEY}
    nv_ingest_host: ${NV_INGEST_HOST}
    nv_ingest_port: ${NV_INGEST_PORT}
    redis_url: ${REDIS_URL}:${REDIS_PORT}
    verbose: true
  nvidia_blog_rss:
    _type: rss_feed
    description: >-
      Fetch up to 5 recent NVIDIA Blog items (thought leadership, AI
      trends, business strategy) reranked against your query.
      Trigger: "latest from NVIDIA Blog", daily briefings, current
      NVIDIA thought-leadership items. For established reference use
      nvidia_retriever_tool instead. Args: query. Returns: title +
      link + snippet. Fails when: feed unreachable (fall back to
      serpapi_search_tool).
    feed_url: https://feeds.feedburner.com/nvidiablog
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: true
  nvidia_developer_blog_rss:
    _type: rss_feed
    description: >-
      Fetch up to 5 recent NVIDIA Developer Blog items (SDK updates,
      tutorials, CUDA/TensorRT/NeMo guides) reranked against your
      query. Trigger: "latest NVIDIA developer posts", recent SDK or
      dev-tool announcements. For established technical reference
      use nvidia_retriever_tool instead. Args: query. Returns: title
      + link + snippet. Fails when: feed unreachable (fall back to
      serpapi_search_tool).
    feed_url: https://developer.nvidia.com/blog/feed
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: true
  nvidia_news_room_rss:
    _type: rss_feed
    description: >-
      Fetch up to 5 recent NVIDIA Newsroom items (press releases,
      earnings, product launches, partnerships) reranked against
      your query. Trigger: "NVIDIA news", "latest NVIDIA press",
      earnings or announcement asks. For established corporate
      reference use nvidia_retriever_tool instead. Args: query.
      Returns: title + link + snippet. Fails when: feed unreachable
      (fall back to serpapi_search_tool).
    feed_url: https://nvidianews.nvidia.com/releases.xml
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: true
  nvidia_retriever_tool:
    _type: nat_retriever
    description: >-
      Search NVIDIA technical reference: GPU specs, CUDA, TensorRT,
      NeMo, Triton, RAPIDS, Omniverse, DGX docs, research papers.
      Trigger: "how does X work", "spec of Y", "what is <NVIDIA
      tech>". For THIS WEEK's NVIDIA news use nvidia_blog_rss,
      nvidia_developer_blog_rss, or nvidia_news_room_rss instead.
      Args: query. Returns: reranked passages. Fails when: topic is
      current-events only.
    retriever: nvidia_retriever
    topic: NVIDIA technology, products, and corporate information
    verbose: true
  semianalysis_retriever_tool:
    _type: nat_retriever
    description: >-
      Search SemiAnalysis reference: foundry economics, process
      nodes, fabrication capacity, supply chain,
      TSMC/Samsung/Intel competitive analysis. Trigger: deep
      semiconductor industry question. For recent SemiAnalysis
      articles use semianalysis_rss. Args: query. Returns: reranked
      passages. Fails when: topic is current-events only.
    retriever: semianalysis_retriever
    topic: Semiconductor industry analysis and market intelligence
    verbose: true
  semianalysis_rss:
    _type: rss_feed
    description: >-
      Fetch up to 5 recent SemiAnalysis newsletter items reranked
      against your query. Trigger: "latest from SemiAnalysis",
      recent chip-market or foundry news. For deep reference use
      semianalysis_retriever_tool instead. Args: query. Returns:
      title + link + snippet. Fails when: feed unreachable (fall
      back to serpapi_search_tool).
    feed_url: https://newsletter.semianalysis.com/feed
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: true
  karpathy_bearblog_rss:
    _type: rss_feed
    description: >-
      Fetch up to 5 recent Karpathy Bear Blog posts (AI insights,
      deep-learning perspectives, LLM commentary) reranked against
      your query. Trigger: "latest from Karpathy", AI commentary or
      LLM-design perspective asks. Args: query. Returns: title +
      link + snippet. Fails when: feed unreachable (fall back to
      serpapi_search_tool).
    feed_url: https://karpathy.bearblog.dev/feed/
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: true
  karpathy_github_rss:
    _type: rss_feed
    description: >-
      Fetch up to 5 posts from Karpathy's GitHub Pages blog
      (long-form technical writing on neural networks, deep
      learning, AI education) reranked against your query. Trigger:
      Karpathy deep-technical or educational long-form. Args: query.
      Returns: title + link + snippet. Fails when: feed unreachable
      (fall back to serpapi_search_tool).
    feed_url: https://karpathy.github.io/feed.xml
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: true
  user_uploaded_files_retriever_tool:
    _type: user_document_retriever
    content_field: text
    database_name: default
    description: >-
      Semantic search ONLY over this user's previously ingested
      documents. Trigger: user references "my doc", "the PDF I
      uploaded", "that report". Args: query, user_id. Returns:
      passages with source. Do NOT substitute for get_memory
      (preferences/facts) or the topical retrievers (general
      knowledge). Fails when: user hasn't ingested anything or query
      is generic.
    distance_cutoff: 1.2
    embedder_name: milvus_embedder
    milvus_uri: ${MILVUS_URI}
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    reranker_top_n: 5
    top_k: 10
    use_reranker: true
    vector_field: vector
    verbose: true
  veterinarian_retriever_tool:
    _type: nat_retriever
    description: >-
      Search VetPartner knowledge base: animal health, treatment
      protocols, medications, nutrition, species-specific care.
      Trigger: animal health question. ALWAYS include disclaimer
      recommending a licensed veterinarian consultation. Args:
      query. Returns: reranked passages. Fails when: topic is not
      veterinary.
    retriever: veterinarian_retriever
    topic: Veterinary medicine and animal care
    verbose: true
  vtt_interpreter_tool:
    _type: vtt_interpreter
    api_endpoint: ${DEFAULT_LLM_MODEL_BASE_URL}
    model: ${DEFAULT_LLM_MODEL_MODEL}
    api_key: ${DEFAULT_LLM_MODEL_API_KEY}
    description: >-
      Process VTT or SRT meeting transcripts. Summarize, extract
      action items, answer questions, or produce structured notes.
      Trigger: user pastes or references a transcript. Args:
      transcript_text, optional user_instructions. Returns:
      processed text. Fails when: content is not valid VTT/SRT or
      LLM endpoint errors.
    timeout: 120
    verbose: true
  think_tool:
    _type: think_tool
    max_thought_length: 50000
    max_chain_steps: 20
    description: >-
      Private reasoning scratchpad, not visible to the user. `think`
      for one-shot reflection; `sequential_think` for multi-step
      chains with revision. Trigger: task is ambiguous, requires
      decomposition, or you are about to call more than two tools.
      Args: thought (text) and operation. Returns: your text back
      (no side effects). Fails when: thought exceeds 50000 chars.
    verbose: true
  content_distiller_tool:
    _type: content_distiller
    fast_llm_name: distill_llm
    llm_name: reasoning_llm
    max_input_chars: 100000
    max_output_tokens: 4096
    temperature: 0.1
    wrapper_type: LANGCHAIN
    description: >-
      Condense verbose tool outputs. distill_content (summarize),
      extract_structured (pull fields), synthesize (combine
      sources). Trigger: tool output exceeds ~5000 tokens; for
      shorter outputs incorporate directly. Args: text, operation,
      optional schema. Returns: distilled text. Fails when: input
      exceeds 100000 chars.
    verbose: true
  user_interaction_tool:
    _type: user_interaction
    max_options: 6
    description: >-
      Structured user I/O. clarify (ask with selectable options),
      confirm_action (approval before destructive or irreversible
      actions: k8s mutate, GitHub write, memory delete),
      present_options (compare alternatives). Args depend on
      operation. Returns: formatted prompt for the user. Fails when:
      options exceed 6 entries.
    verbose: true
  mas_optimizer_tool:
    _type: mas_optimizer
    sas_accuracy_threshold: 0.45
    decomposability_threshold: 0.35
    tool_count_threshold: 12
    default_user_id: ${DAEDALUS_DEFAULT_USER:-anonymous}
    drift_keywords:
      - vision language
      - VLM
      - Qwen3-VL
      - image model
    required_keywords:
      - MAS
      - verifier
      - capability gate
      - orchestrat
      - decomposab
    verbosity_ceiling: 2000
    description: >-
      Architecture router. mas_evaluate at task start decides SAS vs
      MAS and names a skill. mas_verify checks drafts for drift
      before send. mas_log_outcome records metrics. Trigger
      mas_evaluate: any substantive request (in parallel with
      get_memory). Trigger mas_verify and mas_log_outcome: only
      after mas_evaluate returned MAS. Args: task_description,
      active_tool_names. Returns: routing verdict + skill name.
      Fails when: task_description is under 8 chars.
    verbose: true
  serpapi_search_tool:
    _type: serpapi_search
    description: >-
      Google web search for topics outside Daedalus knowledge bases.
      Trigger: "search", "look up", "latest news", topics not
      covered by nvidia/semianalysis/kubernetes/vet/mentalhealth
      retrievers. Args: query, optional time_period ("qdr:h"=hour,
      "qdr:d"=day, "qdr:w"=week, "qdr:m"=month, "qdr:y"=year),
      optional search_type (organic, news, images, shopping).
      Returns: ranked URLs with snippets. Fails when: SERPAPI_KEY
      missing or rate-limited (then use webscrape_tool if URL is
      known).
    verbose: true
  webscrape_tool:
    _type: webscrape
    allowed_schemes:
      - http
      - https
    browser_timeout: 120
    description: >-
      Fetch ONE known URL and convert to markdown. Uses headless
      browser fallback for JS or bot-protected sites. Trigger: you
      already have the URL (from serpapi, an RSS entry, or the
      user). Args: url (http/https only). Returns: markdown up to
      20000 tokens. Fails when: URL unknown (use serpapi_search_tool
      first), non-http scheme, or 120s timeout.
    max_output_tokens: 20000
    respect_robots_txt: false
    timeout: 120
    use_browser_fallback: true
    user_agent: daedalus-webscraper/0.1.0
    verbose: true
  source_verifier_tool:
    _type: source_verifier
    fast_llm_name: distill_llm
    llm_name: reasoning_llm
    max_source_chars: 80000
    max_output_tokens: 4096
    temperature: 0.0
    fetch_timeout: 30.0
    max_fetch_tokens: 20000
    wrapper_type: LANGCHAIN
    description: >-
      Verify citations before storing findings. verify_claim checks
      if a URL supports a claim (MUST call before every add_memory
      with type=finding or type=project_update). verify_memory
      validates an existing entry. audit_memories batch-checks
      output from get_memory. Args: claim + source_url, or
      memory_text + metadata_json. Returns:
      supported/partially_supported/unsupported/source_unreachable
      with evidence. Fails when: source_url is malformed or
      unreachable.
    verbose: true
general:
  front_end:
    _type: fastapi
    max_running_async_jobs: 8
    dask_workers: threads
    dask_threads_per_worker: 1
    dask_worker_memory_limit: "2GiB"
    dask_log_level: WARNING
    step_adaptor:
      mode: custom
      custom_event_types:
        - LLM_START
        - LLM_END
        - TOOL_START
        - TOOL_END
        - WORKFLOW_START
        - WORKFLOW_END
        - TASK_START
        - TASK_END
        - TTC_START
        - TTC_END
        - FUNCTION_START
        - FUNCTION_END
        - CUSTOM_START
        - CUSTOM_END
        - SPAN_START
        - SPAN_END
    # NAT async jobs use a pod-local Dask cluster; keep a single backend
    # process per pod so requests don't bounce across isolated local schedulers.
    workers: 1
  telemetry:
