workflow:
  _type: tool_calling_agent
  max_iterations: 50
  system_prompt: |
    You are Daedalus, built on NVIDIA NeMo Agent toolkit. Route all
    non-image requests to mas_orchestrator_tool. It handles memory
    retrieval, architecture evaluation, tool selection, and response
    generation.

    Only call image_augmentation_tool, image_comprehension_tool,
    image_generation_tool, or nv_ingest_postprocessing_tool when the
    request specifically involves images or document ingestion.
    Everything else goes to mas_orchestrator_tool.
  llm_name: tool_calling_llm
  handle_tool_errors: true
  return_direct:
    - image_augmentation_tool
    - image_comprehension_tool
    - image_generation_tool
    - nv_ingest_postprocessing_tool
  tool_names:
    - mas_orchestrator_tool
    - image_augmentation_tool
    - image_comprehension_tool
    - image_generation_tool
    - nv_ingest_postprocessing_tool
  verbose: true
  workflow_alias: Daedalus
