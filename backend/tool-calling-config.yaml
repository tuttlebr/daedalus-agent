functions:
  bang_for_buck_tool:
    _type: chat_completion
    description: 'UNIQUE: Only tool for quantitative ROI analysis using !/$ methodology. DIFFERENTIATOR: Transforms qualitative "worth it?" questions into numerical prioritization scores. MUTUAL_INFO: Unlike first_principles_tool (conceptual breakdown), this provides measurable metrics. WHEN_SELECT: User needs data-driven decision between multiple options OR justifying resource allocation. FORMULA: Bang=(% time saved)×(people)×(duration); Buck=implementation+transition costs. DECISION_BOUNDARY: Use when comparing 2+ options quantitatively; skip for single yes/no without alternatives. COMBINES_WITH: first_principles_tool for assumptions validation. OUTPUT: Numerical !/$ ratio with recommendation thresholds (>10 high, 4-10 medium, <4 low).

      '
    llm_name: medium_llm
    system_prompt: '# Bang for Buck Calculator - ROI Decision Engine

      **UNIQUE ROLE**: Transform qualitative "worth it?" questions into quantitative !/$ ratios.

      **DIFFERENTIATOR**: Numbers-driven prioritization vs conceptual analysis (first_principles) or questions (socratic).

      **CORE FORMULA**: ! (Bang) = (% time saved) × (people affected) × (project duration) $ (Buck) = implementation effort + transition costs + ongoing costs

      ## Calculation Scenarios

      1. **STANDARD TIME SAVINGS** - Direct: 3 people save 30min/week × 6 months = 4.5 person-days

      2. **PRODUCTIVITY + ESCAPE PREVENTION** - Include downstream debugging prevented - Example: 2 people × 2 days/month × 6 months = 24 person-days

      3. **RISK INSURANCE** - Formula: P(bad event) × Cost(if occurs) - Example: 1% bug chance × 5 people × 2 months = 2 person-days

      4. **VERIFICATION ENABLEMENT** - Silicon bug prevention: 150+ people × 3+ months potential impact

      5. **LATENCY IMPROVEMENTS** - Conservative: Use 10% of latency reduction as time saved

      6. **COST SAVINGS** - Convert to person-time: $250K/year per engineer

      ## Project Timeframes

      - Active projects: 12 months - Future projects: 24+ months - Infrastructure: 12 months continuous

      ## Decision Matrix

      - **!/$ > 10**: High priority - implement - **!/$ 4-10**: Consider with scope negotiation - **!/$ < 4**: Generally deprioritize

      ## Output Template

      1. **Scenario Type**: [Which calculation type applies] 2. **Bang Calculation**: [Show work with numbers] 3. **Buck Breakdown**: [Implementation + transition + ongoing] 4. **!/$ Ratio**: [Final number] 5. **Recommendation**: [Proceed/Reconsider/Rescope] 6. **Optimization**: [How to improve ratio if borderline]

      **QUALITY BAR**: Order-of-magnitude accuracy. Use people buckets: 1, 3, 10, 30, 100+.

      **COMBINES WITH**: first_principles_tool to validate cost assumptions.

      ''

      '
    verbose: true
  code_generation:
    _type: code_generation
    description: 'UNIQUE: Only tool that generates executable Python code with specialized coding LLM. DIFFERENTIATOR: Temperature=0.2 for deterministic output vs creative tools. MUTUAL_EXCLUSION: Never use general LLMs for code; this is mandatory for ALL code requests. WHEN_SELECT: Any Python code need - scripts, functions, algorithms, data processing, automation. ENTROPY_REDUCTION: Eliminates code syntax errors that general LLMs produce. COMBINES_WITH: webscrape_tool→this for scraping scripts; retrievers→this for implementation examples. OUTPUT: Complete, runnable Python with imports, error handling. NOT_FOR: Explanations without code (use appropriate retriever instead).

      '
    llm_name: coding_llm
    programming_language: Python
    verbose: true
  current_datetime_tool:
    _type: current_datetime
    description: 'UNIQUE: Only source of current temporal context (date/time/timezone). DIFFERENTIATOR: Provides ground truth for "now" vs static training data. MUTUAL_INFO: Essential before weather_tool, serpapi_news_tool (for "today"), or any time-relative query. WHEN_SELECT: User says "today"/"now"/"current"/"this week" OR implicit time-sensitivity detected. ENTROPY_REDUCTION: Resolves ambiguity in temporal references. SINGLETON: Call exactly once per session and cache result. COMBINES_WITH: weather_tool (always needs current date); serpapi_news_tool (for recent news). OUTPUT: Current datetime with timezone. NOT_FOR: Historical dates (use search tools).

      '
    verbose: true
  daedalus_react_agent:
    _type: react_agent
    description: 'UNIQUE: Meta-agent orchestrating all other tools with React pattern. DIFFERENTIATOR: Only tool with autonomous multi-step reasoning and tool chaining capability. MUTUAL_INFO: Has exclusive access to all other tools; serves as the entry point for complex tasks. WHEN_SELECT: This is the primary workflow executor - always active. ENTROPY_REDUCTION: Optimally sequences tool calls based on task requirements. TOOL_ACCESS: Exclusive access to memory, retrievers, search, generation, and utility tools. COMBINES_WITH: All tools (this orchestrates them). OUTPUT: Complete task solutions via optimal tool sequences. NOT_FOR: Never called directly by user; this is the orchestrator.

      '
    llm_name: tool_calling_llm
    max_tool_calls: 15
    parse_agent_response_max_retries: 5
    pass_tool_call_errors_to_agent: true
    system_prompt: "# Daedalus React Agent - Intelligent Tool Orchestrator\n\n**UNIQUE ROLE**: Meta-agent coordinating all tools using React pattern for optimal task completion.\n\n**TOOL SELECTION STRATEGY**:\n1. Consider MUTUAL INFORMATION between tools - which combinations provide maximum value\n2. Minimize CONDITIONAL ENTROPY - select tools that reduce uncertainty most effectively\n3. Follow WORKFLOW SEQUENCES - respect tool dependencies and optimal ordering\n\n## Available Tools\n{tools}\n\n## Tool Selection Guidelines\n\n**MEMORY TOOLS** (ALWAYS FIRST):\n- get_memory: MANDATORY first tool - retrieves user preferences/history\n- memory_add: Store new preferences discovered during interaction\n\n**INFORMATION GATHERING**:\n- Domain Retrievers: Use for specialized knowledge (K8s, NVIDIA, mental health, etc.)\n- Search Tools: serpapi_ai (quick facts) < serpapi_search (research) < serpapi_news (breaking news)\n- Wikipedia: Foundational knowledge before deep dives\n\n**PROCESSING & GENERATION**:\n- code_generation: EXCLUSIVE for any Python code needs\n- Research Pipeline: query_writer → searches → summarizer → reflect → extend → finalize\n- Reasoning Tools: bang_for_buck (ROI), first_principles (axioms), socratic (learning)\n\n**UTILITIES**:\n- current_datetime_tool: For temporal context (singleton per session)\n- geolocation_retriever: PREREQUISITE for weather/location-based searches\n- weather_tool: Real-time weather (requires geolocation first)\n- nv_ingest → user_uploaded_files_retriever: PDF processing pipeline\n\n## JSON Format Requirements\n\nFor get_memory tool (MANDATORY FIRST CALL):\n{{\n    \"query\": \"your search query here\",\n    \"top_k\": 5,\n    \"user_id\": \"<username>\"\n}}\n\nFor memory_add tool:\n{{\n    \"conversation\": [\n        {{\n            \"role\": \"user\",\n            \"content\": \"user message\"\n        }},\n        {{\n            \"role\": \"assistant\",\n            \"content\": \"assistant response\"\n        }}\n    ],\n    \"user_id\": \"<username>\",\n    \"metadata\": {{\n        \"key_value_pairs\": {{\n            \"type\": \"category\",\n            \"relevance\": \"high\"\n        }}\n    }},\n    \"memory\": \"What to remember\"\n}}\n\n## React Pattern Format\n\nFor tool usage:\nQuestion: the input question you must answer\nThought: analyze which tool(s) best reduce uncertainty for this task\nAction: the action to take, should be one of [{tool_names}]\nAction Input: the input to the action in exact JSON format\nObservation: wait for tool result\n\n... (repeat Thought/Action/Action Input/Observation as needed)\n\nFor final answer:\nThought: I now know the final answer\nFinal Answer: the final answer to the original input question\n\n## Optimization Principles\n\n1. **TOOL SYNERGY**: Combine tools that provide complementary information\n2. **MINIMIZE CALLS**: Select tools that answer the most with fewest calls\n3. **RESPECT WORKFLOWS**: Follow established pipelines (e.g., research workflow)\n4. **CACHE WISELY**: Don't repeat singleton tools (datetime, geolocation)\n5. **FAIL FAST**: If unsure between tools, pick the more specific one\n"
    tool_call_max_retries: 3
    tool_names:
    - current_datetime_tool
    - get_memory
    - memory_add
    - geolocation_retriever_tool
    - kubernetes_retriever_tool
    - code_generation
    - mentalhealth_retriever_tool
    - nvidia_retriever_tool
    - nv_ingest_tool
    - nvidia_rss_feed_tool
    - realtime_serpapi_ai_tool
    - realtime_serpapi_news_tool
    - realtime_serpapi_search_tool
    - semianalysis_retriever_tool
    - veterinarian_retriever_tool
    - weather_tool
    - webscrape_tool
    - finalize_report_researcher
    - query_writer_researcher
    - reflection_researcher
    - relevancy_checker_researcher
    - report_extender_researcher
    - user_uploaded_files_retriever_tool
    - summarizer_researcher
    - wikipedia_search
    verbose: true
    workflow_alias: Daedalus-Deep-Thinker
  finalize_report_researcher:
    _type: chat_completion
    description: 'UNIQUE: Terminal report polisher - only tool that formats for final delivery. DIFFERENTIATOR: Pure editorial focus vs content generation (other researcher tools). MUTUAL_EXCLUSION: Never runs before summarizer_researcher completes initial report. WHEN_SELECT: Automatically triggered as FINAL step after all research iterations. ENTROPY_REDUCTION: Guarantees consistent professional output format. PRECONDITIONS: Requires <summarizer_researcher> or <report_extender_researcher> tags. WORKFLOW_POSITION: [research]→[summarize]→[extend?]→[reflect?]→[THIS]→[user]. OUTPUT: Publication-ready report with citations. TERMINAL: No tools run after this.

      '
    llm_name: medium_llm
    system_prompt: '# Report Finalizer - Publication Polish Engine

      **UNIQUE ROLE**: Terminal editor transforming drafts into publication-ready reports.

      **DIFFERENTIATOR**: You POLISH for delivery; others create/enhance content.

      **INPUTS**: Complete report from <summarizer_researcher> or <report_extender_researcher>

      **WORKFLOW POSITION**: [All research done] → [YOU polish] → [Direct to user] END

      ## Editorial Algorithm

      1. **EXTRACT**: Latest complete report from tags 2. **POLISH**: Language for clarity and engagement 3. **FLOW**: Ensure smooth section transitions 4. **ACCESSIBILITY**: Technical accuracy with clear explanations 5. **CITATIONS**: Add comprehensive sources section 6. **DELIVER**: Publication-ready output

      ## Polish Checklist

      ✓ **TITLE**: Compelling and descriptive ✓ **INTRO**: Hook + importance + preview ✓ **SECTIONS**: Clear purpose, smooth conclusions ✓ **TERMS**: Defined on first use ✓ **EVIDENCE**: Data supports all claims ✓ **TAKEAWAYS**: Crystallized insights ✓ **CONCLUSION**: Synthesis + future implications ✓ **SOURCES**: Complete citations

      ## Quality Standards

      - **CLARITY**: Immediate understanding - **AUTHORITY**: Confident, evidence-based - **ACCESSIBILITY**: Non-expert friendly - **PROFESSIONALISM**: Publication ready

      ## Output Format

      <finalize_report_researcher> # [Polished Title]

      ## Introduction [Engaging hook, context, preview]

      ## [Section Name] [Polished content with perfect flow]

      ## Key Takeaways - [Essential insight 1] - [Essential insight 2] - [Essential insight 3]

      ## Conclusion [Synthesis, significance, future]

      ## Sources and References - [All citations used] </finalize_report_researcher>

      **TERMINAL CONSTRAINT**: NO commentary. NO markdown blocks. ONLY polished report.

      '
    verbose: true
  first_principles_tool:
    _type: chat_completion
    description: 'UNIQUE: Only tool for axiomatic reasoning and assumption deconstruction. DIFFERENTIATOR: Builds UP from indisputable truths vs bang_for_buck_tool (metrics) or socratic_method_tool (questions). MUTUAL_INFO: Complements bang_for_buck_tool by validating ROI assumptions. WHEN_SELECT: "Why does X really work?", "Challenge conventional wisdom", "Find innovative solutions". ENTROPY_REDUCTION: Eliminates false premises that constrain solution space. COMBINES_WITH: bang_for_buck_tool (validate cost assumptions); code_generation (implement novel solutions). OUTPUT: Axioms list, assumption audit table, decomposition tree, reconstructed solution. NOT_FOR: Quick facts or standard implementations.

      '
    llm_name: medium_llm
    system_prompt: '# First Principles Engine - Axiomatic Reasoning System

      **UNIQUE ROLE**: Decompose problems to fundamental truths and rebuild solutions.

      **DIFFERENTIATOR**: Build UP from axioms vs bang_for_buck (metrics) or socratic (questions).

      ## Five-Step Algorithm

      1. **IDENTIFY FOUNDATIONS** - Find irreducible, self-evident truths - Label as "Fundamental Premise" - Note underlying laws (physics, math, logic)

      2. **CHALLENGE ASSUMPTIONS** - List ALL implicit/explicit assumptions - Test each: "Necessary? Provable? Or convention?" - Discard unjustified assumptions

      3. **DECOMPOSE PROBLEM** - Break into smallest components - Trace each to fundamental premises - Create logical hierarchy

      4. **RECONSTRUCT SOLUTION** - Use ONLY validated premises - Each step follows from premise or prior result - Highlight novel insights

      5. **EXPLORE INNOVATIONS** - Try alternative premise configurations - "What if" scenarios - Evaluate impact of relaxed constraints

      ## Output Template

      **Fundamental Premises:** - [Axiom 1: Irreducible truth] - [Axiom 2: Self-evident principle]

      **Assumptions Audit:** | Assumption | Justified? | Action | |------------|-----------|--------| | [Found assumption] | Yes/No | Keep/Discard |

      **Decomposition Tree:** - Problem → Component A → Premise 1 - Problem → Component B → Premise 2

      **Reconstructed Solution:** Step 1: From Premise 1... Step 2: Therefore... Step 3: Combined with Premise 2...

      **Innovation Opportunities:** - If we relax constraint X... - Alternative approach using Premise Y...

      **COMBINES WITH**: bang_for_buck_tool to validate ROI assumptions.

      **QUALITY BAR**: Logical rigor > completeness. Better to have 3 solid axioms than 10 assumptions.

      '
    verbose: true
  geolocation_retriever_tool:
    _type: nat_retriever
    content_field: canonical_name
    description: 'UNIQUE: Only tool for location disambiguation and coordinate resolution. DIFFERENTIATOR: Resolves "Paris" → "Paris, France" vs assuming locations. MUTUAL_INFO: PREREQUISITE for weather_tool and location-based serpapi tools. WHEN_SELECT: ANY ambiguous location mentioned before using location-dependent tools. ENTROPY_REDUCTION: Prevents wrong-location errors in weather/search results. WORKFLOW: [ambiguous location]→[THIS]→[weather_tool OR serpapi with location]. COMBINES_WITH: weather_tool (always); serpapi tools (when location-specific). OUTPUT: Canonical name, coordinates, region. SINGLETON: Cache result per unique location.

      '
    retriever: geolocation_retriever
    topic: Canonical geolocation normalization and lookup
    verbose: true
  get_memory:
    _type: get_memory
    description: 'UNIQUE: Only tool for retrieving user-specific preferences and history. DIFFERENTIATOR: Personalizes all responses based on stored user context. MUTUAL_INFO: MUST run BEFORE any other tool to establish user context. WHEN_SELECT: ALWAYS - this is mandatory first tool in every interaction. ENTROPY_REDUCTION: Eliminates guesswork about user preferences and past interactions. WORKFLOW: [THIS]→[all other tools benefit from context]. COMBINES_WITH: memory_add (stores new preferences discovered). OUTPUT: User preferences, interaction history, custom settings. CRITICAL: Uses authenticated username as user_id.

      '
    memory: redis_memory
  image_augmentation_tool:
    _type: image_augmentation
    api_endpoint: https://fde8d464-c30b-4a51-ad04-ee3200156352.invocation.api.nvcf.nvidia.com
    default_seed: 42
    default_steps: 30
    description: 'UNIQUE: Only tool that modifies/augments existing uploaded images. DIFFERENTIATOR: Edits images vs image_generation_tool (creates new) or any text-based tool. MUTUAL_EXCLUSION: Requires uploaded image with ImageRef; cannot create from scratch. WHEN_SELECT: User uploads image AND requests "edit", "modify", "transform", "add to", "change". ENTROPY_REDUCTION: Direct image manipulation vs regenerating entire image. PREREQUISITE: System provides ImageRef: {JSON} in context. WORKFLOW: [User uploads]→[System provides ImageRef]→[THIS augments]. COMBINES_WITH: NONE - standalone image editor. OUTPUT: Augmented image maintaining original context. INPUT_FORMAT: imageRef={imageId, sessionId, mimeType} from system.'
    redis_url: redis://daedalus-redis.daedalus.svc.cluster.local:6379
    timeout: 300.0
    verbose: true
  image_generation_tool:
    _type: image_generation
    api_endpoint: https://407754b4-d173-45c9-8d6e-5368726fed70.invocation.api.nvcf.nvidia.com
    default_cfg_scale: 3.5
    default_height: 1024
    default_steps: 50
    default_width: 1024
    description: 'UNIQUE: Only tool for visual content creation from text. DIFFERENTIATOR: Generates images vs code_generation (text output) or retrievers (finds existing content). MUTUAL_EXCLUSION: Cannot edit/analyze existing images - only creates new. WHEN_SELECT: "create image", "visualize", "show me picture", "illustrate concept". ENTROPY_REDUCTION: Auto-enhances prompts via fast_llm for better quality. COMBINES_WITH: retrievers→this (visualize retrieved concepts); NEVER with webscrape (can''t analyze images). OUTPUT: 1024x1024 image in ~15 seconds. LIMITATIONS: No text rendering, no image editing.'
    prompt_rewrite:
      llm: fast_llm
      max_tokens: 256
      temperature: 0.9
    timeout: 300.0
    verbose: true
  kubernetes_retriever_tool:
    _type: nat_retriever
    description: 'UNIQUE: Specialized K8s knowledge base with curated technical documentation. DIFFERENTIATOR: Deep K8s expertise vs general web search or other retrievers. MUTUAL_EXCLUSION: Use instead of serpapi for Kubernetes topics. WHEN_SELECT: Any mention of Kubernetes/K8s/pods/containers/orchestration/Helm. ENTROPY_REDUCTION: Provides authoritative K8s patterns vs varying web quality. COMBINES_WITH: code_generation (for YAML manifests); nvidia_retriever_tool (for GPU scheduling). OUTPUT: Config examples, troubleshooting guides, best practices. COVERAGE: Networking, storage, security, operators. NOT_FOR: Docker-only questions (use web search).

      '
    retriever: kubernetes_retriever
    topic: Kubernetes and container orchestration
    verbose: true
  memory_add:
    _type: add_memory
    description: 'UNIQUE: Only tool for persisting user preferences and context. DIFFERENTIATOR: Stores new information vs get_memory (retrieves existing). MUTUAL_INFO: Works with get_memory to maintain user state across sessions. WHEN_SELECT: User explicitly states preference OR implicit preference detected during interaction. ENTROPY_REDUCTION: Prevents re-asking same preferences in future sessions. COMBINES_WITH: get_memory (retrieve→update→store cycle). OUTPUT: Confirmation of stored preference with tags. FORMAT: Preference string, user_id, tags list, metadata dict. CRITICAL: Store preference only, not full conversation.

      '
    memory: redis_memory
  mentalhealth_retriever_tool:
    _type: nat_retriever
    description: 'UNIQUE: Evidence-based mental health content from Mental Health Foundation. DIFFERENTIATOR: Authoritative mental wellness info vs general web or veterinarian_retriever. MUTUAL_EXCLUSION: Use over web search for mental health topics. WHEN_SELECT: Anxiety, depression, stress, trauma, coping strategies, emotional wellness. ENTROPY_REDUCTION: Provides validated information vs potentially harmful web content. MANDATORY_OUTPUT: Include disclaimer about educational use only. COMBINES_WITH: current_datetime_tool (for crisis resources); NEVER with code_generation. OUTPUT: Conditions info, coping strategies, support resources. CRITICAL: Direct crises to hotlines.

      '
    retriever: mentalhealth_retriever
    topic: Mental health and psychological wellness
    verbose: true
  nv_ingest_tool:
    _type: nat_nv_ingest
    chunk_overlap: 150
    chunk_size: 1024
    description: 'UNIQUE: Only tool that processes PDFs into searchable vector format. DIFFERENTIATOR: Ingests documents vs all other tools that query existing data. MUTUAL_INFO: PREREQUISITE for user_uploaded_files_retriever_tool. WHEN_SELECT: System provides pdfRef in context (automatic trigger). ENTROPY_REDUCTION: Transforms unstructured PDF into queryable chunks. WORKFLOW: [PDF detected]→[THIS]→[user_uploaded_files_retriever]. COMBINES_WITH: ONLY user_uploaded_files_retriever_tool (exclusive pipeline). OUTPUT: Confirmation + collection name (=username). PARAMETERS: Auto-provided by system. NOT_FOR: Any content except PDFs.

      '
    milvus_uri: http://milvus.milvus.svc.cluster.local:19530
    minio_access_key: minioadmin
    minio_endpoint: 192.168.1.239:9000
    minio_secret_key: minioadmin
    nv_ingest_host: 192.168.1.239
    nv_ingest_port: 7670
    redis_url: redis://daedalus-redis.daedalus.svc.cluster.local:6379
    verbose: true
  nvidia_retriever_tool:
    _type: nat_retriever
    description: 'UNIQUE: Authoritative NVIDIA technical/product knowledge base. DIFFERENTIATOR: Official NVIDIA content vs nvidia_rss_feed_tool (news) or general search. MUTUAL_EXCLUSION: Use over web search for ANY NVIDIA topic. WHEN_SELECT: GPUs (H100/B200), CUDA, TensorRT, NeMo, DGX, Jetson, NVIDIA software/hardware. ENTROPY_REDUCTION: Accurate specs and architecture details vs outdated web info. COMBINES_WITH: semianalysis_retriever (market analysis); nvidia_rss_feed_tool (latest news). OUTPUT: Technical specs, architecture docs, API details. NOT_FOR: Latest NVIDIA news (use nvidia_rss_feed_tool). Competitor products (use web search). '
    retriever: nvidia_retriever
    topic: NVIDIA technology, products, and corporate information
    verbose: true
  nvidia_rss_feed_tool:
    _type: rss_feed
    description: 'UNIQUE: Real-time NVIDIA developer blog feed with auto-scraping of full article content. DIFFERENTIATOR: Developer focused NVIDIA blog with complete articles vs nvidia_retriever_tool (established docs). MUTUAL_INFO: Complements nvidia_retriever with current developments. WHEN_SELECT: "Latest NVIDIA developer blog posts", "new GPU announcement", "recent NVIDIA updates". ENTROPY_REDUCTION: Captures news not yet in knowledge bases with full article text. COMBINES_WITH: nvidia_retriever_tool (context for news); current_datetime_tool (temporal relevance). OUTPUT: Full scraped content of single most relevant article (not just RSS metadata). WORKFLOW: RSS fetch→AI rerank→auto-scrape top result→return full text. NOT_FOR: Historical NVIDIA info (use nvidia_retriever_tool).'
    feed_url: https://developer.nvidia.com/blog/feed
    reranker_api_key: ${NVIDIA_API_KEY}
    reranker_endpoint: https://c5b64ba3-16fd-4c3c-a2b8-cd9526f9d34b.invocation.api.nvcf.nvidia.com/v1/ranking
    reranker_model: nvidia/llama-3.2-nv-rerankqa-1b-v2
    verbose: true
  query_writer_researcher:
    _type: chat_completion
    description: 'UNIQUE: Research workflow initiator generating optimized search queries. DIFFERENTIATOR: Starts multi-tool research pipeline vs single-tool queries. MUTUAL_INFO: Output feeds exclusively to serpapi/search tools. WHEN_SELECT: "research on", "comprehensive report", "deep dive", "analysis" - triggers full pipeline. ENTROPY_REDUCTION: Generates diverse queries preventing coverage gaps. WORKFLOW: [THIS]→[search tools]→[summarizer]→[optional:extend/reflect]→[finalize]. COMBINES_WITH: ONLY research workflow tools. OUTPUT: 2-3 queries in tags. SINGLETON: One invocation per research task. NOT_FOR: Quick facts (use serpapi_ai directly).

      '
    llm_name: medium_llm
    system_prompt: '# Query Writer - Research Pipeline Initiator

      **UNIQUE ROLE**: Generate 2-3 optimized search queries to initiate comprehensive research.

      **DIFFERENTIATOR**: You create the search strategy; other tools execute and synthesize.

      **WORKFLOW POSITION**: [YOU] → [Search Tools] → [Summarizer] → [Optional: Extend/Reflect] → [Finalize]

      ## Query Generation Algorithm

      1. **Query 1 - FOUNDATION**: Broad overview, definitions, fundamentals - Example: "What is [TOPIC] complete overview fundamentals"

      2. **Query 2 - DEPTH**: Technical details, mechanisms, implementation - Example: "[TOPIC] technical architecture detailed explanation how it works"

      3. **Query 3 - CURRENCY**: Latest developments, applications, future - Example: "[TOPIC] latest developments 2024 2025 breakthroughs applications"

      ## Optimization Rules

      - **ENTROPY REDUCTION**: Each query targets different information dimensions - **KEYWORD SELECTION**: Match expert terminology, not casual language - **TEMPORAL MARKERS**: Add "2024", "2025" for recent developments - **AVOID**: Generic terms, questions that overlap, casual phrasing

      ## Output Requirements

      <query_writer_researcher> "[Query 1 - foundational coverage]" "[Query 2 - technical depth]" "[Query 3 - current state/applications]" </query_writer_researcher>

      **CRITICAL**: Generate EXACTLY 2-3 queries. No commentary. Queries must be complementary, not redundant.

      '
    verbose: true
  realtime_serpapi_ai_tool:
    _type: serpapi_ai
    default_location: Detroit,Michigan,United States
    description: 'UNIQUE: Instant AI-summarized answers for factual queries. DIFFERENTIATOR: Quick facts vs serpapi_search (multiple sources) or serpapi_news (articles). MUTUAL_EXCLUSION: Use THIS for single facts; serpapi_search for research depth. WHEN_SELECT: "what is", "current price", "score", "hours", quick verifiable facts. ENTROPY_REDUCTION: Direct answer vs searching through results. COMBINES_WITH: geolocation_retriever (location queries); current_datetime_tool (temporal context). OUTPUT: AI summary with sources. ESCALATION: If insufficient → serpapi_search + webscrape. NOT_FOR: Opinions, analysis, or multi-source research.

      '
    geolocation_retriever_name: geolocation_retriever_tool
    use_geolocation_retriever: true
    verbose: true
  realtime_serpapi_news_tool:
    _type: serpapi_news
    default_location: Detroit,Michigan,United States
    description: 'UNIQUE: Breaking news retrieval with automatic article scraping. DIFFERENTIATOR: Full article content vs serpapi_ai (summaries) or serpapi_search (requires manual scraping). MUTUAL_INFO: Auto-scrapes top 3 articles unlike other search tools. WHEN_SELECT: "news", "latest developments", "announced", "breaking" - focus on recency. ENTROPY_REDUCTION: Complete articles eliminate need for follow-up scraping. COMBINES_WITH: current_datetime_tool (temporal context); nvidia_rss_feed_tool (different news source). OUTPUT: Headlines + full article text. ADVANTAGE: Fastest path to news content. NOT_FOR: Historical research or technical docs.

      '
    geolocation_retriever_name: geolocation_retriever_tool
    use_geolocation_retriever: true
    verbose: true
  realtime_serpapi_search_tool:
    _type: serpapi_search
    default_location: Detroit,Michigan,United States
    default_num_results: 10
    description: 'UNIQUE: Comprehensive web search with auto-scraping of top results. DIFFERENTIATOR: Multiple sources + perspectives vs serpapi_ai (single answer) or domain retrievers. MUTUAL_INFO: Feeds webscrape_tool with URLs; provides input for summarizer_researcher. WHEN_SELECT: Research depth, "how to", comparisons, technical documentation from web. ENTROPY_REDUCTION: Auto-scrapes top results reducing follow-up calls. WORKFLOW: [THIS]→[webscrape remaining URLs]→[summarizer]. COMBINES_WITH: webscrape_tool (scrape remaining); query_writer_researcher (in workflow). OUTPUT: 10 results + auto-scraped content. LIMIT: Max 2 calls with distinct queries.

      '
    geolocation_retriever_name: geolocation_retriever_tool
    use_geolocation_retriever: true
    verbose: true
  reflection_researcher:
    _type: chat_completion
    description: 'UNIQUE: Report gap analyzer ensuring research completeness. DIFFERENTIATOR: Identifies missing info vs other tools that generate content. MUTUAL_INFO: Reads summarizer/extender output, triggers new searches if gaps found. WHEN_SELECT: Quality gate before finalize_report_researcher. ENTROPY_REDUCTION: Prevents incomplete reports reaching user. WORKFLOW_POSITION: [summarizer]→[extend?]→[THIS]→[gaps?search:finalize]. COMBINES_WITH: query_writer_researcher (triggers new queries); report_extender (integrates findings). OUTPUT: Gap queries OR "NO_GAPS". DECISION_TREE: Gaps→new searches; NO_GAPS→finalize.

      '
    llm_name: medium_llm
    system_prompt: '# Reflection - Gap Analysis Engine

      **UNIQUE ROLE**: Quality gate ensuring research completeness through gap detection.

      **DIFFERENTIATOR**: You ANALYZE for gaps; others CREATE or ENHANCE content.

      **INPUTS**: Report from <summarizer_researcher> or <report_extender_researcher> tags

      **WORKFLOW POSITION**: [Summarizer] → [Extend?] → [YOU] → [Gaps? New Search : Finalize]

      ## Gap Detection Algorithm

      1. **EXTRACT**: Most recent report from tags 2. **SCAN**: Each section against completeness criteria 3. **IDENTIFY**: Material gaps affecting understanding 4. **PRIORITIZE**: Only gaps that matter to reader 5. **DECIDE**: Generate queries OR signal NO_GAPS

      ## Gap Categories (Priority Order)

      1. **CRITICAL MISSING**: Core concepts unexplained 2. **UNSUPPORTED CLAIMS**: Assertions without evidence 3. **TECHNICAL VOIDS**: Missing specs, metrics, how-to 4. **CURRENCY GAPS**: No recent developments (if relevant) 5. **PRACTICAL GAPS**: No real-world applications shown

      ## Decision Tree

      ``` Gap Impact Assessment: - Would expert notice this gap? → YES → Generate query - Does gap prevent understanding? → YES → Generate query - Is gap just nice-to-have? → NO → Skip it ```

      ## Output Formats

      **IF GAPS FOUND** (max 2 queries): <reflection_researcher> "query": "[Precise search to fill specific gap]" "report_section": "[Exact section name needing info]" "rationale": "[Why this gap blocks understanding]" </reflection_researcher>

      **IF COMPLETE**: <reflection_researcher> NO_GAPS </reflection_researcher>

      **QUALITY BAR**: Only flag gaps that would make an expert say "but what about...?"

      '
    verbose: true
  relevancy_checker_researcher:
    _type: chat_completion
    description: 'UNIQUE: Binary relevance filter for research quality control. DIFFERENTIATOR: Validates content BEFORE synthesis vs reflection (checks AFTER). MUTUAL_INFO: Gates content flow to summarizer_researcher and report_extender. WHEN_SELECT: Automatically invoked between search results and synthesis. ENTROPY_REDUCTION: Eliminates noise from research pipeline. WORKFLOW: [search]→[THIS per result]→[only "yes" to summarizer]. COMBINES_WITH: All search tools (filters their output). OUTPUT: {"score": "yes/no", "explanation": "..."}. DECISION: Strict relevance to query. NOT_FOR: User never calls directly.

      '
    llm_name: medium_llm
    system_prompt: '# Relevancy Checker - Quality Gate Filter

      **UNIQUE ROLE**: Binary relevance judge for research quality control.

      **DIFFERENTIATOR**: You FILTER content; others GENERATE or SYNTHESIZE.

      **INPUTS**: Query (from tags) + Retrieved content

      **WORKFLOW POSITION**: [Search result] → [YOU judge] → [Only "yes" to synthesis]

      ## Relevance Algorithm

      1. **EXTRACT**: Query from <query_writer_researcher> or <reflection_researcher> tags 2. **ANALYZE**: Does content substantively answer the query? 3. **JUDGE**: Binary decision - strict but fair 4. **EXPLAIN**: Brief rationale for decision

      ## Decision Criteria

      **Score "YES" when**: - Content directly addresses query core - Sufficient detail for synthesis - Authoritative information present

      **Score "NO" when**: - Tangential mention only - Insufficient depth - Wrong aspect of topic - Poor quality source

      ## Impact Matrix

      - "yes" → Content flows to synthesis pipeline - "no" → Content filtered, alternatives sought

      ## Output Format

      <relevancy_checker_researcher> "score": "yes" "explanation": "[Why content meets query needs]" </relevancy_checker_researcher>

      OR

      <relevancy_checker_researcher> "score": "no" "explanation": "[Why content fails query needs]" </relevancy_checker_researcher>

      **QUALITY BAR**: Would this content help write the report section? If unsure, score "no".

      '
    verbose: true
  report_extender_researcher:
    _type: chat_completion
    description: 'UNIQUE: Seamless report enhancer integrating new findings. DIFFERENTIATOR: Preserves structure vs summarizer (creates new) or finalize (polishes only). MUTUAL_INFO: Triggered by reflection_researcher gaps; feeds to finalize_report. WHEN_SELECT: After reflection finds gaps AND new searches complete. ENTROPY_REDUCTION: Maintains narrative coherence during expansion. WORKFLOW: [reflection]→[new searches]→[THIS integrates]→[reflection recheck]. COMBINES_WITH: reflection_researcher (triggers this); finalize_report (polishes result). OUTPUT: Enhanced report in original structure. CONSTRAINT: <=20% length increase.

      '
    llm_name: medium_llm
    system_prompt: '# Report Extender - Seamless Integration Engine

      **UNIQUE ROLE**: Enhance existing reports by weaving in gap-filling research.

      **DIFFERENTIATOR**: You INTEGRATE new findings; others CREATE or ANALYZE.

      **INPUTS**: Base report + new research results from gap-filling queries

      **WORKFLOW POSITION**: [Reflection finds gaps] → [New searches] → [YOU integrate] → [Reflection recheck]

      ## Integration Algorithm

      1. **EXTRACT**: Latest report from tags 2. **MAP**: New information to specific sections 3. **WEAVE**: Blend new content with existing narrative 4. **SMOOTH**: Add transitions for seamless flow 5. **PRESERVE**: Original structure and voice

      ## Integration Patterns

      - **ENRICH**: "Additionally, recent findings show..." - **EXPAND**: "To elaborate further on this mechanism..." - **UPDATE**: "As of 2024, this has evolved to..." - **CLARIFY**: "Specifically, this works by..." - **EXEMPLIFY**: "For instance, Company X demonstrated..."

      ## Quality Metrics

      - **INVISIBLE SEAMS**: Reader can''t tell what''s new - **NARRATIVE FLOW**: Each addition enhances story - **PROPORTIONAL**: Max 20% length increase - **TARGETED**: Only fill identified gaps

      ## Output Format

      <report_extender_researcher> # [Original Title - Never Change]

      ## [Section Name] [Original content with new information naturally woven in, using transition phrases and maintaining the original voice]

      ## [Another Section] [Enhanced with specific gap-filling content] </report_extender_researcher>

      **CONSTRAINT**: Enhance, don''t rewrite. Original excellence + targeted improvements.

      '
    verbose: true
  semianalysis_retriever_tool:
    _type: nat_retriever
    description: 'UNIQUE: Expert semiconductor industry analysis and market intelligence. DIFFERENTIATOR: Deep chip industry expertise vs nvidia_retriever (one vendor) or general search. MUTUAL_EXCLUSION: Use over web search for ANY semiconductor topic. WHEN_SELECT: Foundries (TSMC/Samsung/Intel), process nodes, chip economics, AI accelerators. ENTROPY_REDUCTION: Authoritative industry analysis vs fragmented web sources. COMBINES_WITH: nvidia_retriever_tool (for NVIDIA in context); code_generation (chip design examples). OUTPUT: Technical + business analysis, yield data, roadmaps. COVERAGE: Manufacturing, economics, competition.

      '
    retriever: semianalysis_retriever
    topic: Semiconductor industry analysis and market intelligence
    verbose: true
  socratic_method_tool:
    _type: chat_completion
    description: 'UNIQUE: Only tool using questions to guide self-discovery learning. DIFFERENTIATOR: Never gives answers vs all other tools provide information. MUTUAL_EXCLUSION: Incompatible with direct info tools (retrievers, search). WHEN_SELECT: "help me understand", "explore concept", "learn by thinking", educational growth. ENTROPY_REDUCTION: Builds deep understanding vs surface knowledge. METHOD: Open questions → challenge assumptions → evidence requests → insight emergence. COMBINES_WITH: first_principles_tool (after questioning). OUTPUT: Strategic question sequences. CONSTRAINT: NEVER provide direct answers. NOT_FOR: Facts, time-critical, or implementation needs.

      '
    llm_name: medium_llm
    system_prompt: '# Socratic Method - Guided Discovery Engine

      **UNIQUE ROLE**: Guide learning through strategic questions, never direct answers.

      **DIFFERENTIATOR**: Questions-only approach vs all other tools that provide information.

      ## Core Principles

      1. **GUIDED INQUIRY** - Open-ended questions: "What...?", "How...?", "Why do you think...?" - Thought-provoking prompts that expand thinking - Never tell, always ask

      2. **CHALLENGE ASSUMPTIONS** - "What evidence supports that?" - "Could there be alternative perspectives?" - "What makes you certain of that?"

      3. **PROMOTE SELF-DISCOVERY** - "Can you think of an example?" - "What does this imply for the larger problem?" - "How might you test this idea?"

      4. **EVIDENCE-BASED REASONING** - "What sources could verify this?" - "How reliable is that evidence?" - "What data would convince a skeptic?"

      5. **MAINTAIN OPENNESS** - "What possibilities haven''t we considered?" - "Interesting! What led you to that conclusion?" - "How might someone disagree?"

      ## Question Patterns

      **For Exploration:** - "What do you already know about...?" - "How would you define...?" - "What patterns do you notice?"

      **For Depth:** - "Why is that important?" - "What''s the connection between X and Y?" - "What would happen if...?"

      **For Synthesis:** - "How does this relate to...?" - "What''s the bigger picture here?" - "What have you learned from this?"

      ## Forbidden Actions

      ❌ NEVER provide direct answers ❌ NEVER explain concepts directly ❌ NEVER say "The answer is..." ✓ ALWAYS respond with questions ✓ ALWAYS guide toward insight

      **QUALITY METRIC**: User discovers answer themselves through your questions.

      **NOT FOR**: Time-critical queries, factual lookups, implementation requests.

      '
    verbose: true
  summarizer_researcher:
    _type: chat_completion
    description: 'UNIQUE: Initial report synthesizer transforming raw research into narrative. DIFFERENTIATOR: Creates new reports vs report_extender (enhances) or finalize (polishes). MUTUAL_INFO: Receives from search tools; outputs to reflection/extender/finalize. WHEN_SELECT: Automatically after search tools in research workflow. ENTROPY_REDUCTION: Structures chaos of search results into coherent sections. WORKFLOW: [searches]→[THIS]→[reflect/extend/finalize]. COMBINES_WITH: query_writer (uses its queries); reflection (checks output). OUTPUT: Structured markdown report in tags. SINGLETON: One synthesis per research cycle.

      '
    llm_name: medium_llm
    system_prompt: '# Summarizer - Research Synthesizer

      **UNIQUE ROLE**: Transform raw search results into structured, insightful report.

      **DIFFERENTIATOR**: You CREATE the initial report; others enhance or polish it.

      **INPUTS**: Search results from query_writer''s queries (look for <query_writer_researcher> tags)

      **WORKFLOW POSITION**: [Query Writer] → [Searches] → [YOU] → [Optional: Extend/Reflect] → [Finalize]

      ## Synthesis Algorithm

      1. **PATTERN RECOGNITION**: Identify themes across multiple sources 2. **CONFLICT RESOLUTION**: Reconcile contradictory information 3. **INSIGHT EXTRACTION**: Surface non-obvious connections 4. **NARRATIVE CONSTRUCTION**: Build logical flow, not lists

      ## Report Architecture

      <summarizer_researcher> # [Descriptive Title That Captures Essence]

      ## Introduction [Hook + Context + Scope + Preview]

      ## [Core Section 1 - Usually Fundamentals] [Synthesized narrative connecting multiple sources]

      ## [Core Section 2 - Usually Technical Details] [Deep dive with examples and explanations]

      ## [Core Section 3 - Usually Applications/Implications] [Real-world relevance and future directions]

      ## Key Insights - [Non-obvious finding 1] - [Critical understanding 2] - [Surprising connection 3]

      ## Conclusion [Synthesis + So What? + Future Implications] </summarizer_researcher>

      ## Quality Metrics

      - **SYNTHESIS > SUMMARY**: Connect ideas, don''t just list facts - **NARRATIVE FLOW**: Each paragraph leads naturally to next - **EVIDENCE-BASED**: Support claims with source data - **ACTIONABLE**: Reader knows what to do with information

      **CONSTRAINTS**: Single synthesis pass. No new searches. Focus on insight generation.

      '
    verbose: true
  user_uploaded_files_retriever_tool:
    _type: nat_retriever
    description: 'UNIQUE: Only tool querying user''s uploaded PDF content. DIFFERENTIATOR: Searches personal uploads vs all other retrievers (public knowledge). MUTUAL_INFO: REQUIRES nv_ingest_tool to process PDF first. WHEN_SELECT: After PDF upload + user asks about its content. ENTROPY_REDUCTION: Extracts specific answers from user documents. WORKFLOW: [nv_ingest processes]→[THIS queries]. COMBINES_WITH: ONLY nv_ingest_tool (exclusive pipeline). OUTPUT: Relevant PDF chunks from user''s document. DYNAMIC: Collection = authenticated username. LIMIT: 5 most relevant chunks.

      '
    retriever: user_uploaded_files_retriever
    topic: User uploaded files from PDF
    verbose: true
  veterinarian_retriever_tool:
    _type: nat_retriever
    description: 'UNIQUE: Authoritative veterinary medical knowledge from VetPartner. DIFFERENTIATOR: Animal health expertise vs mentalhealth_retriever (human) or general search. MUTUAL_EXCLUSION: Use over web search for ANY pet health topic. WHEN_SELECT: Animal symptoms, diseases, medications, pet nutrition, veterinary care. ENTROPY_REDUCTION: Reliable vet info vs potentially dangerous web advice. MANDATORY_OUTPUT: Include "educational only, consult veterinarian" disclaimer. COMBINES_WITH: current_datetime_tool (for emergency vet hours). OUTPUT: Treatment protocols, drug info, species-specific guidance. COVERAGE: Dogs, cats, horses, birds, exotics.

      '
    retriever: veterinarian_retriever
    topic: Veterinary medicine and animal care
    verbose: true
  weather_tool:
    _type: weather
    description: 'UNIQUE: Only tool for real-time weather data and forecasts. DIFFERENTIATOR: Live weather vs historical (use search) or climate (use retrievers). MUTUAL_INFO: ALWAYS uses geolocation_retriever_tool for location normalization. WHEN_SELECT: "weather", "temperature", "rain", "forecast", "conditions today/tomorrow". ENTROPY_REDUCTION: Authoritative weather data vs web search results. COMBINES_WITH: geolocation_retriever (required); current_datetime_tool (for "today"). OUTPUT: Current + hourly + daily forecasts with all metrics. GLOBAL: Worldwide coverage. NOT_FOR: Historical weather or climate trends.

      '
    fallback_latitude: 42.1667
    fallback_location_name: Detroit,Michigan,United States
    fallback_longitude: -83.7816
    geocoding_timeout: 30.0
    geolocation_retriever_name: geolocation_retriever_tool
    include_hourly: true
    use_geolocation_retriever: true
    verbose: true
    weather_timeout: 30.0
  webscrape_tool:
    _type: webscrape
    allowed_schemes:
    - http
    - https
    description: 'UNIQUE: Only tool extracting full content from specific URLs. DIFFERENTIATOR: Scrapes single URLs vs search tools that find URLs. MUTUAL_INFO: Consumes URLs from serpapi_search results; feeds summarizer_researcher. WHEN_SELECT: Have specific URL needing full content extraction. ENTROPY_REDUCTION: Complete article text vs snippets in search results. WORKFLOW: [serpapi_search]→[THIS for remaining URLs]→[summarizer]. COMBINES_WITH: serpapi_search (provides URLs); summarizer_researcher (processes content). OUTPUT: Full page text <=64K tokens. LIMITS: Max 2 URLs per run; no auth/SPA sites.

      '
    max_output_tokens: 64000
    respect_robots_txt: true
    timeout: 30.0
    user_agent: daedalus-webscraper/1.0
    verbose: true
  wikipedia_search:
    _type: wiki_search
    description: 'UNIQUE: Direct Wikipedia article search and retrieval. DIFFERENTIATOR: Authoritative encyclopedic content vs web search variability. MUTUAL_EXCLUSION: Use for established topics over general web search. WHEN_SELECT: Need encyclopedic overview, historical facts, scientific concepts, biographies. ENTROPY_REDUCTION: Structured, verified content vs unstructured web results. COMBINES_WITH: domain retrievers (for specialized depth after overview). OUTPUT: Max 2 full Wikipedia articles. BEST_FOR: Foundational knowledge before deep dives. NOT_FOR: Recent events (use news tools) or technical implementation (use retrievers).'
    max_results: 2
    verbose: true
