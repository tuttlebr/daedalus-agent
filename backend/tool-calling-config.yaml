    description: Retrieves current weather conditions and forecasts for specified locations. Use when users ask about temperature, precipitation, weather conditions, forecasts, or climate. Returns current conditions plus hourly and daily forecasts including temperature, humidity, wind, precipitation probability, and conditions. Automatically normalizes location names using geolocation retriever for accuracy. Supports worldwide locations. Include relevant forecast period when presenting results (current, today, week ahead).
