    default_width: 1024
    description: Generates high-quality images from text descriptions using AI diffusion models. Use when users request visual content, illustrations, artwork, or want to visualize concepts, scenes, objects, or designs. Automatically enhances user prompts for better results. Supports various styles (photorealistic, artistic, technical diagrams). Returns 1024x1024 images by default. Best for "create an image of," "show me," "generate a picture," "visualize" requests. Cannot edit existing images or generate text within images reliably. Generation takes 15 seconds.
