authentication:
  k8s_mcp_server:
    _type: api_key
    custom_header_name: Authorization
    custom_header_prefix: Bearer
    raw_key: ${KUBERNETES_MCP_TOKEN}
  github_mcp_server:
    _type: api_key
    custom_header_name: Authorization
    custom_header_prefix: Bearer
    raw_key: ${GITHUB_PAT}
  gmail_mcp_server:
    _type: mcp_oauth2
    # Gmail's protected-resource metadata advertises /mcp, while the
    # Streamable HTTP transport endpoint is /mcp/v1. NAT uses this field
    # as the OAuth resource indicator, so keep it aligned with metadata.
    server_url: https://gmailmcp.googleapis.com/mcp
    client_id: ${GOOGLE_MCP_CLIENT_ID}
    client_secret: ${GOOGLE_MCP_CLIENT_SECRET}
    enable_dynamic_registration: false
    client_name: Daedalus Gmail MCP
    redirect_uri: ${GOOGLE_MCP_REDIRECT_URI}
    token_endpoint_auth_method: client_secret_post
    scopes:
      - https://www.googleapis.com/auth/gmail.readonly
    use_pkce: true
    allow_default_user_id_for_tool_calls: false
  calendar_mcp_server:
    _type: mcp_oauth2
    server_url: https://calendarmcp.googleapis.com/mcp/v1
    client_id: ${GOOGLE_MCP_CLIENT_ID}
    client_secret: ${GOOGLE_MCP_CLIENT_SECRET}
    enable_dynamic_registration: false
    client_name: Daedalus Calendar MCP
    redirect_uri: ${GOOGLE_MCP_REDIRECT_URI}
    token_endpoint_auth_method: client_secret_post
    scopes:
      - https://www.googleapis.com/auth/calendar.calendarlist.readonly
      - https://www.googleapis.com/auth/calendar.events.freebusy
      - https://www.googleapis.com/auth/calendar.events.readonly
    use_pkce: true
    allow_default_user_id_for_tool_calls: false
embedders:
  milvus_embedder:
    _type: nim
    api_key: ${EMBEDDING_API_KEY}
    base_url: ${EMBEDDING_BASE_URL}
    model_name: ${EMBEDDING_MODEL}
    truncate: END
function_groups:
  github_mcp_server:
    _type: mcp_client
    include:
      - get_file_contents
      - get_latest_release
      - issue_read
      - list_branches
      - list_commits
      - list_issues
      - search_code
      - search_issues
      - search_pull_requests
      - search_repositories
    tool_call_timeout: 60
    reconnect_enabled: true
    reconnect_max_attempts: 3
    session_idle_timeout: 600
    tool_overrides:
      search_code:
        description: >-
          Search CODE across repos the user has access to. Args: query
          (GitHub code-search syntax, e.g. 'language:python org:nvidia
          foo'). Returns: file hits with snippets. Use
          search_repositories for repo-level finding.
      search_repositories:
        description: >-
          Find REPOS by name/topic/owner. Args: query (e.g.
          'topic:llm stars:>1000'). Returns: repo list. Use
          search_code for in-file matches.
      list_issues:
        description: >-
          List issues in ONE specific repo. Args: owner, repo, state.
          Returns: issue list. Use search_issues for cross-repo
          search.
      issue_read:
        description: >-
          Read a single issue with full comments. Args: owner, repo,
          issue_number. Returns: issue body + comments.
    server:
      auth_provider: github_mcp_server
      transport: streamable-http
      url: https://api.githubcopilot.com/mcp
  gmail_mcp_server:
    _type: mcp_client
    include:
      - search_threads
      - get_thread
      - list_labels
    tool_call_timeout: 60
    reconnect_enabled: true
    reconnect_max_attempts: 3
    session_idle_timeout: 600
    tool_overrides:
      search_threads:
        description: >-
          Search the authenticated user's Gmail threads. Args: query
          (Gmail search syntax). Returns matching thread summaries.
      get_thread:
        description: >-
          Read one Gmail thread by id for the authenticated user. Use
          after search_threads when full message context is needed.
    server:
      auth_provider: gmail_mcp_server
      transport: streamable-http
      url: https://gmailmcp.googleapis.com/mcp/v1
  calendar_mcp_server:
    _type: mcp_client
    include:
      - list_calendars
      - list_events
      - get_event
      - suggest_time
    tool_call_timeout: 60
    reconnect_enabled: true
    reconnect_max_attempts: 3
    session_idle_timeout: 600
    tool_overrides:
      list_events:
        description: >-
          List events from the authenticated user's Google Calendar.
          Args include calendar id and time window.
      suggest_time:
        description: >-
          Suggest open times from the authenticated user's Google Calendar
          availability. Use for scheduling and free/busy questions.
    server:
      auth_provider: calendar_mcp_server
      transport: streamable-http
      url: https://calendarmcp.googleapis.com/mcp/v1
  dynamo_mcp_server:
    _type: mcp_client
    tool_call_timeout: 45
    reconnect_enabled: true
    reconnect_max_attempts: 3
    session_idle_timeout: 600
    tool_overrides:
      searchDocs:
        description: >-
          Search NVIDIA Dynamo inference runtime docs. Args: query.
          Returns: doc passages. Use for Dynamo-specific API/config
          questions.
    server:
      transport: streamable-http
      url: https://docs.nvidia.com/dynamo/_mcp/server
  openshell_mcp_server:
    _type: mcp_client
    include:
      - searchDocs
    tool_call_timeout: 45
    reconnect_enabled: true
    reconnect_max_attempts: 3
    session_idle_timeout: 600
    tool_overrides:
      searchDocs:
        description: >-
          Search NVIDIA OpenShell docs. Args: query.
          Returns: doc passages. Use for OpenShell-specific API/config
          questions.
    server:
      transport: streamable-http
      url: https://docs.nvidia.com/openshell/_mcp/server
  aistore_mcp_server:
    _type: mcp_client
    include:
      - searchDocs
    tool_call_timeout: 45
    reconnect_enabled: true
    reconnect_max_attempts: 3
    session_idle_timeout: 600
    tool_overrides:
      searchDocs:
        description: >-
          Search NVIDIA AIStore docs. Args: query.
          Returns: doc passages. Use for AIStore-specific API/config
          questions.
    server:
      transport: streamable-http
      url: https://docs.nvidia.com/aistore/_mcp/server
  aiperf_mcp_server:
    _type: mcp_client
    include:
      - searchDocs
    tool_call_timeout: 45
    reconnect_enabled: true
    reconnect_max_attempts: 3
    session_idle_timeout: 600
    tool_overrides:
      searchDocs:
        description: >-
          Search NVIDIA AIPerf docs. Args: query.
          Returns: doc passages. Use for AIPerf-specific API/config
          questions.
    server:
      transport: streamable-http
      url: https://docs.nvidia.com/aiperf/_mcp/server
  nvcf_mcp_server:
    _type: mcp_client
    include:
      - searchDocs
    tool_call_timeout: 45
    reconnect_enabled: true
    reconnect_max_attempts: 3
    session_idle_timeout: 600
    tool_overrides:
      searchDocs:
        description: >-
          Search NVIDIA Cloud Functions docs. Args: query.
          Returns: doc passages. Use for NVIDIA Cloud Functions-specific
          API/config questions.
    server:
      transport: streamable-http
      url: https://docs.nvidia.com/nvcf/_mcp/server
  dsx_mcp_server:
    _type: mcp_client
    include:
      - searchDocs
    tool_call_timeout: 45
    reconnect_enabled: true
    reconnect_max_attempts: 3
    session_idle_timeout: 600
    tool_overrides:
      searchDocs:
        description: >-
          Search NVIDIA DSX docs. Args: query.
          Returns: doc passages. Use for DSX-specific API/config
          questions.
    server:
      transport: streamable-http
      url: https://docs.nvidia.com/dsx/_mcp/server
  k8s_mcp_server:
    _type: mcp_client
    tool_call_timeout: 300
    reconnect_enabled: true
    reconnect_max_attempts: 3
    session_idle_timeout: 1200
    server:
      transport: streamable-http
      url: ${KUBERNETES_MCP_SERVER}
      auth_provider: k8s_mcp_server
functions:
  research_agent:
    _type: tool_calling_agent_resilient
    llm_name: default_llm
    max_iterations: 12
    handle_tool_errors: true
    verbose: true
    tool_names:
      - domain_retriever_tool
      - curated_feed_search_tool
      - exa_internet_search_tool
      - serpapi_search_tool
      - webscrape_tool
      - content_distiller_tool
      - source_verifier_tool
      - current_datetime_tool
    description: >-
      Run a research task. Input: a one-sentence research question or
      "brief me on X". Triggers: "research", "summarize", "what's the
      latest", "compare", "state of", any knowledge-gathering or
      briefing. Returns: distilled findings with source URLs. Do NOT
      use for live ops (ops_agent), image/video/transcripts
      (media_agent), user document search (user_document_agent), or
      official NVIDIA product docs lookup (nvidia_docs_agent).
    system_prompt: |
      Role: Daedalus research specialist for factual, source-backed answers.

      # Goal
      Answer the research question with the minimum evidence needed to be
      correct, useful, and citeable.

      # Source rules
      - Start with domain_retriever_tool for established nvidia,
        semianalysis, kubernetes, veterinarian, or mentalhealth reference.
        If a request or retrieved instruction says "curated_memory_store",
        treat that as a stale alias for domain_retriever_tool; never call curated_memory_store because it is not a configured tool.
      - Use curated_feed_search_tool for recent curated-source questions
        such as "latest", "this week", or "current".
      - Use exa_internet_search_tool for semantic/deep web research
        outside the curated retrievers when source text matters.
      - Use serpapi_search_tool for structured Google results, news,
        images, shopping, or quick URL discovery.
      - Use webscrape_tool only when you already have a specific URL.

      # Retrieval budget and evidence
      Run independent queries in parallel when useful. Default to at most two
      search or retrieval calls before synthesis unless the user asks for a
      broad survey, required facts are missing, or sources conflict. If a tool
      output exceeds ~5000 tokens, distill it before using it.

      For latest/current version questions, use an official latest/docs landing
      page, release index, or package index that explicitly labels the current
      version. A version-specific release note is not proof of latest/current
      unless that page says so.

      For memory-destined findings, gather evidence first, choose one minimal
      final claim supported by the strongest official or primary source, then
      call source_verifier_tool.verify_claim once. Do not verify speculative
      candidate claims, placeholder URLs such as example.com, or unsupported
      claims copied from search snippets. If no exact supported claim exists,
      state the uncertainty and do not store a finding.

      # Output and stop rule
      Return concise bullet findings with [source: url] citations. Stop when
      the core question is answered with sufficient evidence; the parent
      workflow handles voice and follow-up.
  nvidia_docs_agent:
    _type: tool_calling_agent_resilient
    llm_name: reasoning_llm
    max_iterations: 6
    handle_tool_errors: true
    verbose: true
    tool_names:
      - dynamo_mcp_server
      - openshell_mcp_server
      - aiperf_mcp_server
      - nvcf_mcp_server
      - dsx_mcp_server
    description: >-
      Search official NVIDIA product documentation through MCP. Input:
      a docs, API, configuration, deployment, or troubleshooting question
      about Dynamo, OpenShell, AIPerf, NVIDIA Cloud Functions, or DSX. Returns a
      concise doc-grounded answer. Do NOT use for live Kubernetes/GitHub
      ops, private user data, media tasks, or general web research.
    system_prompt: |
      Role: Daedalus NVIDIA product documentation specialist.

      # Goal
      Answer docs, API, configuration, deployment, and troubleshooting
      questions using the official MCP docs server for the named product.

      # Product routing
      - Dynamo -> dynamo_mcp_server
      - OpenShell -> openshell_mcp_server
      - AIPerf -> aiperf_mcp_server
      - NVIDIA Cloud Functions or NVCF -> nvcf_mcp_server
      - DSX -> dsx_mcp_server

      # Constraints
      Search only the relevant product docs for cross-product questions. Ask
      one brief clarifying question if the product is ambiguous among the listed
      docs. This agent does not perform live operations.

      # Output and stop rule
      Return a concise doc-grounded answer. Include commands or config only
      when they answer the request, cite source URLs when available, and stop
      once the docs support the answer. If a docs MCP server is unavailable,
      name the unavailable product docs plainly.
  ops_agent:
    _type: tool_calling_agent_resilient
    llm_name: reasoning_llm
    max_iterations: 8
    handle_tool_errors: true
    verbose: true
    return_direct:
      - ops_confirmation_tool
    tool_names:
      - github_mcp_server
      - k8s_mcp_server
      - domain_retriever_tool
      - ops_confirmation_tool
    description: >-
      Execute ops against GitHub or Kubernetes. Input:
      imperative instruction ("list prs for org X", "scale deployment
      foo to 3", "describe pod bar in namespace baz"). Triggers: repo,
      PR, issue, release, label, branch, commit, pod, deployment,
      namespace, helm, kubectl. Returns: action result or error. Fails
      when: task mixes unrelated concerns, is purely a research question,
      or asks for product documentation lookup.
    system_prompt: |
      Role: Daedalus ops specialist for GitHub and Kubernetes requests.

      # Goal
      Complete the requested read or approved mutation through the configured
      tools, then report the concrete outcome.

      # Tool and confirmation rules
      When a configured tool directly covers the request, call it instead of
      giving instructions for the user to run manually. Reads and
      non-destructive writes proceed directly.

      Call ops_confirmation_tool.confirm_action before any destructive k8s op
      (delete, patch that removes fields, scale-to-zero, rollback that loses
      data, helm uninstall, helm rollback) and before any GitHub write (push,
      merge, close/reopen issue or PR, delete branch). For k8s/GitHub MCP
      mutations, call confirm_action with user_id from [IDENTITY],
      action_type="mcp_mutation", and target set to the namespace, repo, or
      object being changed. Pass the returned approval_token into the MCP tool
      call.

      # Failure behavior
      If a tool returns an MCP application error such as "not found" or
      "missing parameter", report it plainly and stop rather than retrying the
      same call blindly.

      # Output
      Return a concise command summary and outcome. Skip preamble. Stop once
      the requested operation has succeeded, failed plainly, or requires
      approval.
  media_agent:
    _type: tool_calling_agent_resilient
    llm_name: default_llm
    max_iterations: 4
    handle_tool_errors: true
    verbose: true
    tool_names:
      - vtt_interpreter_tool
    description: >-
      Handle VTT/SRT meeting transcript interpretation. Visual image
      and video tasks are handled by the top-level visual_media_tool,
      which is return_direct to avoid extra media-agent routing delay.
      Input: task description plus transcript_text. Triggers:
      "summarize meeting", "action items", "meeting notes". Returns:
      concise meeting analysis.
    system_prompt: |
      Role: Daedalus transcript specialist.

      # Goal
      Answer VTT/SRT transcript summarization, meeting notes, action-item, and
      transcript Q&A requests by calling vtt_interpreter_tool.

      # Constraints
      Use only transcript evidence for the answer. Visual image and video tasks
      are handled by the top-level visual_media_tool, not this sub-agent.

      # Output
      Return concise meeting analysis in the format requested by the user or by
      vtt_interpreter_tool. Stop once the transcript request is answered.
  user_data_agent:
    _type: tool_calling_agent_resilient
    llm_name: default_llm
    max_iterations: 6
    handle_tool_errors: true
    verbose: true
    tool_names:
      - gmail_mcp_server
      - calendar_mcp_server
    description: >-
      Work with the authenticated user's Gmail and Google Calendar.
      Input: email questions or schedule/calendar questions. Triggers:
      "my email", "Gmail", "inbox", "my calendar", "schedule",
      "events", or "free time". Returns: email/thread results,
      calendar events, or availability. Do NOT use as a substitute for
      get_memory, topical retrievers, or uploaded document search.
    system_prompt: |
      Role: Daedalus user-data specialist for the authenticated user's Gmail and
      Google Calendar.

      # Goal
      Answer email and calendar questions from the user's connected Google
      Workspace data.

      # Tool rules
      For Gmail questions, use search_threads before get_thread unless the user
      gave a specific thread id. Use Gmail search syntax when the user provides
      senders, dates, labels, or keywords. For Calendar questions, use
      list_calendars when the target calendar is unclear, list_events/get_event
      for event lookups, and suggest_time for free/busy or scheduling requests.

      # Constraints, Output, and stop rule
      Do not substitute this agent for general knowledge retrieval. Return the
      smallest useful answer with the matching thread, event, or availability
      details. Stop when the requested email or calendar fact is answered, or
      when a specific missing identifier or permission blocks lookup.
  user_document_agent:
    _type: tool_calling_agent_resilient
    llm_name: default_llm
    max_iterations: 6
    handle_tool_errors: true
    verbose: true
    tool_names:
      - user_document_tool
    description: >-
      Work with the authenticated user's uploaded documents. Input:
      document ingest/search requests. Triggers: user uploaded a file,
      references "my doc", "the PDF I uploaded", uploaded-document
      namespaces, or asks to search prior uploads. Returns: document
      passages or ingestion results. Do NOT use for Gmail, Calendar,
      get_memory, or topical retrievers.
    system_prompt: |
      Role: Daedalus uploaded-document specialist.

      # Goal
      Ingest or search the authenticated user's uploaded documents and answer
      from retrieved document passages.

      # Tool rules
      If the user just uploaded a document and asks about it without prior
      ingestion, call user_document_tool with operation="ingest" and username
      from [IDENTITY], then search. For later searches, call user_document_tool
      with operation="search", query, and username from [IDENTITY].

      Omit collection_name unless the user explicitly names a private
      uploaded-document namespace or an allow-listed shared upload collection
      (nvidia, semianalysis, kubernetes, vetpartner, mentalhealth). Private
      arbitrary names are scoped to the authenticated user; shared allow-listed
      names are used exactly.

      # Constraints, Output, and stop rule
      Do not substitute this agent for Gmail, Calendar, general knowledge
      retrieval, or memory retrieval. Return concise answers grounded in the
      uploaded document passages. Stop when the document answer or ingestion
      result is complete, or when the named document/namespace cannot be found.
  agent_skills_tool:
    _type: agent_skills
    skills_directory: /skills
    allow_script_execution: false
    enabled_operations:
      - load_skill
    allowed_script_extensions:
      - .py
      - .sh
    script_timeout: 120
    description: >-
      Load agent skills in /skills. load_skill returns skill instructions
      or bundled resources. Script execution is disabled in production.
      Trigger: user names a skill, task matches a skill's purpose, or you
      need a procedure you don't yet know. Args: skill_name and optional
      resource. Returns: skill instructions or resource content. Fails
      when: skill not found or requested resource path escapes skill dir.
    verbose: true
  add_memory:
    _type: add_memory
    description: >-
      Store a durable user fact, preference, project context, or
      verified finding as a single declarative sentence. Args: memory
      (plain text, NEVER JSON), user_id (from [IDENTITY]), optional
      key_value_pairs. Returns: memory id. Rules: (1) for
      type=finding or type=project_update, call
      source_verifier_tool.verify_claim on the exact final memory
      sentence first; store only if verdict=supported. On
      partially_supported, unsupported, or source_unreachable, do not
      store unless you rewrite the memory to only the supported
      subclaim and verify that rewritten sentence as supported; (2) on
      conflict with a prior memory, add a NEW entry that names
      both positions, never overwrite or silently supersede. Fails
      when: memory empty, user_id missing, or a finding lacks a prior
      verify_claim pass.
    memory: redis_memory
    verbose: true
  current_datetime_tool:
    _type: current_datetime
    description: >-
      Get current date, time, and timezone. Trigger: any
      time-relative query ("today", "this week", "how old is X").
      Args: none. Returns: ISO datetime + timezone. Fails when:
      never.
    verbose: true
  delete_memory:
    _type: delete_memory
    description: >-
      Permanently delete ALL memories for a user. Destructive,
      irreversible bulk wipe. Trigger: user explicitly says
      "delete/erase/wipe my memories". Args: user_id. Returns:
      deletion count. Fails when: called without prior
      user_interaction_tool.confirm_action (you MUST confirm first).
    memory: redis_memory
    verbose: true
  get_memory:
    _type: get_memory
    description: >-
      Semantic search over this user's memories. Trigger: daily briefings
      (FIRST, awaited), "remember when" / "what you know about me" /
      personalized asks, MAS calibration, or when prior preferences or
      project context would materially sharpen the answer. Args: user_id,
      query, top_k (default 5). Returns: ranked entries with metadata.
      Fails: never; anonymous with no prior memories returns an empty list.
    memory: redis_memory
    top_k: 5
    verbose: true
  visual_media_tool:
    _type: visual_media
    generation_api_endpoint: ${IMAGE_GENERATION_BASE_URL}
    generation_api_key: ${IMAGE_GENERATION_API_KEY}
    generation_model: ${IMAGE_GENERATION_MODEL}
    edit_api_endpoint: ${IMAGE_AUGMENTATION_BASE_URL}
    edit_api_key: ${IMAGE_AUGMENTATION_API_KEY}
    edit_model: ${IMAGE_AUGMENTATION_MODEL}
    comprehension_api_endpoint: ${IMAGE_COMPREHENSION_BASE_URL}
    comprehension_api_key: ${IMAGE_COMPREHENSION_API_KEY}
    comprehension_model: ${IMAGE_COMPREHENSION_MODEL}
    description: >-
      Unified visual media tool. operation=generate creates a new
      image from prompt; operation=edit modifies uploaded imageRef
      with prompt; operation=analyze answers questions about imageRef,
      image_url, videoRef, or video_url. Pass user_id from [IDENTITY]
      for every generate/edit/analyze call so generated image outputs
      are owned by the authenticated user. Image outputs are markdown
      refs and must be forwarded verbatim.
    redis_url: ${REDIS_URL}
    image_timeout: 120
    comprehension_timeout: 120
    verbose: true
  domain_retriever_tool:
    _type: domain_retriever
    description: >-
      Search curated knowledge domains. Args: query and domain, where
      domain is nvidia, semianalysis, kubernetes, veterinarian, or
      mentalhealth. Returns reranked passages with metadata. Use for
      established reference; use curated_feed_search_tool or
      serpapi_search_tool for current events.
    uri: ${MILVUS_URI}
    embedding_model: milvus_embedder
    database_name: default
    content_field: text
    vector_field: vector
    top_k: 10
    use_reranker: true
    reranker_api_key: ${RERANKER_API_KEY}
    reranker_endpoint: ${RERANKER_BASE_URL}
    reranker_model: ${RERANKER_MODEL}
    reranker_top_n: 5
    domain_collections:
      nvidia: nvidia
      semianalysis: semianalysis
      kubernetes: kubernetes
      veterinarian: vetpartner
      mentalhealth: mentalhealth
    verbose: true
  user_document_tool:
    _type: nat_nv_ingest
    chunk_overlap: 150
    chunk_size: 1024
    default_collection_name: user_uploads
    description: >-
      Ingest or search user-uploaded documents. operation=ingest
      accepts documentRef or documentRefs plus username. operation=search
      accepts query plus username. collection_name is optional. Shared
      allow-listed names (nvidia, semianalysis, kubernetes, vetpartner,
      mentalhealth) are used exactly; private arbitrary names are scoped
      to the authenticated user. Shared and user-scoped collections live
      in the same Milvus database; pass collection_scope and provenance
      when ingesting so shared-corpus writes are auditable.
    milvus_uri: ${MILVUS_URI}
    minio_access_key: ${MINIO_ACCESS_KEY}
    minio_endpoint: ${MINIO_ENDPOINT}
    minio_secret_key: ${MINIO_SECRET_KEY}
    minio_bucket: nv-ingest
    nv_ingest_host: ${NV_INGEST_HOST}
    nv_ingest_port: ${NV_INGEST_PORT}
    redis_url: ${REDIS_URL}
    # Concurrency — keep VDB uploads serial per backend worker. NV-Ingest's
    # Milvus upload path can wedge when several documents write to one
    # collection concurrently.
    batch_concurrency: 1
    worker_pool_size: 16
    max_documents_per_batch: 20
    # Robustness
    redis_socket_timeout: 30
    redis_connect_timeout: 5
    ingest_timeout_seconds: 300
    ingest_max_retries: 2
    ingest_retry_delay: 1.0
    # Image pipeline — filter noise images by default. Captioning is opt-in;
    # leave caption_* unset until a VLM endpoint is provisioned.
    enable_image_filter: true
    enable_captioning: false
    # V2 API + server-side PDF chunking. Flip use_v2_api=true once the
    # NV-Ingest deployment advertises V2 support.
    use_v2_api: false
    pdf_pages_per_chunk: 32
    extract_method: pdfium
    embedder_name: milvus_embedder
    content_field: text
    database_name: default
    distance_cutoff: 1.2
    reranker_api_key: ${RERANKER_API_KEY}
    reranker_endpoint: ${RERANKER_BASE_URL}
    reranker_model: ${RERANKER_MODEL}
    reranker_top_n: 5
    top_k: 10
    use_reranker: true
    vector_field: vector
    verbose: true
  curated_feed_search_tool:
    _type: rss_feed
    description: >-
      Search curated RSS feeds for recent, source-specific items.
      Args: query and optional feed_scope. Use feed_scope="auto" when
      the best source is unclear. Available scopes: nvidia_blog for
      NVIDIA corporate/product news, AI, GPUs, data center, robotics,
      gaming, and company stories; nvidia_developer for NVIDIA
      technical developer content, SDKs, CUDA, inference, training,
      acceleration, and implementation guides; nvidia_newsroom for
      official NVIDIA press releases, partnerships, earnings-adjacent
      announcements, executive statements, and launch announcements;
      semianalysis for AI infrastructure, semiconductors, GPUs,
      datacenters, market analysis, and deep industry analysis;
      npr_news for general US/world news, politics, culture, health,
      science, and public-interest reporting; nomadicmatt for budget
      travel, destination guides, itineraries, travel planning, and
      travel tips; openai_news for official OpenAI product, research,
      model, safety, policy, and company updates; huggingface for
      Hugging Face models, datasets, libraries, Spaces, open-source ML,
      and community AI updates; mit_ai_review for MIT Technology
      Review artificial intelligence coverage, AI research, policy,
      industry impact, and AI society issues; mit_culture_review for
      MIT Technology Review culture coverage, internet culture, media,
      society, and technology's human impact; mit_computing_review for
      MIT Technology Review computing coverage, software, chips,
      cybersecurity, quantum, infrastructure, and computing trends.
      Returns the scraped top-ranked item. Use serpapi_search_tool for
      sources outside this feed set or when broad web coverage is
      needed.
    feeds:
      nvidia_blog: https://feeds.feedburner.com/nvidiablog
      nvidia_developer: https://developer.nvidia.com/blog/feed
      nvidia_newsroom: https://nvidianews.nvidia.com/releases.xml
      semianalysis: https://newsletter.semianalysis.com/feed
      npr_news: https://feeds.npr.org/1004/rss.xml
      nomadicmatt: https://www.nomadicmatt.com/feed/
      openai_news: https://openai.com/news/rss.xml
      huggingface: https://huggingface.co/blog/feed.xml
      mit_ai_review: https://www.technologyreview.com/topic/artificial-intelligence/feed/
      mit_culture_review: https://www.technologyreview.com/topic/culture/feed/
      mit_computing_review: https://www.technologyreview.com/topic/computing/feed/
    max_entries: 5
    reranker_api_key: ${RERANKER_API_KEY}
    reranker_endpoint: ${RERANKER_BASE_URL}
    reranker_model: ${RERANKER_MODEL}
    reranker_max_passage_tokens: 192
    reranker_max_total_tokens: 7000
    verbose: true
  vtt_interpreter_tool:
    _type: vtt_interpreter
    api_endpoint: ${DEFAULT_LLM_MODEL_BASE_URL}
    model: ${DEFAULT_LLM_MODEL_MODEL}
    api_key: ${DEFAULT_LLM_MODEL_API_KEY}
    description: >-
      Process VTT or SRT meeting transcripts. Summarize, extract
      action items, answer questions, or produce structured notes.
      Trigger: user pastes or references a transcript. Args:
      transcript_text, optional user_instructions. Returns:
      processed text. Fails when: content is not valid VTT/SRT or
      LLM endpoint errors.
    timeout: 120
    verbose: true
  content_distiller_tool:
    _type: content_distiller
    fast_llm_name: distill_llm
    llm_name: reasoning_llm
    max_input_chars: 100000
    max_output_tokens: 4096
    temperature: 0.1
    wrapper_type: LANGCHAIN
    enabled_operations:
      - distill_content
    description: >-
      Condense verbose tool outputs. Trigger: tool output exceeds
      ~5000 tokens; for shorter outputs incorporate directly. Args:
      content, optional focus, max_words, and output_format. Returns:
      distilled text. Fails when: input exceeds 100000 chars.
    verbose: true
  user_interaction_tool:
    _type: user_interaction
    max_options: 6
    redis_url: ${REDIS_URL}
    approval_ttl_seconds: 300
    enabled_operations:
      - clarify
      - confirm_action
      - delete_memory_guarded
    description: >-
      Structured user I/O. clarify (ask with selectable options),
      confirm_action (approval-token request before destructive or
      irreversible actions: k8s mutate, GitHub write, memory delete),
      delete_memory_guarded (requires approval_token). Args depend on
      operation. Returns: formatted prompt or guarded action result.
      Fails when: options exceed 6 entries or approval is
      missing/expired.
    verbose: true
  ops_confirmation_tool:
    _type: user_interaction
    max_options: 6
    redis_url: ${REDIS_URL}
    approval_ttl_seconds: 300
    enabled_operations:
      - confirm_action
    description: >-
      Confirmation-only tool for ops_agent. Request explicit user
      confirmation before destructive Kubernetes operations or GitHub
      writes and return an approval token scoped to the requested
      mutation.
    verbose: true
  mas_optimizer_tool:
    _type: mas_optimizer
    sas_accuracy_threshold: 0.45
    decomposability_threshold: 0.35
    tool_count_threshold: 12
    default_user_id: ${DAEDALUS_DEFAULT_USER:-anonymous}
    drift_keywords:
      - vision language
      - VLM
      - Qwen3-VL
      - image model
    required_keywords:
      - MAS
      - verifier
      - capability gate
      - orchestrat
      - decomposab
    verbosity_ceiling: 2000
    enabled_operations:
      - mas_evaluate
    description: >-
      Architecture router. mas_evaluate decides SAS vs MAS and names a
      skill for rare multi-agent candidates. Trigger only for explicit
      MAS requests, structured multi-source synthesis, or broad
      exploratory research across independent sources. Args:
      task_description, active_tool_names, optional memory_results with
      explicit SAS routing outcome calibration. Returns: routing verdict,
      architecture type, skill_name, routing_basis, and matched_signals.
      Fails when: task_description is under 8 chars.
    verbose: true
  serpapi_search_tool:
    _type: serpapi_search
    description: >-
      Google web search for topics outside Daedalus knowledge bases.
      Trigger: "search", "look up", "latest news", topics not
      covered by nvidia/semianalysis/kubernetes/vet/mentalhealth
      retrievers. If the user provides an actual URL, use the webscrape_tool.
      Args: query, optional time_period ("qdr:h"=hour,
      "qdr:d"=day, "qdr:w"=week, "qdr:m"=month, "qdr:y"=year),
      optional search_type (organic, news, images, shopping).
      Returns: ranked URLs with snippets. Fails when: SERPAPI_KEY
      missing or rate-limited.
    verbose: true
  exa_internet_search_tool:
    _type: exa_internet_search
    max_results: 5
    search_type: auto
    livecrawl: fallback
    max_content_length: 10000
    description: >-
      Semantic internet search using Exa. Trigger: research questions
      outside curated retrievers where source text and relevant passages
      matter more than Google SERP widgets. Prefer serpapi_search_tool
      for news cards, images, shopping, or quick URL discovery. Args:
      question. Returns: source URLs with extracted text. Fails softly
      when EXA_API_KEY is missing.
    verbose: true
  webscrape_tool:
    _type: webscrape
    allowed_schemes:
      - http
      - https
    browser_timeout: 60
    description: >-
      Fetch ONE known URL and convert to markdown. Uses headless
      browser fallback for JS or bot-protected sites. Trigger: you
      already have the URL (from serpapi, an RSS entry, or the
      user). Args: url (http/https only). Returns: markdown up to
      20000 tokens. Fails when: URL unknown (use serpapi_search_tool
      first), non-http scheme, or 60s timeout.
    max_output_tokens: 20000
    respect_robots_txt: false
    timeout: 60
    use_browser_fallback: true
    user_agent: daedalus-webscraper/0.1.0
    verbose: true
  source_verifier_tool:
    _type: source_verifier
    fast_llm_name: distill_llm
    llm_name: reasoning_llm
    max_source_chars: 80000
    max_output_tokens: 4096
    temperature: 0.0
    fetch_timeout: 20.0
    max_fetch_tokens: 20000
    wrapper_type: LANGCHAIN
    enabled_operations:
      - verify_claim
    description: >-
      Verify citations. verify_claim(claim, source_url) checks one
      exact final claim against one source; do not use it for
      speculative candidate claims, placeholder URLs, or search-snippet
      claims. For latest/current claims, prefer official latest/ docs
      pages, release indexes, or package indexes; a version-specific
      release note alone is not proof of latest/current. REQUIRED
      before every add_memory with type=finding or type=project_update.
      Returns: supported | partially_supported | unsupported |
      source_unreachable, with evidence. Fails when: source_url
      malformed or unreachable.
    verbose: true
general:
  front_end:
    _type: fastapi
    enable_interactive_extensions: true
    max_running_async_jobs: 8
    dask_workers: processes
    dask_threads_per_worker: 1
    dask_worker_memory_limit: '6GiB'
    dask_log_level: WARNING
    step_adaptor:
      mode: custom
      custom_event_types:
        - LLM_START
        - LLM_END
        - TOOL_START
        - TOOL_END
        - WORKFLOW_START
        - WORKFLOW_END
        - TASK_START
        - TASK_END
        - TTC_START
        - TTC_END
        - FUNCTION_START
        - FUNCTION_END
        - CUSTOM_START
        - CUSTOM_END
        - SPAN_START
        - SPAN_END
    # NAT async jobs use a pod-local Dask cluster; keep a single backend
    # process per pod so requests don't bounce across isolated local schedulers.
    workers: 1
  telemetry:
    tracing:
      phoenix:
        _type: phoenix
        endpoint: ${DAEDALUS_PHOENIX_ENDPOINT}
        project: ${PHOENIX_PROJECT_NAME}
