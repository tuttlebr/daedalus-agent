    description: 'Augments or modifies existing images based on text prompts. Use when a user uploads an image and requests edits, additions, or transformations. CRITICAL: The user''s message will contain ''ImageRef: {JSON}'' with imageId and sessionId. Parse this JSON and pass it as the imageRef parameter. Example: If user message contains ''ImageRef: {"imageId": "abc123", "sessionId": "xyz789", "mimeType": "image/png"}'', call augment_image_simple(prompt=''user request'', imageRef={''imageId'': ''abc123'', ''sessionId'': ''xyz789'', ''mimeType'': ''image/png''}). The function automatically fetches the image from Redis and returns the augmented result as markdown. Optional parameters: steps (int, default 30), seed (int, default 42), cfg_scale (float, 1.0-9.0).'
