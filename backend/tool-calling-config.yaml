        tools:
          - dynamo_mcp_server
          - openshell_mcp_server
          - aistore_mcp_server
          - aiperf_mcp_server
          - nvcf_mcp_server
          - dsx_mcp_server
        default_enabled: true
        requires_auth: false
      - id: uploaded_documents
        name: Uploaded Documents
        description: Authenticated uploaded documents and shared upload collections.
        tools:
          - user_document_tool
        default_enabled: false
