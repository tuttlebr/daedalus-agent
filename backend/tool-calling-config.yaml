functions:
  research_agent:
    _type: tool_calling_agent
    llm_name: reasoning_llm
    max_iterations: 20
    handle_tool_errors: true
    verbose: true
    return_direct:
      - ops_confirmation_tool
    tool_names:
      - domain_retriever_tool
      - curated_feed_search_tool
      - serpapi_search_tool
      - webscrape_tool
      - content_distiller_tool
      - source_verifier_tool
      - current_datetime_tool
    description: >-
      Run a research task. Input: a one-sentence research question or
      "brief me on X". Triggers: "research", "summarize", "what's the
      latest", "compare", "state of", any knowledge-gathering or
      briefing. Returns: distilled findings with source URLs. Do NOT
      use for live ops (ops_agent), image/video/transcripts
      (media_agent), or user document search (user_data_agent).
    system_prompt: |
      You are Daedalus's research specialist. Your job: answer
      research questions with high signal and low token cost.

      Source priority:
      1. domain_retriever_tool for established nvidia,
         semianalysis, kubernetes, veterinarian, or mentalhealth
         reference.
      2. curated_feed_search_tool when the query is about recent
         curated sources ("latest", "this week", "current").
      3. serpapi_search_tool for topics outside the retrievers.
      4. webscrape_tool only when you already have a specific URL.

      Efficiency:
      - Run independent queries in parallel.
      - If a tool output exceeds ~5000 tokens, route it through
        content_distiller_tool before incorporating.
      - Default to at most two search/retrieval calls before synthesis
        unless the user asks for a broad survey or the first sources
        conflict.
      - For latest/current version questions, first use an official
        latest/ docs landing page, release index, or package index
        that explicitly labels the current/latest version. Do not use
        a version-specific release note as proof of "latest" unless
        that page itself states it is latest/current.
      - For memory-destined findings, gather evidence first, choose
        one minimal final claim supported by the strongest official or
        primary source, then call source_verifier_tool.verify_claim
        once. Do not verify speculative candidate claims.
      - Never call source_verifier_tool with placeholder URLs such as
        example.com or with unsupported claims copied from search
        snippets.
      - If no exact supported claim exists, state the uncertainty in
        the answer and do not store a finding.

      Output: concise bullet findings with [source: url] citations.
      No greetings, no filler. The parent workflow handles voice.
  ops_agent:
    _type: tool_calling_agent
    llm_name: tool_calling_llm
    max_iterations: 15
    handle_tool_errors: true
    verbose: true
    return_direct:
      - user_interaction_tool
    tool_names:
      - github_mcp_server
      - k8s_mcp_server
      - dynamo_mcp_server
      - dsx_mcp_server
      - domain_retriever_tool
      - ops_confirmation_tool
    description: >-
      Execute ops against GitHub, Kubernetes, or Dynamo docs. Input:
      imperative instruction ("list prs for org X", "scale deployment
      foo to 3", "describe pod bar in namespace baz", "search dynamo
      docs for Y"). Triggers: repo, PR, issue, release, label,
      branch, commit, pod, deployment, namespace, helm, kubectl,
      dynamo docs. Returns: action result or error. Fails when: task
      mixes unrelated concerns or is purely a research question.
    system_prompt: |
      You are Daedalus's ops specialist. You execute, not advise.

      ACTION BIAS: when a tool covers the action, CALL IT. Do not
      explain, do not list tools, do not offer scripts.

      Confirmation gate: call ops_confirmation_tool.confirm_action
      BEFORE any destructive k8s op (delete, patch that removes
      fields, scale-to-zero, rollback that loses data, helm
      uninstall, helm rollback) and BEFORE any GitHub write (push,
      merge, close/reopen issue or PR, delete branch). Reads and
      non-destructive writes proceed directly. For k8s/GitHub MCP
      mutations, call confirm_action with user_id from [IDENTITY],
      action_type="mcp_mutation", and target set to the namespace,
      repo, or object being changed. Pass the returned approval_token
      into the MCP tool call.

      If a tool returns an MCP application error (e.g. "not found",
      "missing parameter"), report it plainly. Do NOT retry blindly.

      Output: concise command summary + outcome. Skip preamble.
  media_agent:
    _type: tool_calling_agent
    llm_name: default_llm
    max_iterations: 6
    handle_tool_errors: true
    verbose: true
    tool_names:
      - visual_media_tool
      - vtt_interpreter_tool
    description: >-
      Handle media tasks: generate/edit/analyze images or video, or
      interpret VTT/SRT meeting transcripts. Input: task description
      plus any imageRef, videoRef, or transcript_text. Triggers:
      "draw", "generate image", "edit image", "describe image",
      "OCR", "summarize meeting", "action items". Returns: markdown
      image ref (forwarded verbatim) or text analysis. Fails when: an
      image/video ref is needed but absent.
    system_prompt: |
      You handle image and transcript tasks. Use visual_media_tool for image generation, image editing, and image/video analysis. For uploaded imageRef/videoRef values that include userId, pass user_id from [IDENTITY]. Use vtt_interpreter_tool for VTT/SRT transcripts. When visual_media_tool returns a markdown image ref, forward it VERBATIM. Generate faithfully to user intent; for literal requests (diagram, chart, product photo) do not inject an artistic style.
  user_data_agent:
    _type: tool_calling_agent
    llm_name: default_llm
    max_iterations: 6
    handle_tool_errors: true
    verbose: true
    tool_names:
      - user_document_tool
    description: >-
      Work with the authenticated user's private data: uploaded
      documents, Gmail, and Google Calendar. Input: document ingest/search
      requests, email questions, draft requests, or schedule/calendar
      questions. Triggers: user uploaded a file, references "my doc",
      "the PDF I uploaded", "my email", "Gmail", "inbox", "draft",
      "my calendar", "schedule", "events", or "free time". Returns:
      document passages, email/thread results, calendar events, or
      availability. Do NOT use as a substitute for get_memory or topical
      retrievers.
    system_prompt: |
      You manage the authenticated user's private documents, Gmail, and
      Google Calendar.

      Flow:
      - If the user just uploaded and asks about it without prior
        ingestion, call user_document_tool with operation="ingest"
        and username from [IDENTITY], then search.
      - For later searches, call user_document_tool with
        operation="search", query, and username from [IDENTITY].
      - Omit collection_name unless the user explicitly names one; the
        tools derive the same per-user default collection from username.
      - For Gmail questions, use search_threads before get_thread unless
        the user gave a specific thread id. Use Gmail search syntax when
        the user provides senders, dates, labels, or keywords.
      - For Google Calendar questions, use list_calendars when the target
        calendar is unclear, list_events/get_event for event lookups, and
        suggest_time for free/busy or scheduling requests.
      - Never substitute this agent for general knowledge retrieval.
        Those requests belong to research_agent.
  agent_skills_tool:
    _type: agent_skills
    skills_directory: /skills
    allow_script_execution: false
    enabled_operations:
      - load_skill
    allowed_script_extensions:
      - .py
      - .sh
    script_timeout: 120
    description: >-
      Load agent skills in /skills. Only load_skill is exposed in
      backend production config; script execution is disabled.
      Trigger: user names a skill, task matches a skill's purpose, or
      you need a procedure you don't yet know. Args: skill_name and
      optional resource. Returns: skill instructions or resource
      content. Fails when: skill not found.
    verbose: true
  add_memory:
    _type: add_memory
    description: >-
      Store a durable user fact, preference, project context, or
      verified finding as a single declarative sentence. Args: memory
      (plain text, NEVER JSON), user_id (from [IDENTITY]), optional
      key_value_pairs. Returns: memory id. Rules: (1) for
      type=finding or type=project_update, call
      source_verifier_tool.verify_claim on the exact final memory
      sentence first; store only if verdict=supported. On
      partially_supported, unsupported, or source_unreachable, do not
      store unless you rewrite the memory to only the supported
      subclaim and verify that rewritten sentence as supported; (2) on
      conflict with a prior memory, add a NEW entry that names
      both positions, never overwrite or silently supersede. Fails
      when: memory empty, user_id missing, or a finding lacks a prior
      verify_claim pass.
    memory: redis_memory
    verbose: true
  current_datetime_tool:
    _type: current_datetime
    description: >-
      Get current date, time, and timezone. Trigger: any
      time-relative query ("today", "this week", "how old is X").
      Args: none. Returns: ISO datetime + timezone. Fails when:
      never.
    verbose: true
  delete_memory:
    _type: delete_memory
    description: >-
      Permanently delete ALL memories for a user. Destructive,
      irreversible bulk wipe. Trigger: user explicitly says
      "delete/erase/wipe my memories". Args: user_id. Returns:
      deletion count. Fails when: called without prior
      user_interaction_tool.confirm_action (you MUST confirm first).
    memory: redis_memory
    verbose: true
  get_memory:
    _type: get_memory
    description: >-
      Semantic search over this user's memories. Trigger: start of
      every substantive request (parallel with mas_evaluate), daily
      briefings (FIRST, awaited), "remember when" / "what you know
      about me" / personalized asks. Args: user_id, query, top_k
      (default 5). Returns: ranked entries with metadata. Fails:
      never; anonymous with no prior memories returns an empty list.
    memory: redis_memory
    top_k: 5
    verbose: true
  visual_media_tool:
    _type: visual_media
    generation_api_endpoint: ${IMAGE_GENERATION_BASE_URL}
    generation_api_key: ${IMAGE_GENERATION_API_KEY}
    generation_model: ${IMAGE_GENERATION_MODEL}
    edit_api_endpoint: ${IMAGE_AUGMENTATION_BASE_URL}
    edit_api_key: ${IMAGE_AUGMENTATION_API_KEY}
    edit_model: ${IMAGE_AUGMENTATION_MODEL}
    comprehension_api_endpoint: ${IMAGE_COMPREHENSION_BASE_URL}
    comprehension_api_key: ${IMAGE_COMPREHENSION_API_KEY}
    comprehension_model: ${IMAGE_COMPREHENSION_MODEL}
    description: >-
      Unified visual media tool. operation=generate creates a new
      image from prompt; operation=edit modifies uploaded imageRef
      with prompt; operation=analyze answers questions about imageRef,
      image_url, videoRef, or video_url. Pass user_id from [IDENTITY]
      when using uploaded user-scoped media refs. Image outputs are
      markdown refs and must be forwarded verbatim.
    redis_url: ${REDIS_URL}
    image_timeout: 120
    comprehension_timeout: 120
    verbose: true
  domain_retriever_tool:
    _type: domain_retriever
    description: >-
      Search curated knowledge domains. Args: query and domain, where
      domain is nvidia, semianalysis, kubernetes, veterinarian, or
      mentalhealth. Returns reranked passages with metadata. Use for
      established reference; use curated_feed_search_tool or
      serpapi_search_tool for current events.
    uri: ${MILVUS_URI}
    embedding_model: milvus_embedder
    database_name: default
    content_field: text
    vector_field: vector
    top_k: 10
    use_reranker: true
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    reranker_top_n: 5
    domain_collections:
      nvidia: nvidia
      semianalysis: semianalysis
      kubernetes: kubernetes
      veterinarian: vetpartner
      mentalhealth: mentalhealth
    verbose: true
  user_document_tool:
    _type: nat_nv_ingest
    chunk_overlap: 150
    chunk_size: 1024
    default_collection_name: user_uploads
    description: >-
      Ingest or search user-uploaded documents. operation=ingest
      accepts documentRef or documentRefs plus username. operation=search
      accepts query plus username. collection_name is optional; when
      omitted, the tool derives a per-user collection from username.
    milvus_uri: ${MILVUS_URI}
    minio_access_key: ${MINIO_ACCESS_KEY}
    minio_endpoint: ${MINIO_ENDPOINT}
    minio_secret_key: ${MINIO_SECRET_KEY}
    minio_bucket: nv-ingest
    nv_ingest_host: ${NV_INGEST_HOST}
    nv_ingest_port: ${NV_INGEST_PORT}
    redis_url: ${REDIS_URL}:${REDIS_PORT}
    # Concurrency — batch_concurrency gates per-batch fan-out; keep conservative
    # to avoid thrashing the NV-Ingest GPU/embedder pool.
    batch_concurrency: 4
    worker_pool_size: 16
    max_documents_per_batch: 20
    # Robustness
    redis_socket_timeout: 30
    redis_connect_timeout: 5
    ingest_max_retries: 2
    ingest_retry_delay: 1.0
    # Image pipeline — filter noise images by default. Captioning is opt-in;
    # leave caption_* unset until a VLM endpoint is provisioned.
    enable_image_filter: true
    enable_captioning: false
    # V2 API + server-side PDF chunking. Flip use_v2_api=true once the
    # NV-Ingest deployment advertises V2 support.
    use_v2_api: false
    pdf_pages_per_chunk: 32
    extract_method: pdfium
    embedder_name: milvus_embedder
    content_field: text
    database_name: default
    distance_cutoff: 1.2
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    reranker_top_n: 5
    top_k: 10
    use_reranker: true
    vector_field: vector
    verbose: true
  curated_feed_search_tool:
    _type: rss_feed
    description: >-
      Search curated RSS feeds for recent NVIDIA, SemiAnalysis, and
      Karpathy items. Args: query and optional feed_scope ("auto",
      "nvidia_blog", "nvidia_developer", "nvidia_newsroom",
      "semianalysis", "karpathy_bearblog", "karpathy_github").
      Returns the scraped top-ranked item. Use serpapi_search_tool for
      sources outside this feed set.
    feeds:
      nvidia_blog: https://feeds.feedburner.com/nvidiablog
      nvidia_developer: https://developer.nvidia.com/blog/feed
      nvidia_newsroom: https://nvidianews.nvidia.com/releases.xml
      semianalysis: https://newsletter.semianalysis.com/feed
      karpathy_bearblog: https://karpathy.bearblog.dev/feed/
      karpathy_github: https://karpathy.github.io/feed.xml
    max_entries: 5
    enabled_operations:
      - search_rss
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: true
  vtt_interpreter_tool:
    _type: vtt_interpreter
    api_endpoint: ${DEFAULT_LLM_MODEL_BASE_URL}
    model: ${DEFAULT_LLM_MODEL_MODEL}
    api_key: ${DEFAULT_LLM_MODEL_API_KEY}
    description: >-
      Process VTT or SRT meeting transcripts. Summarize, extract
      action items, answer questions, or produce structured notes.
      Trigger: user pastes or references a transcript. Args:
      transcript_text, optional user_instructions. Returns:
      processed text. Fails when: content is not valid VTT/SRT or
      LLM endpoint errors.
    timeout: 120
    verbose: true
  content_distiller_tool:
    _type: content_distiller
    fast_llm_name: distill_llm
    llm_name: reasoning_llm
    max_input_chars: 100000
    max_output_tokens: 4096
    temperature: 0.1
    wrapper_type: LANGCHAIN
    enabled_operations:
      - distill_content
    description: >-
      Condense verbose tool outputs. Trigger: tool output exceeds
      ~5000 tokens; for shorter outputs incorporate directly. Args:
      content, optional focus, max_words, and output_format. Returns:
      distilled text. Fails when: input exceeds 100000 chars.
    verbose: true
  user_interaction_tool:
    _type: user_interaction
    max_options: 6
    redis_url: ${REDIS_URL}:${REDIS_PORT}
    approval_ttl_seconds: 300
    enabled_operations:
      - clarify
      - confirm_action
      - delete_memory_guarded
    description: >-
      Structured user I/O. clarify (ask with selectable options),
      confirm_action (approval-token request before destructive or
      irreversible actions: k8s mutate, GitHub write, memory delete),
      delete_memory_guarded (requires approval_token). Args depend on
      operation. Returns: formatted prompt or guarded action result.
      Fails when: options exceed 6 entries or approval is
      missing/expired.
    verbose: true
  ops_confirmation_tool:
    _type: user_interaction
    max_options: 6
    redis_url: ${REDIS_URL}:${REDIS_PORT}
    approval_ttl_seconds: 300
    enabled_operations:
      - confirm_action
    description: >-
      Confirmation-only tool for ops_agent. Request explicit user
      confirmation before destructive Kubernetes operations or GitHub
      writes and return an approval token scoped to the requested
      mutation.
    verbose: true
  mas_optimizer_tool:
    _type: mas_optimizer
    sas_accuracy_threshold: 0.45
    decomposability_threshold: 0.35
    tool_count_threshold: 12
    default_user_id: ${DAEDALUS_DEFAULT_USER:-anonymous}
    drift_keywords:
      - vision language
      - VLM
      - Qwen3-VL
      - image model
    required_keywords:
      - MAS
      - verifier
      - capability gate
      - orchestrat
      - decomposab
    verbosity_ceiling: 2000
    enabled_operations:
      - mas_evaluate
    description: >-
      Architecture router. mas_evaluate decides SAS vs MAS and names a
      skill for rare multi-agent candidates. Trigger only for explicit
      MAS requests, structured multi-source synthesis, or broad
      exploratory research across independent sources. Args:
      task_description, active_tool_names, optional memory_results with
      explicit SAS routing outcome calibration. Returns: routing verdict,
      architecture type, skill_name, routing_basis, and matched_signals.
      Fails when: task_description is under 8 chars.
    verbose: true
  serpapi_search_tool:
    _type: serpapi_search
    description: >-
      Google web search for topics outside Daedalus knowledge bases.
      Trigger: "search", "look up", "latest news", topics not
      covered by nvidia/semianalysis/kubernetes/vet/mentalhealth
      retrievers. Args: query, optional time_period ("qdr:h"=hour,
      "qdr:d"=day, "qdr:w"=week, "qdr:m"=month, "qdr:y"=year),
      optional search_type (organic, news, images, shopping).
      Returns: ranked URLs with snippets. Fails when: SERPAPI_KEY
      missing or rate-limited (then use webscrape_tool if URL is
      known).
    verbose: true
  webscrape_tool:
    _type: webscrape
    allowed_schemes:
      - http
      - https
    browser_timeout: 120
    description: >-
      Fetch ONE known URL and convert to markdown. Uses headless
      browser fallback for JS or bot-protected sites. Trigger: you
      already have the URL (from serpapi, an RSS entry, or the
      user). Args: url (http/https only). Returns: markdown up to
      20000 tokens. Fails when: URL unknown (use serpapi_search_tool
      first), non-http scheme, or 120s timeout.
    max_output_tokens: 20000
    respect_robots_txt: false
    timeout: 120
    use_browser_fallback: true
    user_agent: daedalus-webscraper/0.1.0
    verbose: true
  source_verifier_tool:
    _type: source_verifier
    fast_llm_name: distill_llm
    llm_name: reasoning_llm
    max_source_chars: 80000
    max_output_tokens: 4096
    temperature: 0.0
    fetch_timeout: 30.0
    max_fetch_tokens: 20000
    wrapper_type: LANGCHAIN
    enabled_operations:
      - verify_claim
    description: >-
      Verify citations. verify_claim(claim, source_url) checks one
      exact final claim against one source; do not use it for
      speculative candidate claims, placeholder URLs, or search-snippet
      claims. For latest/current claims, prefer official latest/ docs
      pages, release indexes, or package indexes; a version-specific
      release note alone is not proof of latest/current. REQUIRED
      before every add_memory with type=finding or type=project_update.
      Returns: supported | partially_supported | unsupported |
      source_unreachable, with evidence. Fails when: source_url
      malformed or unreachable.
    verbose: true
general:
  front_end:
    _type: fastapi
    enable_interactive_extensions: true
    max_running_async_jobs: 8
    dask_workers: processes
    dask_threads_per_worker: 1
    dask_worker_memory_limit: "6GiB"
    dask_log_level: WARNING
    step_adaptor:
      mode: custom
      custom_event_types:
        - LLM_START
        - LLM_END
        - TOOL_START
        - TOOL_END
        - WORKFLOW_START
        - WORKFLOW_END
        - TASK_START
        - TASK_END
        - TTC_START
        - TTC_END
        - FUNCTION_START
        - FUNCTION_END
        - CUSTOM_START
        - CUSTOM_END
        - SPAN_START
        - SPAN_END
    # NAT async jobs use a pod-local Dask cluster; keep a single backend
    # process per pod so requests don't bounce across isolated local schedulers.
    workers: 1
  telemetry:
    tracing:
      phoenix:
        _type: phoenix
        endpoint: ${DAEDALUS_PHOENIX_ENDPOINT}
        project: ${PHOENIX_PROJECT_NAME}
