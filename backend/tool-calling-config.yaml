functions:
  agent_skills_tool:
    _type: agent_skills
    skills_directory: /skills
    allow_script_execution: false
    enabled_operations:
      - list_skills
      - load_skill
    allowed_script_extensions:
      - .py
      - .sh
    script_timeout: 120
    description: >-
      List or load agent skills in /skills. list_skills returns available
      skill names/descriptions; load_skill returns skill instructions or
      bundled resources. Script execution is disabled in production.
      Trigger: user names a skill, task matches a skill's purpose, or you
      need a procedure you don't yet know. Args: optional query for listing;
      skill_name and optional resource for loading. Returns: skill metadata,
      instructions, or resource content. Fails when: skill not found or
      requested resource path escapes skill dir.
    verbose: true
  add_memory:
    _type: daedalus_add_memory
    description: >-
      Store a durable user fact, preference, project context, or
      verified finding as a single declarative sentence. Trigger:
      explicit user requests like "remember", "my name is", "call me",
      or "note that"; call this directly without confirmation for those
      requests. Args: memory (plain text, NEVER JSON), optional tags,
      metadata, and key_value_pairs. The backend derives user identity
      from the authenticated request; do not pass user_id. Returns: memory id.
      Rules: (1) for
      type=finding or type=project_update, call
      source_verifier_tool.verify_claim on the exact final memory
      sentence first; store only if verdict=supported. On
      partially_supported, unsupported, or source_unreachable, do not
      store unless you rewrite the memory to only the supported
      subclaim and verify that rewritten sentence as supported; (2) on
      conflict with a prior memory, add a NEW entry that names
      both positions, never overwrite or silently supersede. Fails
      when: memory empty, authenticated identity is missing or invalid,
      or a finding lacks a prior verify_claim pass.
    memory: redis_memory
    verbose: true
  current_datetime_tool:
    _type: current_datetime
    description: >-
      Get current date, time, and timezone. Trigger: any
      time-relative query ("today", "this week", "how old is X").
      Args: none. Returns: ISO datetime + timezone. Fails when:
      never.
    verbose: true
  delete_memory:
    _type: delete_memory
    description: >-
      Permanently delete ALL memories for a user. Destructive,
      irreversible bulk wipe. Trigger: user explicitly says
      "delete/erase/wipe my memories". Args: user_id. Returns:
      deletion count. Fails when: called without prior
      user_interaction_tool.confirm_action (you MUST confirm first).
    memory: redis_memory
    verbose: true
  get_memory:
    _type: daedalus_get_memory
    description: >-
      Semantic search over this user's memories. Trigger: daily briefings
      (FIRST, awaited), "remember when" / "what you know about me" /
      personalized asks, or when prior preferences or project context
      would materially sharpen the answer. Args: query, top_k (default 5).
      Daily briefing/summary queries are server-expanded and searched with at
      least top_k=12 even if a smaller top_k is supplied, so profile directives
      such as required live cards and read-only Kubernetes status are available.
      The backend derives user identity from the authenticated request; do
      not pass user_id. Returns: ranked entries with metadata. Fails:
      missing or invalid authenticated identity returns an error.
    memory: redis_memory
    top_k: 16
    verbose: true
  visual_media_tool:
    _type: visual_media
    generation_api_endpoint: ${IMAGE_GENERATION_BASE_URL}
    generation_api_key: ${IMAGE_GENERATION_API_KEY}
    generation_model: ${IMAGE_GENERATION_MODEL}
    edit_api_endpoint: ${IMAGE_AUGMENTATION_BASE_URL}
    edit_api_key: ${IMAGE_AUGMENTATION_API_KEY}
    edit_model: ${IMAGE_AUGMENTATION_MODEL}
    comprehension_api_endpoint: ${IMAGE_COMPREHENSION_BASE_URL}
    comprehension_api_key: ${IMAGE_COMPREHENSION_API_KEY}
    comprehension_model: ${IMAGE_COMPREHENSION_MODEL}
    description: >-
      Unified visual media tool. operation=generate creates a new
      image from prompt; operation=edit modifies uploaded imageRef
      with prompt; operation=analyze answers questions about imageRef,
      image_url, videoRef, or video_url. Pass user_id from [IDENTITY]
      for every generate/edit/analyze call so generated image outputs
      are owned by the authenticated user. Image outputs are markdown
      refs and must be forwarded verbatim. Never use this tool for a
      daily summary or daily briefing unless the user explicitly asks
      for an image or video.
    redis_url: ${REDIS_URL}
    image_timeout: 120
    comprehension_timeout: 120
    verbose: true
  domain_retriever_tool:
    _type: domain_retriever
    description: >-
      Search curated knowledge domains. Args: query and domain, where
      domain is nvidia, semianalysis, kubernetes, veterinarian, or
      mentalhealth. Returns reranked passages with metadata. Use for
      established reference; use curated_feed_search_tool or
      perplexity_search_tool for current events.
    uri: ${MILVUS_URI}
    embedding_model: milvus_embedder
    database_name: default
    content_field: text
    vector_field: vector
    top_k: 16
    use_reranker: true
    reranker_api_key: ${RERANKER_API_KEY}
    reranker_endpoint: ${RERANKER_BASE_URL}
    reranker_model: ${RERANKER_MODEL}
    reranker_top_n: 5
    domain_collections:
      nvidia: nvidia
      semianalysis: semianalysis
      kubernetes: kubernetes
      veterinarian: vetpartner
      mentalhealth: mentalhealth
    verbose: true
  user_document_tool:
    _type: nat_nv_ingest
    chunk_overlap: 150
    chunk_size: 1024
    default_collection_name: user_uploads
    description: >-
      Ingest or search user-uploaded documents. operation=ingest
      accepts documentRef or documentRefs plus username. operation=search
      accepts query plus username. collection_name is optional. Shared
      allow-listed names (nvidia, semianalysis, kubernetes, vetpartner,
      mentalhealth) are used exactly; private arbitrary names are scoped
      to the authenticated user. Shared and user-scoped collections live
      in the same Milvus database; pass collection_scope and provenance
      when ingesting so shared-corpus writes are auditable.
    milvus_uri: ${MILVUS_URI}
    minio_access_key: ${MINIO_ACCESS_KEY}
    minio_endpoint: ${MINIO_ENDPOINT}
    minio_secret_key: ${MINIO_SECRET_KEY}
    minio_bucket: nv-ingest
    nv_ingest_host: ${NV_INGEST_HOST}
    nv_ingest_port: ${NV_INGEST_PORT}
    redis_url: ${REDIS_URL}
    # Concurrency — keep VDB uploads serial per backend worker. NV-Ingest's
    # Milvus upload path can wedge when several documents write to one
    # collection concurrently.
    batch_concurrency: 1
    worker_pool_size: 16
    max_documents_per_batch: 20
    # Robustness
    redis_socket_timeout: 30
    redis_connect_timeout: 5
    ingest_timeout_seconds: 300
    ingest_max_retries: 2
    ingest_retry_delay: 1.0
    # Image pipeline — filter noise images by default. Captioning is opt-in;
    # leave caption_* unset until a VLM endpoint is provisioned.
    enable_image_filter: true
    enable_captioning: false
    # V2 API + server-side PDF chunking. Flip use_v2_api=true once the
    # NV-Ingest deployment advertises V2 support.
    use_v2_api: false
    pdf_pages_per_chunk: 32
    extract_method: pdfium
    embedder_name: milvus_embedder
    content_field: text
    database_name: default
    distance_cutoff: 1.2
    reranker_api_key: ${RERANKER_API_KEY}
    reranker_endpoint: ${RERANKER_BASE_URL}
    reranker_model: ${RERANKER_MODEL}
    reranker_top_n: 5
    top_k: 16
    use_reranker: true
    vector_field: vector
    verbose: true
  curated_feed_search_tool:
    _type: rss_feed
    description: >-
      Search curated RSS feeds for recent, source-specific items.
      Args: query and optional feed_scope. Use feed_scope="auto" when
      the best source is unclear. Available scopes: nvidia_blog for
      NVIDIA corporate/product news, AI, GPUs, data center, robotics,
      gaming, and company stories; nvidia_developer for NVIDIA
      technical developer content, SDKs, CUDA, inference, training,
      acceleration, and implementation guides; nvidia_newsroom for
      official NVIDIA press releases, partnerships, earnings-adjacent
      announcements, executive statements, and launch announcements;
      semianalysis for AI infrastructure, semiconductors, GPUs,
      datacenters, market analysis, and deep industry analysis;
      npr_news for general US/world news, politics, culture, health,
      science, and public-interest reporting; nomadicmatt for budget
      travel, destination guides, itineraries, travel planning, and
      travel tips; openai_news for official OpenAI product, research,
      model, safety, policy, and company updates; huggingface for
      Hugging Face models, datasets, libraries, Spaces, open-source ML,
      and community AI updates; mit_ai_review for MIT Technology
      Review artificial intelligence coverage, AI research, policy,
      industry impact, and AI society issues; mit_culture_review for
      MIT Technology Review culture coverage, internet culture, media,
      society, and technology's human impact; mit_computing_review for
      MIT Technology Review computing coverage, software, chips,
      cybersecurity, quantum, infrastructure, and computing trends.
      Returns the scraped top-ranked item. Use perplexity_search_tool
      for sources outside this feed set or when
      broad web coverage is needed.
    feeds:
      nvidia_blog: https://feeds.feedburner.com/nvidiablog
      nvidia_developer: https://developer.nvidia.com/blog/feed
      nvidia_newsroom: https://nvidianews.nvidia.com/releases.xml
      semianalysis: https://newsletter.semianalysis.com/feed
      npr_news: https://feeds.npr.org/1004/rss.xml
      nomadicmatt: https://www.nomadicmatt.com/feed/
      openai_news: https://openai.com/news/rss.xml
      huggingface: https://huggingface.co/blog/feed.xml
      mit_ai_review: https://www.technologyreview.com/topic/artificial-intelligence/feed/
      mit_culture_review: https://www.technologyreview.com/topic/culture/feed/
      mit_computing_review: https://www.technologyreview.com/topic/computing/feed/
    max_entries: 5
    reranker_api_key: ${RERANKER_API_KEY}
    reranker_endpoint: ${RERANKER_BASE_URL}
    reranker_model: ${RERANKER_MODEL}
    reranker_max_passage_tokens: 192
    reranker_max_total_tokens: 7000
    verbose: true
  vtt_interpreter_tool:
    _type: vtt_interpreter
    api_endpoint: ${DEFAULT_LLM_MODEL_BASE_URL}
    model: ${DEFAULT_LLM_MODEL_MODEL}
    api_key: ${DEFAULT_LLM_MODEL_API_KEY}
    redis_url: ${REDIS_URL}
    description: >-
      Process VTT or SRT meeting transcripts. Summarize, extract
      action items, answer questions, or produce structured notes.
      Trigger: user uploads or references a meeting transcript
      ("summarize meeting", "action items", "meeting notes"). Args:
      for an uploaded transcript pass vtt_id and session_id (the tool
      fetches it from Redis — do not paste the transcript); for a
      pasted transcript pass transcript_text; optional
      user_instructions. Returns: processed markdown. Fails when:
      content is not valid VTT/SRT or the LLM endpoint errors.
    timeout: 120
    verbose: true
  content_distiller_tool:
    _type: content_distiller
    fast_llm_name: default_llm
    llm_name: default_llm
    max_input_chars: 100000
    max_output_tokens: 4096
    wrapper_type: LANGCHAIN
    enabled_operations:
      - distill_content
    description: >-
      Condense verbose tool outputs. Trigger: tool output exceeds
      ~5000 tokens; for shorter outputs incorporate directly. Args:
      content, optional focus, max_words, and output_format. Returns:
      distilled text. Fails when: input exceeds 100000 chars.
    verbose: true
  user_interaction_tool:
    _type: user_interaction
    max_options: 6
    redis_url: ${REDIS_URL}
    # F-014: approval tokens are scraped by the autonomous worker and re-injected
    # when a human approves from the dashboard, which can be minutes later. A 300s
    # TTL expired before approval, so the approved action silently never ran. Widen
    # to a realistic human-approval window. (Robust fix: re-mint a fresh token on
    # resume rather than reusing the paused run's token — tracked as a follow-up.)
    approval_ttl_seconds: 3600
    enabled_operations:
      - clarify
      - confirm_action
      - delete_memory_guarded
    description: >-
      Structured user I/O. clarify (ask with selectable options),
      confirm_action (approval-token request before destructive or
      irreversible actions: k8s mutate, memory delete),
      delete_memory_guarded (requires approval_token). Args depend on
      operation. Returns: formatted prompt or guarded action result.
      Fails when: options exceed 6 entries or approval is
      missing/expired.
    verbose: true
  research_plan_approval_tool:
    _type: user_interaction
    max_options: 8
    redis_url: ${REDIS_URL}
    approval_ttl_seconds: 3600
    enabled_operations:
      - confirm_research_plan
    description: >-
      Approval-only tool for deep research in the top-level workflow. Use
      confirm_research_plan(title, sections_json, source_strategy_json,
      estimated_tool_calls, risks, target) after planning and before
      expensive AIQ-style deep research starts. It presents the plan, selected
      sources, estimated cost/risk, and pauses for a yes/no or revision
      response. The backend derives user identity from the authenticated
      request.
    verbose: true
  ops_confirmation_tool:
    _type: user_interaction
    max_options: 6
    redis_url: ${REDIS_URL}
    # F-014: approval tokens are scraped by the autonomous worker and re-injected
    # when a human approves from the dashboard, which can be minutes later. A 300s
    # TTL expired before approval, so the approved action silently never ran. Widen
    # to a realistic human-approval window. (Robust fix: re-mint a fresh token on
    # resume rather than reusing the paused run's token — tracked as a follow-up.)
    approval_ttl_seconds: 3600
    enabled_operations:
      - confirm_action
    description: >-
      Confirmation-only tool for top-level Kubernetes operations. Request
      explicit user confirmation before destructive Kubernetes operations and
      return an approval token scoped to the requested mutation. Never use for
      add_memory, memory_update, or explicit "remember" requests.
    verbose: true
  perplexity_search_tool:
    _type: perplexity_search
    description: >-
      Perplexity Search API web search for ranked URLs with snippets,
      publication dates, and last-updated metadata. Trigger: "search",
      "look up", "latest", "current", broad source discovery, and
      citation candidate gathering when curated feeds or known URLs are
      insufficient. If the user provides an actual URL, use the
      webscrape_tool. Args: query, optional country (two-letter ISO
      code), optional max_results (1-20), optional search_context_size
      (low, medium, high), optional search_recency_filter (hour, day,
      week, month, year), optional search_domain_filter
      (comma-separated domains), optional search_language_filter
      (comma-separated two-letter language codes), and optional date
      filters in MM/DD/YYYY format. Returns: ranked URLs with snippets
      and freshness metadata. Fails when PERPLEXITY_SEARCH_API_KEY is
      missing or rate-limited.
    verbose: true
  webscrape_tool:
    _type: webscrape
    allowed_schemes:
      - http
      - https
    browser_timeout: 60
    description: >-
      Fetch ONE known URL and convert to markdown. Uses headless
      browser fallback for JS or bot-protected sites. Trigger: you
      already have the URL (from Perplexity Search, an RSS
      entry, or the user). Args: url (http/https only). Returns:
      markdown up to n tokens. Fails when: URL unknown (use
      perplexity_search_tool first), non-http
      scheme, or 60s timeout.
    max_output_tokens: 20000
    respect_robots_txt: false
    timeout: 60
    use_browser_fallback: true
    user_agent: daedalus-webscraper/0.1.0
    verbose: true
  source_verifier_tool:
    _type: source_verifier
    fast_llm_name: default_llm
    llm_name: default_llm
    max_source_chars: 80000
    max_output_tokens: 16000
    fetch_timeout: 20.0
    max_fetch_tokens: 20000
    wrapper_type: LANGCHAIN
    enabled_operations:
      - verify_claim
    description: >-
      Verify citations. verify_claim(claim, source_url) checks one
      exact final claim against one source; do not use it for
      speculative candidate claims, placeholder URLs, or search-snippet
      claims. For latest/current claims, prefer official latest/ docs
      pages, release indexes, or package indexes; a version-specific
      release note alone is not proof of latest/current. REQUIRED
      before every add_memory with type=finding or type=project_update.
      Returns: supported | partially_supported | unsupported |
      source_unreachable, with evidence. Fails when: source_url
      malformed or unreachable.
    verbose: true
  source_policy_tool:
    _type: source_verifier
    enabled_operations:
      - plan_sources
    source_registry:
      - id: curated_domains
        name: Curated Knowledge Domains
        description: Curated Milvus corpora for stable reference questions.
        tools:
          - domain_retriever_tool
        default_enabled: true
        requires_auth: false
      - id: curated_feeds
        name: Curated Recent Feeds
        description: Trusted RSS feeds for current source-specific updates.
        tools:
          - curated_feed_search_tool
        default_enabled: true
        requires_auth: false
      - id: perplexity_search
        name: Internet Search (Perplexity)
        description: Perplexity Search API ranked web results with snippets,
