authentication:
  github_mcp_server:
    _type: api_key
    custom_header_name: Authorization
    custom_header_prefix: Bearer
    raw_key: ${GITHUB_PAT}
  gmail_mcp_server:
    _type: mcp_oauth2
    # Gmail's protected-resource metadata advertises /mcp, while the
    # Streamable HTTP transport endpoint is /mcp/v1. NAT uses this field
    # as the OAuth resource indicator, so keep it aligned with metadata.
    server_url: https://gmailmcp.googleapis.com/mcp
    client_id: ${GOOGLE_MCP_CLIENT_ID}
    client_secret: ${GOOGLE_MCP_CLIENT_SECRET}
    enable_dynamic_registration: false
    client_name: Daedalus Gmail MCP
    redirect_uri: ${GOOGLE_MCP_REDIRECT_URI}
    token_endpoint_auth_method: client_secret_post
    scopes:
      - https://www.googleapis.com/auth/gmail.readonly
    use_pkce: true
    allow_default_user_id_for_tool_calls: false
  calendar_mcp_server:
    _type: mcp_oauth2
    server_url: https://calendarmcp.googleapis.com/mcp/v1
    client_id: ${GOOGLE_MCP_CLIENT_ID}
    client_secret: ${GOOGLE_MCP_CLIENT_SECRET}
    enable_dynamic_registration: false
    client_name: Daedalus Calendar MCP
    redirect_uri: ${GOOGLE_MCP_REDIRECT_URI}
    token_endpoint_auth_method: client_secret_post
    scopes:
      - https://www.googleapis.com/auth/calendar.calendarlist.readonly
      - https://www.googleapis.com/auth/calendar.events.freebusy
      - https://www.googleapis.com/auth/calendar.events.readonly
    use_pkce: true
    allow_default_user_id_for_tool_calls: false
embedders:
  milvus_embedder:
    _type: nim
    api_key: ${EMBEDDING_API_KEY}
    base_url: ${EMBEDDING_BASE_URL}
    model_name: ${EMBEDDING_MODEL}
    truncate: END
function_groups:
  github_mcp_server:
    _type: mcp_client
    include:
      - get_file_contents
      - get_latest_release
      - issue_read
      - list_branches
      - list_commits
      - list_issues
      - search_code
      - search_issues
      - search_pull_requests
      - search_repositories
    tool_call_timeout: 120
    reconnect_enabled: true
    reconnect_max_attempts: 3
    session_idle_timeout: 600
    tool_overrides:
      search_code:
        description: >-
          Search CODE across repos the user has access to. Args: query
          (GitHub code-search syntax, e.g. 'language:python org:nvidia
          foo'). Returns: file hits with snippets. Use
          search_repositories for repo-level finding.
      search_repositories:
        description: >-
          Find REPOS by name/topic/owner. Args: query (e.g.
          'topic:llm stars:>1000'). Returns: repo list. Use
          search_code for in-file matches.
      list_issues:
        description: >-
          List issues in ONE specific repo. Args: owner, repo, state.
          Returns: issue list. Use search_issues for cross-repo
          search.
      issue_read:
        description: >-
          Read a single issue with full comments. Args: owner, repo,
          issue_number. Returns: issue body + comments.
    server:
      auth_provider: github_mcp_server
      transport: streamable-http
      url: https://api.githubcopilot.com/mcp
  gmail_mcp_server:
    _type: mcp_client
    include:
      - search_threads
      - get_thread
      - list_labels
    tool_call_timeout: 120
    reconnect_enabled: true
    reconnect_max_attempts: 3
    session_idle_timeout: 600
    tool_overrides:
      search_threads:
        description: >-
          Search the authenticated user's Gmail threads. Args: query
          (Gmail search syntax). Returns matching thread summaries.
      get_thread:
        description: >-
          Read one Gmail thread by id for the authenticated user. Use
          after search_threads when full message context is needed.
    server:
      auth_provider: gmail_mcp_server
      transport: streamable-http
      url: https://gmailmcp.googleapis.com/mcp/v1
  calendar_mcp_server:
    _type: mcp_client
    include:
      - list_calendars
      - list_events
      - get_event
      - suggest_time
    tool_call_timeout: 120
    reconnect_enabled: true
    reconnect_max_attempts: 3
    session_idle_timeout: 600
    tool_overrides:
      list_events:
        description: >-
          List events from the authenticated user's Google Calendar.
          Args include calendar id and time window.
      suggest_time:
        description: >-
          Suggest open times from the authenticated user's Google Calendar
          availability. Use for scheduling and free/busy questions.
    server:
      auth_provider: calendar_mcp_server
      transport: streamable-http
      url: https://calendarmcp.googleapis.com/mcp/v1
  dynamo_mcp_server:
    _type: mcp_client
    include:
      - searchDocs
    tool_call_timeout: 120
    reconnect_enabled: true
    reconnect_max_attempts: 3
