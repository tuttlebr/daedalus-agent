        tools:
          - perplexity_search_tool
        default_enabled: true
        requires_auth: false
      - id: known_url_scrape
        name: Known URL Scrape
        description: Fetch a specific URL already observed or provided.
        tools:
          - webscrape_tool
        default_enabled: true
        requires_auth: false
      - id: nvidia_docs
        name: Official NVIDIA Docs
        description: Official NVIDIA product docs via MCP docs specialists,
