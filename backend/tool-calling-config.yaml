authentication:
  github_mcp_server:
    _type: api_key
    custom_header_name: Authorization
    custom_header_prefix: Bearer
    raw_key: ${GITHUB_PAT}
embedders:
  milvus_embedder:
    _type: nim
    api_key: ${EMBEDDING_API_KEY}
    base_url: ${EMBEDDING_BASE_URL}
    model_name: ${EMBEDDING_MODEL}
    truncate: END
function_groups:
  github_mcp_server:
    _type: mcp_client
    include:
      - get_file_contents
      - get_label
      - get_latest_release
      - get_me
      - get_release_by_tag
      - get_tag
      - get_team_members
      - get_teams
      - issue_read
      - list_branches
      - list_commits
      - list_issues
      - list_issue_types
      - list_releases
      - list_tags
      - search_code
      - search_issues
      - search_pull_requests
      - search_repositories
      - search_users
    tool_call_timeout: 120
    server:
      auth_provider: github_mcp_server
      transport: streamable-http
      url: https://api.githubcopilot.com/mcp
  dynamo_mcp_server:
    _type: mcp_client
    include:
      - searchDocs
    tool_call_timeout: 120
    server:
      transport: streamable-http
      url: https://docs.dynamo.nvidia.com/dynamo/_mcp/server
  k8s_mcp_server:
    _type: mcp_client
    tool_call_timeout: 600
    server:
      transport: streamable-http
      url: ${KUBERNETES_MCP_SERVER}
  serpapi_mcp_server:
    _type: mcp_client
    tool_call_timeout: 120
    server:
      transport: streamable-http
      url: https://mcp.serpapi.com/${SERPAPI_KEY}/mcp
functions:
  deep_thinker_tool:
    _type: tool_calling_agent
    return_direct:
      - user_interaction_tool
    tool_names:
      - add_memory
      - agent_skills_tool
      - content_distiller_tool
      - current_datetime_tool
      - delete_memory
      - dynamo_mcp_server
      - get_memory
      - github_mcp_server
      - k8s_mcp_server
      - kubernetes_retriever_tool
      - mentalhealth_retriever_tool
      - nv_ingest_tool
      - nvidia_blog_rss
      - nvidia_developer_blog_rss
      - nvidia_news_room_rss
      - nvidia_retriever_tool
      - semianalysis_retriever_tool
      - semianalysis_rss
      - karpathy_bearblog_rss
      - karpathy_github_rss
      - serpapi_search_tool
      - think_tool
      - user_interaction_tool
      - user_uploaded_files_retriever_tool
      - veterinarian_retriever_tool
      - vtt_interpreter_tool
      - webscrape_tool
      - mas_optimizer_tool
    llm_name: tool_calling_llm
    verbose: true
    handle_tool_errors: true
    max_iterations: 25
  agent_skills_tool:
    _type: agent_skills
    skills_directory: /skills
    allow_script_execution: true
    allowed_script_extensions:
      - .py
      - .sh
    script_timeout: 120
    description: >-
      Discover and execute pre-built agent skills in /skills. Operations:
      list_skills, load_skill, run_skill_script (.py/.sh, 120s timeout).
      Call list_skills first to see what is available.
    verbose: true
  add_memory:
    _type: add_memory
    description: >-
      Store a user preference, fact, or personal detail as a clear
      declarative statement for recall in future conversations. The
      memory parameter MUST be a plain text string, never JSON.
    memory: redis_memory
    verbose: true
  current_datetime_tool:
    _type: current_datetime
    description: >-
      Get the current date, time, and timezone.
    verbose: true
  delete_memory:
    _type: delete_memory
    description: >-
      Permanently delete ALL stored memories for a user. Destructive
      bulk operation. Always call confirm_action before executing.
    memory: redis_memory
    verbose: true
  get_memory:
    _type: get_memory
    description: >-
      Retrieve stored user preferences, interests, personal details,
      and past corrections via semantic search. Call at the start of
      substantive requests and mid-conversation when prior context
      would improve your answer.
    memory: redis_memory
    top_k: 5
    verbose: true
  image_augmentation_tool:
    _type: image_augmentation
    api_endpoint: ${IMAGE_AUGMENTATION_BASE_URL}
    api_key: ${IMAGE_AUGMENTATION_API_KEY}
    model: ${IMAGE_AUGMENTATION_MODEL}
    description: >-
      Edit or modify an existing user-uploaded image. Returns a new
      version with changes applied. Requires imageRef from the user's
      upload and a prompt describing the modifications.
    redis_url: ${REDIS_URL}
    timeout: 120
    verbose: true
  image_comprehension_tool:
    _type: image_comprehension
    api_endpoint: ${IMAGE_COMPREHENSION_BASE_URL}
    api_key: ${IMAGE_COMPREHENSION_API_KEY}
    model: ${IMAGE_COMPREHENSION_MODEL}
    description: >-
      Read-only analysis of an uploaded image or video. Returns text
      describing scenes, answering questions, extracting text (OCR),
      or identifying objects. Provide imageRef/videoRef or a direct URL.
    redis_url: ${REDIS_URL}
    timeout: 120
    verbose: true
  image_generation_tool:
    _type: image_generation
    api_endpoint: ${IMAGE_GENERATION_BASE_URL}
    api_key: ${IMAGE_GENERATION_API_KEY}
    model: ${IMAGE_GENERATION_MODEL}
    description: >-
      Generate a new image from a text description. Creates an original
      image from scratch; no existing image needed.
    redis_url: ${REDIS_URL}
    timeout: 120
    verbose: true
  kubernetes_retriever_tool:
    _type: nat_retriever
    description: >-
      Search the Kubernetes knowledge base: official docs, best
      practices, architecture patterns, YAML config, networking,
      storage, RBAC, Helm, and troubleshooting. For reference material,
      not live cluster operations.
    retriever: kubernetes_retriever
    topic: Kubernetes and container orchestration
    verbose: true
  mentalhealth_retriever_tool:
    _type: nat_retriever
    description: >-
      Search the Mental Health Foundation knowledge base: condition
      guides, coping strategies, wellness practices. Always include a
      disclaimer that this is educational, not professional care.
    retriever: mentalhealth_retriever
    topic: Mental health and psychological wellness
    verbose: true
  nv_ingest_tool:
    _type: nat_nv_ingest
    chunk_overlap: 150
    chunk_size: 1024
    default_collection_name: user_uploads
    description: >-
      Ingest a user-uploaded document (PDF, DOCX, etc.) into the vector
      knowledge base for searching via user_uploaded_files_retriever_tool.
      Pass documentRef, username, and collection_name.
    milvus_uri: ${MILVUS_URI}
    minio_access_key: ${MINIO_ACCESS_KEY}
    minio_endpoint: ${MINIO_ENDPOINT}
    minio_secret_key: ${MINIO_SECRET_KEY}
    nv_ingest_host: ${NV_INGEST_HOST}
    nv_ingest_port: ${NV_INGEST_PORT}
    redis_url: ${REDIS_URL}:${REDIS_PORT}
    verbose: true
  nvidia_blog_rss:
    _type: rss_feed
    description: >-
      Fetch recent articles from the official NVIDIA Blog. Covers
      thought leadership, AI trends, and business strategy. Up to 5
      articles ranked by relevance.
    feed_url: https://feeds.feedburner.com/nvidiablog
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: true
  nvidia_developer_blog_rss:
    _type: rss_feed
    description: >-
      Fetch recent articles from the NVIDIA Developer Blog. SDK updates,
      coding tutorials, API announcements, CUDA/TensorRT/NeMo guides.
      Up to 5 articles ranked by relevance.
    feed_url: https://developer.nvidia.com/blog/feed
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: true
  nvidia_news_room_rss:
    _type: rss_feed
    description: >-
      Fetch recent NVIDIA press releases and corporate announcements.
      Product launches, partnerships, earnings, executive statements.
      Up to 5 releases ranked by relevance.
    feed_url: https://nvidianews.nvidia.com/releases.xml
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: true
  nvidia_retriever_tool:
    _type: nat_retriever
    description: >-
      Search the NVIDIA knowledge base: GPU specs, CUDA, TensorRT,
      NeMo, Triton, RAPIDS, Omniverse, DGX documentation, and research
      papers. For established technical references, not recent news.
    retriever: nvidia_retriever
    topic: NVIDIA technology, products, and corporate information
    verbose: true
  semianalysis_retriever_tool:
    _type: nat_retriever
    description: >-
      Search the SemiAnalysis knowledge base: foundry economics, process
      nodes, fabrication capacity, supply chain, TSMC/Samsung/Intel
      competitive analysis. For deep reference, not recent news.
    retriever: semianalysis_retriever
    topic: Semiconductor industry analysis and market intelligence
    verbose: true
  semianalysis_rss:
    _type: rss_feed
    description: >-
      Fetch recent SemiAnalysis newsletter articles. Timely semiconductor
      analysis, foundry updates, chip market news. Up to 5 articles
      ranked by relevance.
    feed_url: https://newsletter.semianalysis.com/feed
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: true
  karpathy_bearblog_rss:
    _type: rss_feed
    description: >-
      Fetch recent posts from Karpathy's Bear Blog. AI insights, deep
      learning perspectives, LLM commentary. Up to 5 posts ranked by
      relevance.
    feed_url: https://karpathy.bearblog.dev/feed/
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: true
  karpathy_github_rss:
    _type: rss_feed
    description: >-
      Fetch posts from Karpathy's GitHub Pages blog. Longer-form
      technical writing on neural networks, deep learning research,
      and AI education. Up to 5 posts ranked by relevance.
    feed_url: https://karpathy.github.io/feed.xml
    max_entries: 5
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    verbose: true
  user_uploaded_files_retriever_tool:
    _type: user_document_retriever
    content_field: text
    database_name: default
    description: >-
      Search content of user-uploaded documents previously ingested via
      nv_ingest_tool. Returns relevant passages via
      semantic search. Only use when the user references their uploads.
    distance_cutoff: 1.2
    embedder_name: milvus_embedder
    milvus_uri: ${MILVUS_URI}
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    reranker_top_n: 5
    top_k: 10
    use_reranker: true
    vector_field: vector
    verbose: true
  veterinarian_retriever_tool:
    _type: nat_retriever
    description: >-
      Search the VetPartner knowledge base: animal health, treatment
      protocols, medications, nutrition, species-specific care. Always
      recommend consulting a licensed veterinarian.
    retriever: veterinarian_retriever
    topic: Veterinary medicine and animal care
    verbose: true
  vtt_interpreter_tool:
    _type: vtt_interpreter
    api_endpoint: ${DEFAULT_LLM_MODEL_BASE_URL}
    model: ${DEFAULT_LLM_MODEL_MODEL}
    api_key: ${DEFAULT_LLM_MODEL_API_KEY}
    description: >-
      Process VTT or SRT meeting transcripts. Summarize, extract action
      items, answer questions, or produce structured meeting notes.
      Provide transcript_text and optional user_instructions.
    timeout: 120
    verbose: true
  think_tool:
    _type: think_tool
    max_thought_length: 50000
    max_chain_steps: 20
    description: >-
      Private reasoning scratchpad with zero side effects. think() for
      single-step reflection, sequential_think() for multi-step chains
      with revision. Use before acting when the next step is unclear.
    verbose: true
  content_distiller_tool:
    _type: content_distiller
    fast_llm_name: distill_llm
    llm_name: reasoning_llm
    max_input_chars: 100000
    max_output_tokens: 4096
    temperature: 0.1
    wrapper_type: LANGCHAIN
    description: >-
      Condense verbose tool outputs. distill_content (summarize),
      extract_structured (pull data points), synthesize (combine
      multiple sources). Use only when tool output exceeds ~5000
      tokens; incorporate shorter outputs directly.
    verbose: true
  user_interaction_tool:
    _type: user_interaction
    max_options: 6
    description: >-
      Structured user interaction. clarify (ask with selectable options),
      confirm_action (approval before destructive actions),
      present_options (compare alternatives). Use confirm_action before
      any destructive or hard-to-reverse action.
    verbose: true
  mas_optimizer_tool:
    _type: mas_optimizer
    sas_accuracy_threshold: 0.45
    decomposability_threshold: 0.35
    tool_count_threshold: 12
    default_user_id: ${DAEDALUS_DEFAULT_USER:-anonymous}
    drift_keywords:
      - vision language
      - VLM
      - Qwen3-VL
      - image model
    required_keywords:
      - MAS
      - verifier
      - capability gate
      - orchestrat
      - decomposab
    verbosity_ceiling: 2000
    description: >-
      Architecture routing engine. mas_evaluate assesses whether a task
      needs Single-Agent or Multi-Agent handling. mas_verify checks a
      draft for topic drift. mas_log_outcome records metrics. Call
      mas_evaluate at the start of substantive requests. Call mas_verify
      and mas_log_outcome only for MAS-routed tasks.
    verbose: true
  serpapi_search_tool:
    _type: serpapi_search
    description: >-
      Search the public web via Google. Returns organic listings,
      knowledge panels, news, images, shopping, videos. Use for topics
      outside specialized knowledge bases. time_period for recency:
      "qdr:h", "qdr:d", "qdr:w", "qdr:m", "qdr:y".
  webscrape_tool:
    _type: webscrape
    allowed_schemes:
      - http
      - https
    browser_timeout: 120
    description: >-
      Fetch a webpage at a known URL and convert to readable markdown.
      Handles JavaScript-rendered pages and bot protection via headless
      browser fallback. You must already have the URL.
    max_output_tokens: 20000
    respect_robots_txt: false
    timeout: 120
    use_browser_fallback: true
    user_agent: daedalus-webscraper/0.1.0
    verbose: true
general:
  front_end:
    _type: fastapi
    max_running_async_jobs: 8
    dask_workers: threads
    dask_threads_per_worker: 1
    dask_worker_memory_limit: "2GiB"
    dask_log_level: WARNING
    step_adaptor:
      mode: custom
      custom_event_types:
        - LLM_START
        - LLM_END
        - LLM_NEW_TOKEN
        - TOOL_START
        - TOOL_END
        - WORKFLOW_START
        - WORKFLOW_END
        - TASK_START
        - TASK_END
        - TTC_START
        - TTC_END
        - FUNCTION_START
        - FUNCTION_END
        - CUSTOM_START
        - CUSTOM_END
        - SPAN_START
        - SPAN_CHUNK
        - SPAN_END
    # NAT async jobs use a pod-local Dask cluster; keep a single backend
    # process per pod so requests don't bounce across isolated local schedulers.
    workers: 1
  telemetry:
    tracing:
      phoenix:
        _type: phoenix
        endpoint: ${DAEDALUS_PHOENIX_ENDPOINT}
        project: ${PHOENIX_PROJECT_NAME}
llms:
  reasoning_llm:
    _type: openai
    api_key: ${REASONING_LLM_MODEL_API_KEY}
    base_url: ${REASONING_LLM_MODEL_BASE_URL}
    model_name: ${REASONING_LLM_MODEL_MODEL}
  react_llm:
    _type: openai
    api_key: ${REACT_LLM_MODEL_API_KEY}
    base_url: ${REACT_LLM_MODEL_BASE_URL}
    model_name: ${REACT_LLM_MODEL_MODEL}
  tool_calling_llm:
    _type: openai
    api_key: ${TOOL_CALLING_LLM_MODEL_API_KEY}
    base_url: ${TOOL_CALLING_LLM_MODEL_BASE_URL}
    model_name: ${TOOL_CALLING_LLM_MODEL_MODEL}
  distill_llm:
    _type: openai
    api_key: ${DISTILL_LLM_MODEL_API_KEY}
    base_url: ${DISTILL_LLM_MODEL_BASE_URL}
    model_name: ${DISTILL_LLM_MODEL_MODEL}
memory:
  redis_memory:
    _type: nat.plugins.redis/redis_memory
    db: 0
    embedder: milvus_embedder
    host: ${RI_REDIS_HOST_DAEDALUS}
    key_prefix: nat
    port: ${REDIS_PORT}
    verbose: true
retrievers:
  kubernetes_retriever:
    _type: smart_milvus
    collection_name: kubernetes
    content_field: text
    database_name: default
    description:
      Kubernetes documentation and best practices knowledge base. Covers
      official K8s docs, expert technical blogs, and configuration patterns.
    embedding_model: milvus_embedder
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    reranker_top_n: 5
    return_as_string: false
    top_k: 10
    uri: ${MILVUS_URI}
    use_reranker: true
    vector_field: vector
    verbose: true
  mentalhealth_retriever:
    _type: smart_milvus
    collection_name: mentalhealth
    content_field: text
    database_name: default
    description:
      Evidence-based mental health content from the Mental Health Foundation.
      Covers condition guides, coping strategies, and wellness practices.
      Educational content requiring a professional care disclaimer.
    embedding_model: milvus_embedder
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    reranker_top_n: 5
    return_as_string: false
    top_k: 10
    uri: ${MILVUS_URI}
    use_reranker: true
    vector_field: vector
    verbose: true
  nvidia_retriever:
    _type: smart_milvus
    collection_name: nvidia
    content_field: text
    database_name: default
    description:
      Comprehensive NVIDIA knowledge base covering hardware specifications,
      software documentation, research papers, and corporate information.
    embedding_model: milvus_embedder
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    reranker_top_n: 5
    return_as_string: false
    top_k: 10
    uri: ${MILVUS_URI}
    use_reranker: true
    vector_field: vector
    verbose: true
  semianalysis_retriever:
    _type: smart_milvus
    collection_name: semianalysis
    content_field: text
    database_name: default
    description:
      Expert semiconductor industry analysis covering foundries, process
      nodes, chip economics, and competitive intelligence.
    embedding_model: milvus_embedder
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    reranker_top_n: 5
    return_as_string: false
    top_k: 10
    uri: ${MILVUS_URI}
    use_reranker: true
    vector_field: vector
    verbose: true
  user_uploaded_files_retriever:
    _type: smart_milvus
    content_field: text
    database_name: default
    description:
      Query content from user-uploaded documents that have been processed
      and indexed into the vector knowledge base.
    distance_cutoff: 1.2
    embedding_model: milvus_embedder
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    reranker_top_n: 5
    return_as_string: false
    top_k: 10
    uri: ${MILVUS_URI}
    use_reranker: true
    vector_field: vector
    verbose: true
  veterinarian_retriever:
    _type: smart_milvus
    collection_name: vetpartner
    content_field: text
    database_name: default
    description: Expert veterinary knowledge from VetPartner covering treatment
      protocols, drug information, and species-specific care. Requires a
      veterinarian consultation disclaimer.
    embedding_model: milvus_embedder
    reranker_api_key: ${REANKER_API_KEY}
    reranker_endpoint: ${REANKER_BASE_URL}
    reranker_model: ${REANKER_MODEL}
    reranker_top_n: 5
    return_as_string: false
    top_k: 10
    uri: ${MILVUS_URI}
    use_reranker: true
    vector_field: vector
    verbose: true
workflow:
  _type: tool_calling_agent
  max_iterations: 20
  llm_name: tool_calling_llm
  system_prompt: |
    You are Daedalus, built on NVIDIA NeMo Agent toolkit and implementing
    task-contingent architecture selection per 'Towards a Science of
    Scaling Agent Systems' (arXiv:2512.08296v2). Your audience is senior
    technology executives and founders.

    # Startup

    On every request, read the [IDENTITY] message in the conversation to
    get the authenticated username. Use that username as user_id for ALL
    memory operations (get_memory, add_memory, delete_memory). If no
    [IDENTITY] message is present, use "anonymous".

    For simple conversational messages (greetings, small talk, brief
    acknowledgments, thanks, or clarifications of your prior response),
    respond directly without calling any tools.

    For substantive requests (questions, tasks, analysis, anything
    requiring information or action), call get_memory(user_id=
    <authenticated_username>, query="user preferences, interests,
    and context", top_k=5) in parallel with mas_evaluate(
    task_description=<the user's request>, active_tool_names=
    "serpapi_search_tool,webscrape_tool,github_mcp_server,
    k8s_mcp_server,nvidia_retriever_tool,
    semianalysis_retriever_tool,kubernetes_retriever_tool")
    to assess the task.

    Exception: when the user requests their daily briefing, call
    get_memory FIRST and wait for results before calling any other
    tools. The briefing procedure and its constraints are stored in
    memory and must be followed exactly.

    IMPORTANT: NEVER hardcode a user_id. Always extract it from the
    [IDENTITY] message. Do not echo the [IDENTITY] message to the user.

    # Architecture routing

    If mas_evaluate recommends SAS: use your tools directly to answer
    the query. No orchestration overhead.

    If mas_evaluate recommends MAS: call load_skill("mas-procedure")
    and follow the procedure matching the recommended architecture type.

    If the user's request clearly matches a skill in the Quick routing
    guide, load that skill directly without waiting for mas_evaluate.
    Skills take priority over architecture routing when the match is
    obvious.

    # Memory

    Store noteworthy preferences or details with add_memory as clear
    declarative statements. Include metadata key_value_pairs when it
    aids retrieval. Call get_memory mid-conversation with topic-specific
    queries when prior context would improve your answer.

    # Style

    Brevity and information density are paramount. Every sentence should
    earn its place. Lead with the answer; add supporting detail only
    when it changes what the reader would do. Write the way a sharp
    colleague talks: natural, confident, no filler. If it would sound
    stilted or awkward spoken aloud, rewrite it. Reserve lists and
    tables for genuinely comparative content.

    Never use em dashes, emojis, or emoticons. Minimize bold/italic.
    Keep paragraphs short.

    # Reasoning

    Use think() before acting whenever the request is complex, ambiguous,
    or requires synthesizing information from multiple sources. Use
    sequential_think() for extended multi-step analysis that benefits
    from tracking and revising reasoning steps.

    # User interaction

    Use clarify when a request has multiple valid interpretations.
    Use confirm_action before modifying external state (Kubernetes,
    GitHub, memory deletion). Use present_options when you identify
    multiple valid approaches and the best choice depends on user
    preferences.

    # Content processing

    Use content_distiller_tool only when tool output exceeds ~5000
    tokens. For shorter outputs, incorporate them directly. Use
    distill_content for summarization, extract_structured for pulling
    specific data points, and synthesize when combining information
    from multiple sources.

    # Tool selection

    Prefer retrieval and real-time data over prior knowledge. On tool
    failure, explain and suggest alternatives. State uncertainty
    honestly; offer to investigate.

    ACTION BIAS (MANDATORY): You are an agent with real tools that
    execute real actions. When the user asks you to do something and
    you have a tool for it, DO IT. Call the tool. Do not explain what
    you would do, do not list what tools you have, do not offer to
    generate a script. Act first, report results after.

    NEVER claim you "cannot" perform an action, "do not have access",
    or "lack the ability" when a tool in your tool list covers it.
    Your tools are real, live connections to real systems. Use them.

    If an MCP server tool (k8s_mcp_server, github_mcp_server, etc.)
    is NOT in your actual tool list, it was unreachable at startup.
    State this once, briefly, and move on. Do not deliberate about it.

    ANTI-PATTERN (never do this): Responding with "I don't have
    access to a terminal" or "I cannot run commands" when the tool IS
    in your list. If you catch yourself drafting a response like that,
    stop and call the tool instead.

    ## Quick routing guide

    NVIDIA questions:
    - Technical docs, specs, APIs -> nvidia_retriever_tool
    - Recent blog posts, AI commentary -> nvidia_blog_rss
    - Recent SDK tutorials, dev guides -> nvidia_developer_blog_rss
    - Press releases, earnings, launches -> nvidia_news_room_rss
    - Comprehensive answer -> retriever + relevant RSS feed together

    Semiconductor questions:
    - Deep analysis, foundry economics -> semianalysis_retriever_tool
    - Latest news, recent articles -> semianalysis_rss
    - Comprehensive answer -> retriever + RSS together

    Kubernetes questions:
    - Docs, best practices, YAML help -> kubernetes_retriever_tool
    - ANY cluster operation -> k8s_mcp_server (if available; has FULL
      kubectl and helm access: install/upgrade/rollback charts,
      create/delete/patch/scale resources, view logs, exec into pods,
      manage namespaces, etc.)
    - Both knowledge + live data -> both tools together
    When k8s_mcp_server is in your tool list, call it immediately for
    cluster operations. Do not offer scripts or list limitations.

    Image requests:
    - Create new image from text -> image_generation_tool
    - Augment/edit/modify uploaded image -> image_augmentation_tool
    - Describe/analyze uploaded image (text answer) -> image_comprehension_tool
    CRITICAL: When image_generation_tool or image_augmentation_tool returns
    a markdown image reference (![...](/api/generated-image/...)), you MUST
    include that exact markdown in your response verbatim. The image is only
    visible to the user if the markdown reference appears in your output.

    User documents:
    - Ingest an uploaded document -> nv_ingest_tool
    - Search ingested documents -> user_uploaded_files_retriever_tool
    - NEVER use user_uploaded_files_retriever_tool as a substitute
      for get_memory or for general knowledge questions

    Web research:
    - Topics outside specialized knowledge bases -> serpapi_search_tool
    - Read a specific URL -> webscrape_tool
    - Typical flow: serpapi -> webscrape -> content_distiller_tool

    Skills (agent_skills_tool):
    - User explicitly names a skill -> load_skill("<skill-name>")
    - Code review, PR audit, code quality -> load_skill("code-review")
    - Content writing, blog posts, articles, research writing ->
      load_skill("content-research-writer")
    - Executive communication, leadership prep ->
      load_skill("executive-voice")
    - NVCF cloud functions, NGC CLI, function deployment ->
      load_skill("nvcf-ngc-cli-skill")
    - NVCF self-managed, nvcf-cli, self-hosted functions ->
      load_skill("nvcf-self-managed-cli")
    - NVCF self-managed installation, helmfile, control plane ->
      load_skill("nvcf-self-managed-installation")
    - Unsure which skill applies -> list_skills() to discover
    Do NOT call list_skills on every request. Only invoke skills
    when the request matches a skill's purpose or the user asks.

    General fallback order: specialized retriever -> RSS feed ->
    serpapi_search_tool -> webscrape_tool
